<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Skybound — Island Lab</title>
<style>
  :root {
    --parchment: #f1e6cd;
    --ink: #2a2417;
    --rule: #b8a777;
  }
  html, body { margin: 0; padding: 0; background: #c4d4e2; color: var(--ink); font-family: Georgia, serif; }
  header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--rule);
    background: var(--parchment);
    display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }
  header h1 { margin: 0; font-size: 20px; }
  header p { margin: 2px 0 0; font-size: 12.5px; opacity: 0.85; max-width: 70ch; }
  header .controls { display: flex; gap: 8px; }
  header .controls button {
    font: italic 13px Georgia, serif;
    background: #fff8e8; border: 1px solid var(--rule); color: var(--ink);
    padding: 6px 12px; border-radius: 4px; cursor: pointer;
  }
  header .controls button.active { background: #c9622e; color: #fff8e8; border-color: #6a2f15; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 14px;
    padding: 0 14px 14px;
  }
  .section-header {
    padding: 18px 18px 4px;
  }
  .section-header h2 {
    margin: 0;
    font-size: 17px;
    font-style: italic;
    color: var(--ink);
  }
  .section-header p {
    margin: 2px 0 0;
    font-size: 12.5px;
    opacity: 0.78;
    max-width: 80ch;
  }
  .card {
    background: #fff8e8;
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 10px 12px 12px;
  }
  .card h2 { margin: 0 0 2px; font-size: 16px; font-style: italic; }
  .card .desc { margin: 0 0 8px; font-size: 12px; opacity: 0.78; min-height: 30px; }
  canvas {
    display: block; width: 100%; height: auto;
    background: linear-gradient(180deg, #aac3da 0%, #d4dde5 100%);
    border-radius: 4px;
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>Skybound — Island Lab</h1>
    <p>Each card shows an island archetype at <em>game scale</em> (left, with the current blob island faded beside it for size reference) and a 2× zoom (right). Toggle <em>Breeze</em> to drive wind-sensitive bits (flags, beams, waves).</p>
  </div>
  <div class="controls">
    <button id="reroll">Re-roll</button>
    <button id="breeze" class="active">Breeze</button>
    <button id="pause">Pause</button>
  </div>
</header>
<div id="sections"></div>

<script>
(function () {
  // ----- Sections of cards -----
  // Section 1: hand-drawn archetypes from the kid's sketch (held — refining
  // via the name-modifier approach below).
  // Section 2: solo name-token modifiers overlaid on the base blob.
  // Section 3: combined name examples — prefix + suffix modifiers stacked.
  const sections = [
    {
      title: 'Archetypes (from sketch)',
      note: 'Held — refining via the name-modifier approach below.',
      items: [
        { id: 'blob',       name: 'Current blob',         desc: 'The game today: a single procedural lump.' },
        { id: 'tropical',   name: 'Tropical tuft',        desc: 'Sandy crown, leaning palm, flower clump.' },
        { id: 'lighthouse', name: 'Lighthouse spire',     desc: 'Tall narrow island, striped tower, sweeping beam.' },
        { id: 'signpost',   name: 'Signpost cloud',       desc: 'Cloud platform with a wooden arrow signpost.' },
        { id: 'city',       name: 'Domed city',           desc: 'Wide island with a mixed skyline + warm windows.' },
        { id: 'castle',     name: 'Castle keep',          desc: 'Crenellated wall, three peaks behind, pennant.' },
        { id: 'shipyard',   name: 'Cloud shipyard',       desc: 'A galleon moored on a fluffy cloud.' },
        { id: 'stilthut',   name: 'Stilt hut (sea isle)', desc: 'Sits on waves — thatched hut, palm, fishing rod.' },
      ],
    },
    {
      title: 'Name → modifier (solo)',
      note: 'One modifier overlaid on the base blob. The token(s) in the title are name fragments that trigger the modifier.',
      items: [
        { id: 'mod_keep',   name: 'keep / crest',     desc: 'Small crenellated tower with a pennant.', mods: ['keep'] },
        { id: 'mod_tide',   name: 'tide',             desc: 'Wooden fishing dock with rod + line; wet sheen on underside.', mods: ['tide'] },
        { id: 'mod_crag',   name: 'crag / reach',     desc: 'One or two sharp gray peaks rising from the top.', mods: ['crag'] },
        { id: 'mod_wing',   name: 'wing / aer',       desc: 'Wing-shaped banners flanking the island.', mods: ['wing'] },
        { id: 'mod_sol',    name: 'sol',              desc: 'Sun-disk halo behind the island.', mods: ['sol'] },
        { id: 'mod_glen',   name: 'glen / dell',      desc: 'Mine adit cut into the side with a timber frame + ore tailings.', mods: ['glen'] },
        { id: 'mod_spire',  name: 'spire / watch',    desc: 'Spiraled seashell tower on top.', mods: ['spire'] },
        { id: 'mod_wyn',    name: 'wyn / pyre',       desc: 'Wyvern silhouette perched on a peak (pyre adds ember glow).', mods: ['wyn'] },
        { id: 'mod_asha',   name: 'asha',             desc: 'Volcano cone with smoke + glow; rock recolors to dark basalt.', mods: ['asha'] },
        { id: 'mod_hollow', name: 'hollow / thorn',   desc: 'Twisted trees, thorny vines along the rim, dead red flowers.', mods: ['hollow'] },
        { id: 'mod_helm',   name: 'helm / mel',       desc: 'Sword in stone with a small banner.', mods: ['helm'] },
      ],
    },
    {
      title: 'Combined name examples',
      note: 'Prefix + suffix modifiers stacked on one blob. Click Re-roll to sample different shapes for the same name.',
      items: [
        { id: 'name_solspire',  name: 'Solspire',   desc: 'sol + spire promotes to a striped lighthouse with sun halo.', mods: ['sol','spire'] },
        { id: 'name_pyrecrag',  name: 'Pyrecrag',   desc: 'pyre (ember wyvern) + crag (peak) — dragon mountain.',     mods: ['pyre','crag'] },
        { id: 'name_ashakeep',  name: 'Ashakeep',   desc: 'asha (volcano) + keep (castle) — fortress on the fire.',    mods: ['asha','keep'] },
        { id: 'name_wynhollow', name: 'Wynhollow',  desc: 'wyn (wyvern peak) + hollow (overgrown) — lost in wilds.',   mods: ['wyn','hollow'] },
        { id: 'name_melthorn',  name: 'Melthorn',   desc: 'mel (sword) + thorn (overgrown) — forgotten battlefield.', mods: ['helm','hollow'] },
        { id: 'name_aertide',   name: 'Aertide',    desc: "aer (wings) + tide (fishing dock) — sky-fisher's perch.",  mods: ['wing','tide'] },
        { id: 'name_helmglen',  name: 'Helmglen',   desc: 'helm (sword) + glen (mine) — a fortified mine.',           mods: ['helm','glen'] },
        { id: 'name_morvale',   name: 'Morvale',    desc: 'No modifiers — the plain-blob baseline.',                  mods: [] },
      ],
    },
  ];

  const root = document.getElementById('sections');
  const dpr = window.devicePixelRatio || 1;
  let paused = false;
  let breeze = true;
  let rerollEpoch = 0;
  const cards = [];

  document.getElementById('pause').addEventListener('click', (e) => {
    paused = !paused;
    e.target.textContent = paused ? 'Play' : 'Pause';
  });
  document.getElementById('breeze').addEventListener('click', (e) => {
    breeze = !breeze;
    e.target.textContent = breeze ? 'Breeze' : 'Still';
    e.target.classList.toggle('active', breeze);
  });
  document.getElementById('reroll').addEventListener('click', () => {
    rerollEpoch = (rerollEpoch + 1) | 0;
    for (const c of cards) c.seed = (c.baseSeed + rerollEpoch * 9973) | 0;
  });

  let seedCounter = 1;
  for (const section of sections) {
    const head = document.createElement('div');
    head.className = 'section-header';
    head.innerHTML = `<h2>${section.title}</h2><p>${section.note}</p>`;
    root.appendChild(head);
    const grid = document.createElement('div');
    grid.className = 'grid';
    root.appendChild(grid);
    for (const s of section.items) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<h2>${s.name}</h2><div class="desc">${s.desc}</div><canvas></canvas>`;
      grid.appendChild(card);
      const canvas = card.querySelector('canvas');
      const W = 360, H = 200;
      canvas.style.aspectRatio = `${W} / ${H}`;
      canvas.width = W * dpr; canvas.height = H * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      const baseSeed = (seedCounter++ * 7919) | 0;
      cards.push({ id: s.id, mods: s.mods || null, ctx, W, H, baseSeed, seed: baseSeed });
    }
  }

  // ---------- Background ----------
  function drawBackground(ctx, W, H, t) {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#aac3da');
    g.addColorStop(1, '#d4dde5');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.globalAlpha = 0.32;
    const drift = (t * 6) % (W + 80);
    for (let i = 0; i < 3; i++) {
      const cx = ((i * (W / 3) + drift) % (W + 80)) - 40;
      const cy = H * (0.18 + i * 0.18);
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.ellipse(cx, cy, 30, 7, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Tiny deterministic RNG seeded by integer.
  function makeRng(seed) {
    let s = seed | 0;
    return () => {
      s = (s * 1664525 + 1013904223) | 0;
      return ((s >>> 0) % 100000) / 100000;
    };
  }

  // Shared island body: flat-ish top spanning [-w..w] at y=0, jagged spiky
  // underside descending to about y=spikeDepth+. Returns the top profile so
  // archetypes can place props along it.
  function drawIslandBody(ctx, w, opts = {}) {
    const seed = opts.seed ?? 7;
    const spikeDepth = opts.spikeDepth ?? 22;
    const spikeCount = opts.spikeCount ?? 6;
    const topWobble = opts.topWobble ?? 1.4;
    const grassA = opts.grassA ?? '#6b8a5a';
    const grassB = opts.grassB ?? '#4d6a40';
    const rock   = opts.rock   ?? '#3a4a2e';
    const r = makeRng(seed);

    // Top edge (slight rolling)
    const topVerts = [];
    const topSegs = 10;
    for (let i = 0; i <= topSegs; i++) {
      const x = -w + (i / topSegs) * 2 * w;
      const y = (r() - 0.6) * topWobble;
      topVerts.push({ x, y });
    }

    // Spiky underside — descend, jut up, descend, etc. Walking right→left.
    const spikeVerts = [];
    for (let i = 0; i <= spikeCount; i++) {
      const tt = i / spikeCount;
      const x = w - tt * 2 * w;
      const dip = spikeDepth * (0.55 + r() * 0.55);
      const lift = spikeDepth * 0.15 * r();
      spikeVerts.push({ x: x + (r() - 0.5) * (w / spikeCount) * 0.5, y: dip });
      if (i < spikeCount) {
        const midX = x - (w / spikeCount);
        spikeVerts.push({ x: midX, y: lift + 1 });
      }
    }

    // Soft drop shadow under the island
    ctx.save();
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = '#23303c';
    ctx.beginPath();
    ctx.ellipse(0, spikeDepth + 6, w * 0.95, spikeDepth * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Body fill
    ctx.beginPath();
    for (let i = 0; i < topVerts.length; i++) {
      const v = topVerts[i];
      if (i === 0) ctx.moveTo(v.x, v.y);
      else ctx.lineTo(v.x, v.y);
    }
    for (const v of spikeVerts) ctx.lineTo(v.x, v.y);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, -6, 0, spikeDepth);
    grad.addColorStop(0, grassA);
    grad.addColorStop(0.45, grassB);
    grad.addColorStop(1, rock);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(20,25,15,0.75)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Subtle highlight along the top edge
    ctx.save();
    ctx.beginPath();
    for (let i = 0; i < topVerts.length; i++) {
      const v = topVerts[i];
      if (i === 0) ctx.moveTo(v.x, v.y);
      else ctx.lineTo(v.x, v.y);
    }
    ctx.strokeStyle = 'rgba(220,210,160,0.55)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    ctx.restore();

    return { topVerts, w, spikeDepth };
  }

  // Cloud platform — soft puffs spanning ~[-w..w] at y=0.
  function drawCloudBody(ctx, w, opts = {}) {
    const y = opts.y ?? 0;
    const r = opts.r ?? Math.max(8, w * 0.32);
    // Underside shadow
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#5a6a7c';
    ctx.beginPath();
    ctx.ellipse(0, y + r * 0.9, w * 0.95, r * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = 'rgba(80, 110, 140, 0.55)';
    ctx.lineWidth = 0.9;
    ctx.beginPath();
    ctx.arc(-w * 0.88, y - 1, r * 0.85, 0, Math.PI * 2);
    ctx.arc(-w * 0.38, y + 1, r, 0, Math.PI * 2);
    ctx.arc( 0,         y - 1, r * 0.95, 0, Math.PI * 2);
    ctx.arc( w * 0.38, y + 1, r, 0, Math.PI * 2);
    ctx.arc( w * 0.88, y - 1, r * 0.85, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }

  // ---------- Archetype draw functions ----------
  // Signature: (ctx, t, breezeAmt) where breezeAmt ∈ [0..1].
  // Origin (0,0) is the center of the island's top surface.

  // Base blob shape used by every name-modifier card. Returns the silhouette
  // so modifiers can find the top surface, left/right shoulders, etc.
  function drawBlob(ctx, t, br, opts = {}) {
    const seed = opts.seed ?? 311;
    const radius = opts.radius ?? 36;
    const volcanic = opts.volcanic === true;
    const r = makeRng(seed);
    const points = 14;
    const verts = [];
    for (let k = 0; k < points; k++) {
      const ang = (k / points) * Math.PI * 2;
      const wobble = 0.75 + r() * 0.45;
      verts.push({
        x: Math.cos(ang) * radius * wobble,
        y: Math.sin(ang) * radius * wobble,
        wobble
      });
    }
    // shadow
    ctx.beginPath();
    for (let k = 0; k < verts.length; k++) {
      const v = verts[k];
      if (k === 0) ctx.moveTo(v.x, v.y + 8);
      else ctx.lineTo(v.x, v.y + 8);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(20, 30, 40, 0.4)';
    ctx.fill();
    // body
    ctx.beginPath();
    for (let k = 0; k < verts.length; k++) {
      const v = verts[k];
      if (k === 0) ctx.moveTo(v.x, v.y);
      else ctx.lineTo(v.x, v.y);
    }
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, -radius, 0, radius);
    if (volcanic) {
      grad.addColorStop(0, '#5a3a2a');
      grad.addColorStop(0.55, '#3a2018');
      grad.addColorStop(1, '#1a0c08');
    } else {
      grad.addColorStop(0, '#6b8a5a');
      grad.addColorStop(0.55, '#4d6a40');
      grad.addColorStop(1, '#3a4a2e');
    }
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(20, 25, 15, 0.7)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Highlight (a small lighter patch in the upper-left — also where any
    // "on-top" modifier anchors). Suppressed when a modifier sits there.
    if (!opts.skipHighlight) {
      ctx.beginPath();
      ctx.arc(-radius * 0.2, -radius * 0.2, radius * 0.18, 0, Math.PI * 2);
      ctx.fillStyle = volcanic ? 'rgba(255,140,80,0.45)' : 'rgba(220, 210, 160, 0.5)';
      ctx.fill();
    }

    // Volcanic lava cracks on the underside
    if (volcanic) {
      ctx.strokeStyle = 'rgba(255,110,40,0.8)';
      ctx.lineWidth = 0.9;
      const rc = makeRng(seed + 17);
      for (let k = 0; k < 4; k++) {
        const a1 = Math.PI * (0.15 + rc() * 0.7); // bottom half angles
        const a2 = a1 + (rc() * 0.4 + 0.1);
        ctx.beginPath();
        ctx.moveTo(Math.cos(a1) * radius * 0.4, Math.sin(a1) * radius * 0.4);
        ctx.quadraticCurveTo(
          Math.cos((a1 + a2) / 2) * radius * 0.7, Math.sin((a1 + a2) / 2) * radius * 0.7 + 1,
          Math.cos(a2) * radius * 0.95, Math.sin(a2) * radius * 0.95
        );
        ctx.stroke();
      }
    }

    // Surface anchors for modifier placement. topY = highest visible point
    // along the blob's top edge; leftSide / rightSide are the shoulder points
    // mine/dock can attach to.
    let topVert = verts[0];
    for (const v of verts) if (v.y < topVert.y) topVert = v;
    return {
      radius,
      verts,
      topY: topVert.y,
      topX: topVert.x,
      // Where on the visible "deck" of the island top-anchored modifiers sit
      // (the same spot the original highlight occupied). Reads as a clearing
      // or plateau on the upper-left of the blob.
      surfaceAnchor: { x: -radius * 0.2, y: -radius * 0.2 },
      leftShoulder:  { x: -radius * 0.75, y: -radius * 0.15 },
      rightShoulder: {  x: radius * 0.75, y: -radius * 0.15 },
      bottomY: radius * 0.95,
    };
  }

  // ---------- Name-modifier draw functions ----------
  // Each takes (ctx, t, br, blob) where `blob` is the result returned by
  // drawBlob. Modifiers are sorted into slots so two modifiers don't overlap:
  //   center: castle / spire / volcano / wyvern / sword — on top
  //   side:   mine / dock — on left or right shoulder
  //   wings:  banner wings — on both shoulders
  //   aura:   sun halo, wet sheen — behind/under the blob
  //   peri:   overgrown trees + vines — along the rim
  //
  // If two modifiers want the same slot, the second one is shifted to its
  // fallback position (center → right of center; side → opposite side).
  function modCastle(ctx, t, br, blob, opts = {}) {
    // Small keep sitting on the upper-left surface (where the highlight was).
    const a = opts.anchor || blob.surfaceAnchor;
    const s = opts.scale ?? 1;
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.scale(s, s);
    // Tower body
    ctx.fillStyle = '#cabd99';
    ctx.fillRect(-4, -10, 8, 10);
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.strokeRect(-4, -10, 8, 10);
    // Crenellations
    for (const cx of [-3.6, -1.8, 0, 1.8]) {
      ctx.fillStyle = '#cabd99';
      ctx.fillRect(cx, -12, 1.4, 2);
      ctx.strokeRect(cx, -12, 1.4, 2);
    }
    // Stone seams
    ctx.strokeStyle = 'rgba(40,30,20,0.45)';
    ctx.lineWidth = 0.3;
    for (let i = 1; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(-4, -i * 3);
      ctx.lineTo(4, -i * 3);
      ctx.stroke();
    }
    // Arched door
    ctx.fillStyle = '#2a1f12';
    ctx.beginPath();
    ctx.moveTo(-1.1, 0);
    ctx.lineTo(-1.1, -2.4);
    ctx.quadraticCurveTo(0, -3.6, 1.1, -2.4);
    ctx.lineTo(1.1, 0);
    ctx.closePath();
    ctx.fill();
    // Window slit
    ctx.fillStyle = '#3a2810';
    ctx.fillRect(-0.7, -7, 1.4, 1.6);
    // Pennant
    const flutter = breeze ? Math.sin(t * 4) * 0.4 * br : 0;
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, -12);
    ctx.lineTo(0, -16);
    ctx.stroke();
    ctx.fillStyle = '#c9342c';
    ctx.beginPath();
    ctx.moveTo(0, -16);
    ctx.lineTo(4 + flutter, -15.4);
    ctx.lineTo(2.6, -14.4);
    ctx.lineTo(4 - flutter, -13.4);
    ctx.lineTo(0, -14);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function modDock(ctx, t, br, blob, opts = {}) {
    // Wooden fishing dock + rod; wet sheen on underside (separate, in aura).
    const side = opts.side ?? 1; // +1 right, -1 left
    const sh = side > 0 ? blob.rightShoulder : blob.leftShoulder;
    ctx.save();
    ctx.translate(sh.x, sh.y);
    ctx.scale(side, 1);
    // Plank
    ctx.fillStyle = '#a07238';
    ctx.fillRect(0, -1.6, 13, 2.4);
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.6;
    ctx.strokeRect(0, -1.6, 13, 2.4);
    // Plank seams
    ctx.strokeStyle = 'rgba(40,25,15,0.6)';
    ctx.lineWidth = 0.3;
    for (const dx of [4, 7, 10]) {
      ctx.beginPath();
      ctx.moveTo(dx, -1.6);
      ctx.lineTo(dx, 0.8);
      ctx.stroke();
    }
    // Rod
    ctx.strokeStyle = '#3a2a18';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(11, -2);
    ctx.lineTo(18, -8);
    ctx.stroke();
    // Line drooping down with bobbing tip
    const bob = breeze ? Math.sin(t * 1.6) * 0.6 * br : 0;
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.35;
    ctx.beginPath();
    ctx.moveTo(18, -8);
    ctx.quadraticCurveTo(19, -2 + bob, 19 + bob * 0.3, 6);
    ctx.stroke();
    // Bob
    ctx.fillStyle = '#c9342c';
    ctx.beginPath();
    ctx.arc(19 + bob * 0.3, 6, 0.7, 0, Math.PI * 2);
    ctx.fill();
    // Bucket
    ctx.fillStyle = '#5a3a20';
    ctx.fillRect(2, -3.4, 2.5, 1.8);
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.4;
    ctx.strokeRect(2, -3.4, 2.5, 1.8);
    ctx.restore();
  }

  function modWetSheen(ctx, t, br, blob) {
    // Blue luminous rim along the underside of the blob.
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const grad = ctx.createRadialGradient(0, blob.bottomY * 0.4, 0, 0, blob.bottomY * 0.4, blob.radius * 1.5);
    grad.addColorStop(0, 'rgba(120,200,240,0)');
    grad.addColorStop(0.6, 'rgba(80,160,220,0.05)');
    grad.addColorStop(0.85, 'rgba(80,180,240,0.28)');
    grad.addColorStop(1, 'rgba(80,180,240,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, blob.bottomY * 0.4, blob.radius * 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function modPeaks(ctx, t, br, blob, opts = {}) {
    // Two sharp gray peaks rising from the surface anchor.
    const a = opts.anchor || blob.surfaceAnchor;
    const tall = opts.tall ?? 14;
    const wide = opts.wide ?? 7;
    const drawPeak = (px, py, ph, pw) => {
      ctx.beginPath();
      ctx.moveTo(px - pw, py);
      ctx.lineTo(px - pw * 0.2, py - ph);
      ctx.lineTo(px + pw * 0.1, py - ph * 0.7);
      ctx.lineTo(px + pw * 0.5, py - ph * 0.85);
      ctx.lineTo(px + pw, py);
      ctx.closePath();
      const pg = ctx.createLinearGradient(px, py - ph, px, py);
      pg.addColorStop(0, '#9aa3a8');
      pg.addColorStop(1, '#5a635a');
      ctx.fillStyle = pg;
      ctx.fill();
      ctx.strokeStyle = '#2a2417';
      ctx.lineWidth = 0.6;
      ctx.stroke();
      // Snow cap
      ctx.beginPath();
      ctx.moveTo(px - pw * 0.32, py - ph * 0.74);
      ctx.lineTo(px - pw * 0.18, py - ph);
      ctx.lineTo(px + pw * 0.06, py - ph * 0.74);
      ctx.closePath();
      ctx.fillStyle = '#f4ecd6';
      ctx.fill();
    };
    drawPeak(a.x - 2, a.y, tall, wide);
    drawPeak(a.x + 4, a.y, tall * 0.7, wide * 0.7);
  }

  function modWyvernPeak(ctx, t, br, blob, opts = {}) {
    // A peak with a wyvern silhouette perched on it, anchored to the surface.
    const ember = opts.ember === true;
    const a = opts.anchor || blob.surfaceAnchor;
    // Peak
    ctx.beginPath();
    ctx.moveTo(a.x - 7, a.y);
    ctx.lineTo(a.x - 1.5, a.y - 12);
    ctx.lineTo(a.x + 0.8, a.y - 7);
    ctx.lineTo(a.x + 7, a.y);
    ctx.closePath();
    const pg = ctx.createLinearGradient(a.x, a.y - 12, a.x, a.y);
    pg.addColorStop(0, '#6a5040');
    pg.addColorStop(1, '#3a2a22');
    ctx.fillStyle = pg;
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.6;
    ctx.stroke();
    // Wyvern perched at peak tip
    const wx = a.x - 1.5, wy = a.y - 12;
    const flap = breeze ? Math.sin(t * 3.5) * 0.6 * br : 0;
    ctx.save();
    ctx.translate(wx, wy);
    // Ember glow halo
    if (ember && br > 0.05) {
      const eg = ctx.createRadialGradient(0, -3, 0, 0, -3, 14);
      eg.addColorStop(0, `rgba(255,140,40,${0.45 * br})`);
      eg.addColorStop(1, 'rgba(255,140,40,0)');
      ctx.fillStyle = eg;
      ctx.beginPath();
      ctx.arc(0, -3, 14, 0, Math.PI * 2);
      ctx.fill();
    }
    // Body
    ctx.fillStyle = ember ? '#5a1a10' : '#2a1f18';
    ctx.beginPath();
    ctx.ellipse(0, -2, 3.6, 1.8, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head + neck
    ctx.beginPath();
    ctx.moveTo(2.2, -2.5);
    ctx.quadraticCurveTo(5, -4, 6, -5.5);
    ctx.lineTo(5, -4);
    ctx.quadraticCurveTo(4, -2.5, 2.5, -1.8);
    ctx.closePath();
    ctx.fill();
    // Tail
    ctx.beginPath();
    ctx.moveTo(-2.5, -1.8);
    ctx.quadraticCurveTo(-6, -1, -8, -3);
    ctx.lineWidth = 0.9;
    ctx.strokeStyle = ember ? '#5a1a10' : '#2a1f18';
    ctx.stroke();
    // Wings (bat-like, raised)
    ctx.fillStyle = ember ? '#7a2818' : '#3a2820';
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, 1);
      ctx.beginPath();
      const wingH = 7 + flap;
      ctx.moveTo(0, -3);
      ctx.quadraticCurveTo(side * 4, -3 - wingH, side * 8, -1 - wingH * 0.4);
      ctx.quadraticCurveTo(side * 5, -3, side * 1, -3);
      ctx.closePath();
      ctx.fill();
      // Wing finger
      ctx.strokeStyle = ember ? '#3a0a08' : '#1a1008';
      ctx.lineWidth = 0.4;
      ctx.beginPath();
      ctx.moveTo(side * 1, -3);
      ctx.lineTo(side * 7, -1 - wingH * 0.4);
      ctx.stroke();
      ctx.restore();
    }
    // Eye
    ctx.fillStyle = ember ? '#ffe080' : '#e6c060';
    ctx.beginPath();
    ctx.arc(4.4, -4.4, 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function modBellyWings(ctx, t, br, blob) {
    // Big feathered wings sprouting from underneath the island, like the
    // whole rock is a flying creature.
    const flap = breeze ? Math.sin(t * 1.8) * 0.22 * br : 0;
    for (const side of [-1, 1]) {
      ctx.save();
      // Anchor on the lower-side of the blob
      ctx.translate(blob.radius * 0.35 * side, blob.radius * 0.45);
      ctx.scale(side, 1);
      ctx.rotate(0.45 + flap);

      const wingW = blob.radius * 1.05;
      const wingH = blob.radius * 0.6;

      // Wing membrane / feathered shape
      ctx.beginPath();
      ctx.moveTo(0, -2);
      ctx.quadraticCurveTo(wingW * 0.35, -wingH * 0.35, wingW * 0.78, -wingH * 0.08);
      ctx.lineTo(wingW * 0.95, wingH * 0.05);
      // Scalloped trailing edge (primary feather tips)
      const feathers = 6;
      for (let i = 0; i < feathers; i++) {
        const f0 = i / feathers;
        const f1 = (i + 1) / feathers;
        const peakX = wingW * (0.95 - f0 * 0.85);
        const peakY = wingH * (0.05 + f0 * 0.5);
        const valleyX = wingW * (0.95 - f1 * 0.85);
        const valleyY = wingH * (0.05 + f1 * 0.5);
        ctx.quadraticCurveTo(
          peakX - wingW * 0.04, peakY + wingH * 0.16,
          valleyX, valleyY
        );
      }
      ctx.lineTo(wingW * 0.12, wingH * 0.35);
      ctx.quadraticCurveTo(wingW * 0.04, wingH * 0.15, 0, -2);
      ctx.closePath();

      const wg = ctx.createLinearGradient(0, -wingH * 0.4, wingW * 0.5, wingH * 0.5);
      wg.addColorStop(0, '#fefdf6');
      wg.addColorStop(0.5, '#e8e2cc');
      wg.addColorStop(1, '#9ea58e');
      ctx.fillStyle = wg;
      ctx.fill();
      ctx.strokeStyle = '#2a2417';
      ctx.lineWidth = 0.6;
      ctx.stroke();

      // Feather shafts radiating from the shoulder
      ctx.strokeStyle = 'rgba(60,45,25,0.55)';
      ctx.lineWidth = 0.4;
      for (let i = 0; i < 6; i++) {
        const f = i / 5;
        const tipX = wingW * (0.2 + f * 0.7);
        const tipY = wingH * (0.05 + f * 0.45);
        ctx.beginPath();
        ctx.moveTo(wingW * 0.05, -wingH * 0.05);
        ctx.quadraticCurveTo(tipX * 0.55, tipY * 0.4, tipX, tipY);
        ctx.stroke();
      }
      // Shoulder bone shading
      ctx.fillStyle = 'rgba(60,45,25,0.35)';
      ctx.beginPath();
      ctx.ellipse(wingW * 0.06, -wingH * 0.05, 2.4, 1.4, 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function modSunHalo(ctx, t, br, blob) {
    // Soft glowing sun disk behind the island. Pulses gently with breeze.
    const pulse = 1 + (breeze ? Math.sin(t * 0.8) * 0.04 * br : 0);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const R = blob.radius * 1.55 * pulse;
    const grad = ctx.createRadialGradient(-blob.radius * 0.1, -blob.radius * 0.25, 0,
                                          -blob.radius * 0.1, -blob.radius * 0.25, R);
    grad.addColorStop(0, 'rgba(255,235,140,0.7)');
    grad.addColorStop(0.5, 'rgba(255,200,100,0.32)');
    grad.addColorStop(1, 'rgba(255,180,80,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(-blob.radius * 0.1, -blob.radius * 0.25, R, 0, Math.PI * 2);
    ctx.fill();
    // Rays
    ctx.strokeStyle = 'rgba(255,220,140,0.6)';
    ctx.lineWidth = 0.7;
    const cx = -blob.radius * 0.1, cy = -blob.radius * 0.25;
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2 + t * 0.05;
      const r1 = blob.radius * 0.9, r2 = blob.radius * 1.15;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
      ctx.lineTo(cx + Math.cos(a) * r2, cy + Math.sin(a) * r2);
      ctx.stroke();
    }
    ctx.restore();
  }

  function modMine(ctx, t, br, blob, opts = {}) {
    // Mine adit with timber frame, hanging lantern, rails coming out, a
    // minecart full of ore, and an ore tailings heap.
    const side = opts.side ?? -1;
    const sh = side < 0 ? blob.leftShoulder : blob.rightShoulder;
    ctx.save();
    ctx.translate(sh.x, sh.y + 7);
    ctx.scale(side, 1);
    // Lantern glow halo (behind everything)
    if (br > 0.05) {
      const glow = ctx.createRadialGradient(-3.5, -4.5, 0, -3.5, -4.5, 7);
      glow.addColorStop(0, `rgba(255,200,110,${0.7 * br})`);
      glow.addColorStop(1, 'rgba(255,200,110,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(-3.5, -4.5, 7, 0, Math.PI * 2);
      ctx.fill();
    }
    // Dark interior (bigger adit)
    ctx.fillStyle = '#0a0805';
    ctx.beginPath();
    ctx.moveTo(-7, 0.5);
    ctx.lineTo(-7, -6);
    ctx.quadraticCurveTo(-3.5, -10, 0, -6);
    ctx.lineTo(0, 0.5);
    ctx.closePath();
    ctx.fill();
    // Thicker timber frame
    ctx.strokeStyle = '#6b4423';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(-7.2, 0.5);
    ctx.lineTo(-7.2, -6);
    ctx.quadraticCurveTo(-3.5, -10.2, 0.2, -6);
    ctx.lineTo(0.2, 0.5);
    ctx.stroke();
    // Cross-beam (header)
    ctx.beginPath();
    ctx.moveTo(-7.6, -6);
    ctx.lineTo(0.6, -6);
    ctx.lineWidth = 1.6;
    ctx.stroke();
    // Plank/grain marks
    ctx.strokeStyle = 'rgba(40,25,10,0.6)';
    ctx.lineWidth = 0.4;
    for (let dy = -1; dy >= -5; dy -= 1.6) {
      ctx.beginPath();
      ctx.moveTo(-7.6, dy);
      ctx.lineTo(-6.6, dy);
      ctx.moveTo(-0.4, dy);
      ctx.lineTo(0.6, dy);
      ctx.stroke();
    }
    // Hanging lantern inside
    ctx.strokeStyle = '#2a1410';
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.moveTo(-3.5, -6);
    ctx.lineTo(-3.5, -5);
    ctx.stroke();
    ctx.fillStyle = '#ffd048';
    ctx.beginPath();
    ctx.arc(-3.5, -4.2, 1.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#2a1410';
    ctx.lineWidth = 0.4;
    ctx.stroke();
    // Rails coming out
    ctx.strokeStyle = '#3a2818';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(-6, 0.5); ctx.lineTo(7, 1);
    ctx.moveTo(-6, 1.5); ctx.lineTo(7, 2);
    ctx.stroke();
    // Rail ties
    ctx.fillStyle = '#3a2818';
    for (let dx = -5; dx < 7; dx += 1.6) {
      ctx.fillRect(dx, 0.3, 0.4, 1.6);
    }
    // Minecart
    ctx.fillStyle = '#7a3a2a';
    ctx.fillRect(2, -3.5, 4.5, 3.5);
    ctx.strokeStyle = '#2a1410';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(2, -3.5, 4.5, 3.5);
    // Ore in cart
    ctx.fillStyle = '#caa46a';
    ctx.beginPath();
    ctx.arc(3, -3.4, 0.7, 0, Math.PI * 2);
    ctx.arc(4.5, -3.7, 0.8, 0, Math.PI * 2);
    ctx.arc(5.6, -3.4, 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e6b03a';
    ctx.beginPath();
    ctx.arc(3.5, -3.6, 0.3, 0, Math.PI * 2);
    ctx.arc(5, -3.9, 0.3, 0, Math.PI * 2);
    ctx.fill();
    // Wheels
    ctx.fillStyle = '#1a1208';
    ctx.beginPath();
    ctx.arc(3, 0.5, 0.9, 0, Math.PI * 2);
    ctx.arc(5.5, 0.5, 0.9, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#5a4030';
    ctx.beginPath();
    ctx.arc(3, 0.5, 0.3, 0, Math.PI * 2);
    ctx.arc(5.5, 0.5, 0.3, 0, Math.PI * 2);
    ctx.fill();
    // Tailings heap further out
    ctx.fillStyle = '#6a4a30';
    ctx.beginPath();
    ctx.ellipse(9.5, 2, 3.6, 1.6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#3a2418';
    ctx.lineWidth = 0.4;
    ctx.stroke();
    // Bright ore chunks on the heap
    ctx.fillStyle = '#e6b03a';
    for (const [dx, dy] of [[8.4, 1.4], [9.6, 1.2], [10.6, 1.8], [9.2, 2.4]]) {
      ctx.beginPath();
      ctx.arc(dx, dy, 0.55, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function modSeashellTower(ctx, t, br, blob, opts = {}) {
    // Architectural tower with horizontal shell-like spiral bands.
    // Anchored on the surface so it sits within the silhouette.
    const a = opts.anchor || blob.surfaceAnchor;
    ctx.save();
    ctx.translate(a.x, a.y);
    // Tapered body — straight tower lines, not organic curves
    ctx.beginPath();
    ctx.moveTo(-4, 0);
    ctx.lineTo(-2.4, -13);
    ctx.lineTo(2.4, -13);
    ctx.lineTo(4, 0);
    ctx.closePath();
    const tg = ctx.createLinearGradient(-4, 0, 4, 0);
    tg.addColorStop(0, '#caa46a');
    tg.addColorStop(0.5, '#f4d6a8');
    tg.addColorStop(1, '#caa46a');
    ctx.fillStyle = tg;
    ctx.fill();
    ctx.strokeStyle = '#3a2418';
    ctx.lineWidth = 0.6;
    ctx.stroke();
    // Spiral shell bands — horizontal curves wrapping the tower
    ctx.strokeStyle = 'rgba(80,40,20,0.65)';
    ctx.lineWidth = 0.5;
    for (let i = 1; i <= 4; i++) {
      const y = -i * 2.6;
      const xR = 4 - (i / 4) * 1.6;
      ctx.beginPath();
      ctx.moveTo(-xR, y);
      ctx.quadraticCurveTo(0, y + 0.5, xR, y);
      ctx.stroke();
      // Tiny tick mark on one side suggests the spiral wrap continuation
      ctx.beginPath();
      ctx.moveTo(xR, y);
      ctx.lineTo(xR - 0.6, y + 0.6);
      ctx.stroke();
    }
    // Conical roof
    ctx.beginPath();
    ctx.moveTo(-2.8, -13);
    ctx.lineTo(0, -18);
    ctx.lineTo(2.8, -13);
    ctx.closePath();
    ctx.fillStyle = '#9a4438';
    ctx.fill();
    ctx.strokeStyle = '#2a1410';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    // Finial pearl
    ctx.fillStyle = '#f4d6a8';
    ctx.beginPath();
    ctx.arc(0, -18.4, 0.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#3a2418';
    ctx.lineWidth = 0.4;
    ctx.stroke();
    // Door at base
    ctx.fillStyle = '#2a1f12';
    ctx.beginPath();
    ctx.moveTo(-1, 0);
    ctx.lineTo(-1, -2.2);
    ctx.quadraticCurveTo(0, -3, 1, -2.2);
    ctx.lineTo(1, 0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function modVolcano(ctx, t, br, blob, opts = {}) {
    // Cone + smoke plume + lava-glow rim, anchored to the surface.
    const a = opts.anchor || blob.surfaceAnchor;
    const scale = opts.scale ?? 1;
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.scale(scale, scale);
    // Cone
    ctx.beginPath();
    ctx.moveTo(-8, 0);
    ctx.lineTo(-2.5, -10);
    ctx.lineTo(2.5, -10);
    ctx.lineTo(8, 0);
    ctx.closePath();
    const cg = ctx.createLinearGradient(0, -10, 0, 0);
    cg.addColorStop(0, '#3a2a22');
    cg.addColorStop(1, '#1a120a');
    ctx.fillStyle = cg;
    ctx.fill();
    ctx.strokeStyle = '#1a0c08';
    ctx.lineWidth = 0.6;
    ctx.stroke();
    // Crater rim
    ctx.fillStyle = '#ff7a30';
    ctx.beginPath();
    ctx.ellipse(0, -10, 2.5, 0.9, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffd048';
    ctx.beginPath();
    ctx.ellipse(0, -10, 1.4, 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // Lava drips
    ctx.strokeStyle = '#ff5020';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(-1, -9.5); ctx.lineTo(-2.5, -3.5);
    ctx.moveTo(1.4, -9.5); ctx.lineTo(3, -3);
    ctx.stroke();
    // Smoke plume
    if (br > 0.05) {
      ctx.save();
      ctx.globalAlpha = 0.55 * br;
      for (let i = 0; i < 3; i++) {
        const ph = (t * 0.6 + i / 3) % 1;
        const py = -10 - ph * 18;
        const pr = 1.4 + ph * 3;
        const px = Math.sin((ph + i) * 4) * 1.4;
        ctx.fillStyle = `rgba(60,55,55,${0.7 - ph * 0.5})`;
        ctx.beginPath();
        ctx.arc(px, py, pr, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    ctx.restore();
  }

  function modOvergrown(ctx, t, br, blob, opts = {}) {
    // Dense overgrown cluster — a tight grove of skeletal trees with
    // brambles wrapping them and a cluster of dead red flowers around the
    // base. Concentrated, not spread along the rim.
    const a = opts.anchor || blob.surfaceAnchor;
    const seed = opts.seed ?? 7;
    const r = makeRng(seed + 31);
    const sway = breeze ? Math.sin(t * 1.2) * 0.05 * br : 0;
    // Cluster of 5 twisted dead trees, tightly packed near the surface anchor
    const trees = [
      { dx: -7,  dy:  3,  h: 12, lean:  0.4 },
      { dx: -2,  dy:  1,  h: 17, lean: -0.3 },
      { dx:  3,  dy:  2,  h: 14, lean:  0.2 },
      { dx:  8,  dy:  4,  h: 11, lean: -0.4 },
      { dx:  0,  dy:  5,  h:  9, lean:  0.1 },
    ];
    for (const tr of trees) {
      ctx.save();
      ctx.translate(a.x + tr.dx, a.y + tr.dy);
      ctx.rotate(sway + tr.lean * 0.2 + (r() - 0.5) * 0.1);
      // Gnarled black trunk
      ctx.strokeStyle = '#0e0a06';
      ctx.lineWidth = 1.3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(1.6, -tr.h * 0.4, -1.2, -tr.h * 0.7);
      ctx.quadraticCurveTo(-2.4, -tr.h * 0.95, 0.4, -tr.h);
      ctx.stroke();
      // Skeletal branches — short, sharp, asymmetric
      ctx.lineWidth = 0.6;
      const branches = [
        [0.5, -tr.h * 0.45, -1.2, -tr.h * 0.4 - 2.6],
        [-0.6, -tr.h * 0.6,  2.5, -tr.h * 0.55],
        [-0.9, -tr.h * 0.78, -3,  -tr.h * 0.85],
        [0.2, -tr.h * 0.9,   2.2, -tr.h * 1.02],
      ];
      for (const [x1, y1, x2, y2] of branches) {
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.quadraticCurveTo((x1 + x2) / 2 - 0.5, (y1 + y2) / 2, x2, y2);
        // Thorn off the branch
        const tx = (x1 + x2) / 2;
        const ty = (y1 + y2) / 2;
        ctx.moveTo(tx, ty);
        ctx.lineTo(tx + (x2 < x1 ? -0.9 : 0.9), ty - 0.6);
        ctx.stroke();
      }
      // Very sparse dark leaves
      ctx.fillStyle = '#1c2818';
      for (let i = 0; i < 2; i++) {
        const lx = (r() - 0.5) * 4.5;
        const ly = -tr.h * (0.7 + r() * 0.3);
        ctx.beginPath();
        ctx.ellipse(lx, ly, 1.4, 0.7, r() * Math.PI, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    // Brambles ringing the cluster base — curved strokes with thorn barbs
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.strokeStyle = '#2a2018';
    ctx.lineWidth = 0.7;
    for (let i = 0; i < 16; i++) {
      const ang = (i / 16) * Math.PI * 2;
      const r1 = 5 + r() * 2;
      const r2 = r1 + 2.5 + r() * 1.5;
      const yBias = 3; // sit around the lower half of the cluster
      const x1 = Math.cos(ang) * r1;
      const y1 = Math.sin(ang) * r1 * 0.65 + yBias;
      const x2 = Math.cos(ang) * r2;
      const y2 = Math.sin(ang) * r2 * 0.65 + yBias;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.quadraticCurveTo(
        (x1 + x2) / 2 + (r() - 0.5) * 1.6,
        (y1 + y2) / 2 + (r() - 0.5) * 1.6,
        x2, y2
      );
      ctx.stroke();
      // Thorn barb
      const mx = (x1 + x2) / 2;
      const my = (y1 + y2) / 2;
      ctx.beginPath();
      ctx.moveTo(mx, my);
      ctx.lineTo(mx + Math.cos(ang) * 1.4, my + Math.sin(ang) * 1.4 - 0.4);
      ctx.stroke();
    }
    ctx.restore();
    // Cluster of dead red flowers at the base
    for (const [dx, dy] of [[-5, 6], [-1, 7], [3, 6.5], [6, 7], [9, 6]]) {
      const fx = a.x + dx, fy = a.y + dy;
      ctx.fillStyle = '#a82838';
      ctx.beginPath();
      ctx.arc(fx, fy, 1.0, 0, Math.PI * 2);
      ctx.fill();
      // Dark center
      ctx.fillStyle = '#3a1418';
      ctx.beginPath();
      ctx.arc(fx, fy, 0.35, 0, Math.PI * 2);
      ctx.fill();
      // Tiny stem
      ctx.strokeStyle = '#2a2018';
      ctx.lineWidth = 0.4;
      ctx.beginPath();
      ctx.moveTo(fx, fy + 1);
      ctx.lineTo(fx, fy + 2.4);
      ctx.stroke();
    }
  }

  function modWarBanner(ctx, t, br, blob, opts = {}) {
    // Heraldic standard — pole with a rectangular banner bearing crossed
    // swords. Reads as martial without looking like a flag on a pin.
    const a = opts.anchor || blob.surfaceAnchor;
    ctx.save();
    ctx.translate(a.x, a.y);
    // Stone footing
    ctx.fillStyle = '#7a7568';
    ctx.fillRect(-3, -1, 6, 2);
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(-3, -1, 6, 2);
    // Stone block detail
    ctx.beginPath();
    ctx.moveTo(0, -1);
    ctx.lineTo(0, 1);
    ctx.stroke();
    // Pole
    ctx.strokeStyle = '#3a2a18';
    ctx.lineWidth = 1.3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -1);
    ctx.lineTo(0, -15);
    ctx.stroke();
    // Spear-tip finial
    ctx.fillStyle = '#cfd6dc';
    ctx.beginPath();
    ctx.moveTo(0, -17);
    ctx.lineTo(-0.8, -15);
    ctx.lineTo(0.8, -15);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.4;
    ctx.stroke();
    // Crossbeam the banner hangs from
    ctx.strokeStyle = '#3a2a18';
    ctx.lineWidth = 0.9;
    ctx.beginPath();
    ctx.moveTo(-0.5, -13);
    ctx.lineTo(7, -13);
    ctx.stroke();
    // Rectangular banner, bottom hem flutters slightly
    const flutter = breeze ? Math.sin(t * 3) * 0.4 * br : 0;
    ctx.fillStyle = '#7a2018';
    ctx.beginPath();
    ctx.moveTo(0, -13);
    ctx.lineTo(7, -13);
    ctx.lineTo(7, -6.5);
    ctx.lineTo(5 + flutter, -5.4);
    ctx.lineTo(2 - flutter * 0.5, -6.4);
    ctx.lineTo(0, -5.8);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#3a0a08';
    ctx.lineWidth = 0.4;
    ctx.stroke();
    // Gold trim along top
    ctx.strokeStyle = '#e6b03a';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(0.4, -12.2);
    ctx.lineTo(6.6, -12.2);
    ctx.stroke();
    // Crossed swords emblem
    ctx.strokeStyle = '#f0e8d0';
    ctx.lineWidth = 0.8;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(1.6, -11); ctx.lineTo(5.4, -7.6);
    ctx.moveTo(5.4, -11); ctx.lineTo(1.6, -7.6);
    ctx.stroke();
    // Sword pommels (small dots at hilt ends)
    ctx.fillStyle = '#e6b03a';
    ctx.beginPath();
    ctx.arc(1.6, -11, 0.5, 0, Math.PI * 2);
    ctx.arc(5.4, -11, 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function modLighthouse(ctx, t, br, blob, opts = {}) {
    // From the kid's sketch: a tall thin striped tower with a pointed top
    // and fixed beam lines radiating outward (plus a soft sweeping beam).
    const a = opts.anchor || blob.surfaceAnchor;
    ctx.save();
    ctx.translate(a.x, a.y);
    // Narrow base block
    ctx.fillStyle = '#d8d3c0';
    ctx.fillRect(-2.6, -1, 5.2, 1.6);
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(-2.6, -1, 5.2, 1.6);
    // Tower shaft — alternating red/white stripes
    const tw = 3.6, th = 17;
    const stripes = 6;
    for (let i = 0; i < stripes; i++) {
      const y = -1 - (i + 1) * (th / stripes);
      ctx.fillStyle = (i % 2 === 0) ? '#c9342c' : '#f4ecd6';
      ctx.fillRect(-tw / 2, y, tw, th / stripes + 0.3);
    }
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(-tw / 2, -1 - th, tw, th);
    // Lamp housing — small box at the top of the shaft
    const lampY = -1 - th;
    ctx.fillStyle = '#f8e89a';
    ctx.fillRect(-tw / 2 + 0.2, lampY - 2.2, tw - 0.4, 2.2);
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(-tw / 2 + 0.2, lampY - 2.2, tw - 0.4, 2.2);
    // Pointed top (matches the sketch — pointed, not domed)
    ctx.fillStyle = '#3a3022';
    ctx.beginPath();
    ctx.moveTo(-tw / 2 - 0.2, lampY - 2.2);
    ctx.lineTo(0, lampY - 6);
    ctx.lineTo(tw / 2 + 0.2, lampY - 2.2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Lamp center (bright dot inside housing)
    ctx.fillStyle = '#fff4a8';
    ctx.beginPath();
    ctx.arc(0, lampY - 1.1, 0.7, 0, Math.PI * 2);
    ctx.fill();
    // Fixed radiating beam lines, matching the sketch — five rays fanning
    // out from the lamp, brightness pulses gently.
    if (br > 0.05) {
      const pulse = 0.55 + 0.45 * (0.5 + 0.5 * Math.sin(t * 2));
      ctx.strokeStyle = `rgba(255,232,140,${0.75 * br * pulse})`;
      ctx.lineWidth = 0.7;
      ctx.lineCap = 'round';
      const cx = 0, cy = lampY - 1.1;
      const rays = [
        [-1.4, 0],   // left horizontal
        [-1.0, -0.7], // upper-left
        [0,    -1],  // straight up
        [1.0,  -0.7], // upper-right
        [1.4,  0],   // right horizontal
      ];
      for (const [dx, dy] of rays) {
        const len = 10;
        ctx.beginPath();
        ctx.moveTo(cx + dx * 2, cy + dy * 2);
        ctx.lineTo(cx + dx * len, cy + dy * len);
        ctx.stroke();
      }
      // Soft halo around the lamp
      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 6);
      glow.addColorStop(0, `rgba(255,232,140,${0.55 * br * pulse})`);
      glow.addColorStop(1, 'rgba(255,232,140,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cy, 6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ---------- Master draw function for name-modifier cards ----------
  // Draws auras under the blob, then the blob itself, then surface- and
  // side-anchored modifiers. Top-anchored modifiers sit at blob.surfaceAnchor
  // (the upper-left "deck spot" where the highlight used to be).
  function drawNamedIsland(ctx, t, br, seed, mods) {
    mods = mods || [];
    const has = m => mods.includes(m);
    const volcanic = has('asha');

    // Sol + spire/watch promotes to a lighthouse (kid's request).
    const lighthouseCombo = has('sol') && (has('spire') || has('watch'));

    // A "top-anchored" modifier replaces the highlight on the blob.
    const hasTopMod = lighthouseCombo
      || has('keep') || has('crest')
      || has('spire') || has('watch')
      || has('asha')
      || has('wyn') || has('pyre')
      || has('crag') || has('reach')
      || has('helm') || has('mel');

    // Auras and big things drawn behind the blob need a stub reference
    // (radius/shoulders only) before drawBlob runs.
    const stub = {
      radius: 36,
      topY: -30, bottomY: 34,
      leftShoulder: { x: -27, y: -5 },
      rightShoulder: { x: 27, y: -5 },
    };
    if (has('sol'))  modSunHalo(ctx, t, br, stub);
    if (has('tide')) modWetSheen(ctx, t, br, stub);
    if (has('wing') || has('aer')) modBellyWings(ctx, t, br, stub);

    // The blob itself.
    const blob = drawBlob(ctx, t, br, { seed, volcanic, skipHighlight: hasTopMod });

    // Top-anchored modifier. Combinations are handled explicitly:
    //   sol + spire → lighthouse (combo)
    //   asha + keep → volcano at anchor, castle offset down-right and shrunk
    //   wyn/pyre (+ optional crag) → wyvern-on-peak (peak is part of mod)
    //   crag/reach alone → bare peaks
    //   single top mod → its own drawer at anchor
    if (lighthouseCombo) {
      modLighthouse(ctx, t, br, blob);
    } else if (has('asha') && (has('keep') || has('crest'))) {
      modVolcano(ctx, t, br, blob);
      const anchor = {
        x: blob.surfaceAnchor.x + 13,
        y: blob.surfaceAnchor.y + 5,
      };
      modCastle(ctx, t, br, blob, { anchor, scale: 0.7 });
    } else if (has('wyn') || has('pyre')) {
      modWyvernPeak(ctx, t, br, blob, { ember: has('pyre') });
    } else if (has('asha')) {
      modVolcano(ctx, t, br, blob);
    } else if (has('crag') || has('reach')) {
      modPeaks(ctx, t, br, blob);
    } else if (has('keep') || has('crest')) {
      modCastle(ctx, t, br, blob);
    } else if (has('spire') || has('watch')) {
      modSeashellTower(ctx, t, br, blob);
    } else if (has('helm') || has('mel')) {
      modWarBanner(ctx, t, br, blob);
    }

    // Side-anchored modifiers (mine on left, dock on right).
    if (has('glen') || has('dell')) modMine(ctx, t, br, blob, { side: -1 });
    if (has('tide')) modDock(ctx, t, br, blob, { side: 1 });

    // Overgrown cluster anchored on the surface (drawn last so brambles
    // can wrap any nearby props).
    if (has('hollow') || has('thorn')) modOvergrown(ctx, t, br, blob, { seed });
  }

  function drawTropical(ctx, t, br) {
    const w = 24;
    drawIslandBody(ctx, w, {
      seed: 41, spikeCount: 5, spikeDepth: 16,
      grassA: '#d9c98a', grassB: '#8aa05c', rock: '#3d4a2c'
    });
    // Sand crown
    ctx.beginPath();
    ctx.moveTo(-w + 2, 0);
    ctx.quadraticCurveTo(0, -4, w - 2, 0);
    ctx.lineTo(w - 2, 1);
    ctx.lineTo(-w + 2, 1);
    ctx.closePath();
    ctx.fillStyle = 'rgba(232,210,150,0.85)';
    ctx.fill();

    // Palm tree — curved trunk + drooping fronds
    const sway = breeze ? Math.sin(t * 1.8) * 0.05 * br : 0;
    ctx.save();
    ctx.translate(-4, -1);
    ctx.rotate(sway);
    // trunk
    ctx.beginPath();
    ctx.moveTo(-1.4, 0);
    ctx.quadraticCurveTo(-3, -8, -1.5, -16);
    ctx.quadraticCurveTo(-0.5, -18, 1, -19);
    ctx.lineWidth = 2.2;
    ctx.strokeStyle = '#6b4423';
    ctx.lineCap = 'round';
    ctx.stroke();
    // trunk segments
    ctx.lineWidth = 0.4;
    ctx.strokeStyle = 'rgba(20,15,10,0.5)';
    for (let i = 1; i < 5; i++) {
      const yy = -i * 4;
      ctx.beginPath();
      ctx.moveTo(-2, yy);
      ctx.lineTo(2, yy);
      ctx.stroke();
    }
    // fronds — five, drooping
    ctx.translate(1, -19);
    const frondAngles = [-1.8, -1.0, -0.2, 0.6, 1.4];
    for (const a of frondAngles) {
      ctx.save();
      ctx.rotate(a + Math.sin(t * 2.4 + a) * 0.08 * (breeze ? br : 0));
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(5, -1, 11, 4);
      ctx.lineWidth = 1.4;
      ctx.strokeStyle = '#3f6a2a';
      ctx.stroke();
      // leaflets
      ctx.lineWidth = 0.7;
      ctx.strokeStyle = '#4f8a36';
      for (let k = 1; k <= 5; k++) {
        const f = k / 6;
        const fx = 11 * f + 0.5;
        const fy = -1 + 5 * f * f;
        ctx.beginPath();
        ctx.moveTo(fx, fy);
        ctx.lineTo(fx + 1.4, fy + 3);
        ctx.stroke();
      }
      ctx.restore();
    }
    // coconuts
    ctx.fillStyle = '#3b2a18';
    ctx.beginPath(); ctx.arc(-0.5, 1.5, 0.9, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(1.4, 1.2, 0.9, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // Flower clump on right
    ctx.save();
    ctx.translate(10, -1);
    for (const [dx, dy, col] of [[-1, -1, '#d8506a'], [1, -2, '#e6b03a'], [0, -3, '#d8506a'], [2, -1, '#e6b03a']]) {
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.arc(dx, dy, 0.9, 0, Math.PI * 2);
      ctx.fill();
    }
    // grass tufts
    ctx.strokeStyle = '#3f6a2a';
    ctx.lineWidth = 0.6;
    for (const x of [-12, 14, 16]) {
      ctx.beginPath();
      ctx.moveTo(x - 10, 0);
      ctx.lineTo(x - 9, -3);
      ctx.moveTo(x - 9, 0);
      ctx.lineTo(x - 8, -2.5);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawLighthouse(ctx, t, br) {
    const w = 18;
    drawIslandBody(ctx, w, {
      seed: 88, spikeCount: 4, spikeDepth: 26, topWobble: 0.6,
      grassA: '#8a957a', grassB: '#5e6a52', rock: '#3a3a30'
    });
    // Rocky base ring
    ctx.fillStyle = '#7c8174';
    ctx.beginPath();
    ctx.ellipse(0, -1, w * 0.7, 2.2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(20,25,15,0.6)';
    ctx.lineWidth = 0.6;
    ctx.stroke();

    // Tower — striped red/white, tall and narrow
    ctx.save();
    ctx.translate(0, -3);
    const tw = 7, th = 34;
    // base block
    ctx.fillStyle = '#d8d3c0';
    ctx.fillRect(-tw / 2 - 0.8, -2, tw + 1.6, 3);
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.strokeRect(-tw / 2 - 0.8, -2, tw + 1.6, 3);
    // stripes (4 alternating from top to bottom of shaft)
    const stripes = 5;
    for (let i = 0; i < stripes; i++) {
      const y = -2 - (i + 1) * (th / stripes);
      ctx.fillStyle = (i % 2 === 0) ? '#c9342c' : '#f4ecd6';
      ctx.fillRect(-tw / 2, y, tw, th / stripes + 0.5);
    }
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.strokeRect(-tw / 2, -2 - th, tw, th);
    // gallery
    ctx.fillStyle = '#3a3022';
    ctx.fillRect(-tw / 2 - 1.4, -2 - th - 2, tw + 2.8, 2);
    ctx.strokeRect(-tw / 2 - 1.4, -2 - th - 2, tw + 2.8, 2);
    // lamp housing
    ctx.fillStyle = '#f8e89a';
    ctx.beginPath();
    ctx.rect(-tw / 2 + 1, -2 - th - 6, tw - 2, 4);
    ctx.fill();
    ctx.stroke();
    // dome top
    ctx.fillStyle = '#3a3022';
    ctx.beginPath();
    ctx.moveTo(-tw / 2 + 0.5, -2 - th - 6);
    ctx.quadraticCurveTo(0, -2 - th - 12, tw / 2 - 0.5, -2 - th - 6);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // finial
    ctx.beginPath();
    ctx.moveTo(0, -2 - th - 11);
    ctx.lineTo(0, -2 - th - 14);
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Sweeping beam (only when breezy / "lit")
    if (br > 0.05) {
      const beamAng = t * 1.2;
      const cx = 0, cy = -2 - th - 4;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(beamAng);
      const beamGrad = ctx.createLinearGradient(0, 0, 36, 0);
      beamGrad.addColorStop(0, `rgba(255,232,140,${0.55 * br})`);
      beamGrad.addColorStop(1, 'rgba(255,232,140,0)');
      ctx.fillStyle = beamGrad;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(38, -7);
      ctx.lineTo(38, 7);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      // halo
      ctx.beginPath();
      ctx.arc(cx, cy, 3.2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,232,140,${0.6 * br})`;
      ctx.fill();
    }
    ctx.restore();
  }

  function drawSignpost(ctx, t, br) {
    const w = 22;
    // Bob the whole cloud
    const cloudBob = breeze ? Math.sin(t * 0.9) * 0.6 * br : 0;
    ctx.save();
    ctx.translate(0, cloudBob);
    drawCloudBody(ctx, w, { r: 7, y: 2 });

    // Wooden post
    ctx.save();
    ctx.translate(0, -1);
    ctx.fillStyle = '#7a5a32';
    ctx.fillRect(-1, -16, 2, 16);
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.strokeRect(-1, -16, 2, 16);
    // grain lines
    ctx.strokeStyle = 'rgba(30,20,10,0.55)';
    ctx.lineWidth = 0.3;
    for (let i = -14; i < 0; i += 4) {
      ctx.beginPath();
      ctx.moveTo(-1, i);
      ctx.lineTo(1, i);
      ctx.stroke();
    }

    // Arrow plank — points off to the upper right; tiny wobble in breeze
    const arrowWobble = breeze ? Math.sin(t * 2.2) * 0.04 * br : 0;
    ctx.save();
    ctx.translate(0, -16);
    ctx.rotate(-0.12 + arrowWobble);
    ctx.beginPath();
    ctx.moveTo(-6, -3);
    ctx.lineTo(8, -3);
    ctx.lineTo(13, 0);
    ctx.lineTo(8, 3);
    ctx.lineTo(-6, 3);
    ctx.closePath();
    ctx.fillStyle = '#a07238';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // arrow tail notch
    ctx.beginPath();
    ctx.moveTo(-6, -3);
    ctx.lineTo(-3, 0);
    ctx.lineTo(-6, 3);
    ctx.strokeStyle = 'rgba(30,20,10,0.7)';
    ctx.lineWidth = 0.6;
    ctx.stroke();
    // nail/dot
    ctx.fillStyle = '#2a2417';
    ctx.beginPath();
    ctx.arc(0, 0, 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.restore();
    ctx.restore();
  }

  function drawCity(ctx, t, br) {
    const w = 56;
    drawIslandBody(ctx, w, {
      seed: 17, spikeCount: 7, spikeDepth: 28,
      grassA: '#8a8478', grassB: '#5a564c', rock: '#383428'
    });

    // Plaza strip
    ctx.fillStyle = '#c8b88c';
    ctx.fillRect(-w + 4, -1, 2 * (w - 4), 2);
    ctx.strokeStyle = 'rgba(40,30,20,0.5)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(-w + 4, -1, 2 * (w - 4), 2);

    // Buildings, left-to-right. [x, width, height, palette, opts]
    const buildings = [
      { x: -w + 8,  bw: 7,  bh: 14, fill: '#d9c4a0', roof: '#8a4f3a' },
      { x: -w + 17, bw: 8,  bh: 22, fill: '#cdb38e', roof: '#7a4030', tall: true },
      { x: -w + 28, bw: 11, bh: 18, fill: '#e0d2b4', roof: '#7a4030', dome: true },
      { x: -w + 42, bw: 7,  bh: 12, fill: '#cdb78a', roof: '#7a4030' },
      { x: -w + 52, bw: 9,  bh: 26, fill: '#d6c198', roof: '#7a4030', tall: true },
      { x: -w + 64, bw: 7,  bh: 15, fill: '#dac39c', roof: '#7a4030' },
      { x: -w + 74, bw: 10, bh: 19, fill: '#d2bd92', roof: '#7a4030' },
      { x: -w + 88, bw: 8,  bh: 13, fill: '#c9b48e', roof: '#7a4030' },
      { x: -w + 100,bw: 9,  bh: 21, fill: '#d6c198', roof: '#7a4030', tall: true },
    ];

    for (let i = 0; i < buildings.length; i++) {
      const b = buildings[i];
      // walls
      ctx.fillStyle = b.fill;
      ctx.fillRect(b.x, -1 - b.bh, b.bw, b.bh);
      ctx.strokeStyle = '#2a2417';
      ctx.lineWidth = 0.7;
      ctx.strokeRect(b.x, -1 - b.bh, b.bw, b.bh);

      // windows — small grid
      const cols = Math.max(2, Math.floor(b.bw / 2.2));
      const rows = Math.max(2, Math.floor(b.bh / 3.5));
      for (let cy = 0; cy < rows; cy++) {
        for (let cx = 0; cx < cols; cx++) {
          const wx = b.x + 1 + cx * (b.bw - 2) / Math.max(1, cols - 1) - 0.4;
          const wy = -1 - b.bh + 2 + cy * (b.bh - 3) / Math.max(1, rows - 1);
          // flicker subset
          const lit = ((cy * 31 + cx * 17 + i * 7) % 5) <= 1;
          const flick = lit ? (0.6 + 0.4 * Math.abs(Math.sin(t * 2 + cx + cy * 0.7 + i)) * (breeze ? 1 : 0.4)) : 0;
          ctx.fillStyle = lit ? `rgba(255,210,120,${0.45 + flick * 0.4})` : 'rgba(40,30,20,0.55)';
          ctx.fillRect(wx, wy, 0.9, 1.3);
        }
      }

      // roof — dome or flat or peaked
      if (b.dome) {
        // domed civic building
        ctx.fillStyle = b.roof;
        ctx.beginPath();
        ctx.moveTo(b.x - 0.5, -1 - b.bh + 0.5);
        ctx.quadraticCurveTo(b.x + b.bw / 2, -1 - b.bh - b.bw * 0.7, b.x + b.bw + 0.5, -1 - b.bh + 0.5);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#2a2417';
        ctx.lineWidth = 0.7;
        ctx.stroke();
        // finial
        ctx.fillStyle = '#e6b03a';
        ctx.beginPath();
        ctx.arc(b.x + b.bw / 2, -1 - b.bh - b.bw * 0.7 + 1, 0.9, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(b.x + b.bw / 2, -1 - b.bh - b.bw * 0.7);
        ctx.lineTo(b.x + b.bw / 2, -1 - b.bh - b.bw * 0.7 - 2.5);
        ctx.strokeStyle = '#2a2417';
        ctx.stroke();
      } else if (b.tall) {
        // flat roof with parapet
        ctx.fillStyle = b.roof;
        ctx.fillRect(b.x - 0.5, -1 - b.bh - 1.4, b.bw + 1, 1.4);
        ctx.strokeStyle = '#2a2417';
        ctx.strokeRect(b.x - 0.5, -1 - b.bh - 1.4, b.bw + 1, 1.4);
      } else {
        // shallow pitched roof
        ctx.fillStyle = b.roof;
        ctx.beginPath();
        ctx.moveTo(b.x - 0.6, -1 - b.bh);
        ctx.lineTo(b.x + b.bw / 2, -1 - b.bh - 2.4);
        ctx.lineTo(b.x + b.bw + 0.6, -1 - b.bh);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#2a2417';
        ctx.stroke();
      }
    }
  }

  function drawCastle(ctx, t, br) {
    const w = 42;
    drawIslandBody(ctx, w, {
      seed: 53, spikeCount: 6, spikeDepth: 32, topWobble: 0.8,
      grassA: '#6e7a64', grassB: '#4a5240', rock: '#332e22'
    });

    // Three jagged peaks rising behind the wall
    const peaks = [
      { x: -22, h: 36, w: 12 },
      { x: -2,  h: 46, w: 16 },
      { x: 20,  h: 32, w: 11 },
    ];
    for (const p of peaks) {
      ctx.beginPath();
      ctx.moveTo(p.x - p.w, -1);
      ctx.lineTo(p.x - p.w * 0.2, -p.h);
      ctx.lineTo(p.x + p.w * 0.1, -p.h * 0.75);
      ctx.lineTo(p.x + p.w * 0.5, -p.h * 0.9);
      ctx.lineTo(p.x + p.w, -1);
      ctx.closePath();
      const pg = ctx.createLinearGradient(p.x, -p.h, p.x, -1);
      pg.addColorStop(0, '#9aa3a8');
      pg.addColorStop(1, '#5a635a');
      ctx.fillStyle = pg;
      ctx.fill();
      ctx.strokeStyle = '#2a2417';
      ctx.lineWidth = 0.7;
      ctx.stroke();
      // snow cap
      ctx.beginPath();
      ctx.moveTo(p.x - p.w * 0.35, -p.h * 0.78);
      ctx.lineTo(p.x - p.w * 0.18, -p.h);
      ctx.lineTo(p.x + p.w * 0.08, -p.h * 0.78);
      ctx.closePath();
      ctx.fillStyle = '#f4ecd6';
      ctx.fill();
    }

    // Wall + crenellations
    const wallX = -28, wallY = -1, wallW = 56, wallH = 13;
    ctx.fillStyle = '#cabd99';
    ctx.fillRect(wallX, wallY - wallH, wallW, wallH);
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.strokeRect(wallX, wallY - wallH, wallW, wallH);
    // stone seams
    ctx.strokeStyle = 'rgba(40,30,20,0.4)';
    ctx.lineWidth = 0.4;
    for (let i = 1; i < 4; i++) {
      const yy = wallY - i * (wallH / 4);
      ctx.beginPath();
      ctx.moveTo(wallX, yy);
      ctx.lineTo(wallX + wallW, yy);
      ctx.stroke();
    }
    for (let i = 1; i < 8; i++) {
      const xx = wallX + i * (wallW / 8);
      ctx.beginPath();
      ctx.moveTo(xx, wallY);
      ctx.lineTo(xx, wallY - wallH);
      ctx.stroke();
    }
    // crenellations along top
    const crCount = 9;
    for (let i = 0; i < crCount; i++) {
      const cx = wallX + 1 + i * ((wallW - 2) / (crCount - 1)) - 1.5;
      ctx.fillStyle = '#cabd99';
      ctx.fillRect(cx, wallY - wallH - 2.4, 3, 2.6);
      ctx.strokeStyle = '#2a2417';
      ctx.lineWidth = 0.7;
      ctx.strokeRect(cx, wallY - wallH - 2.4, 3, 2.6);
    }
    // arched gate
    ctx.fillStyle = '#2a1f12';
    ctx.beginPath();
    ctx.moveTo(-4, wallY);
    ctx.lineTo(-4, wallY - 5);
    ctx.quadraticCurveTo(0, wallY - 8, 4, wallY - 5);
    ctx.lineTo(4, wallY);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.stroke();
    // gate planks
    ctx.strokeStyle = '#5a4a30';
    ctx.lineWidth = 0.4;
    for (const gx of [-2.5, -1, 0.5, 2]) {
      ctx.beginPath();
      ctx.moveTo(gx, wallY - 0.5);
      ctx.lineTo(gx, wallY - 5);
      ctx.stroke();
    }

    // Corner towers — small round turrets
    for (const tx of [wallX, wallX + wallW]) {
      ctx.fillStyle = '#cabd99';
      ctx.fillRect(tx - 2.4, wallY - wallH - 4, 4.8, wallH + 4);
      ctx.strokeStyle = '#2a2417';
      ctx.lineWidth = 0.7;
      ctx.strokeRect(tx - 2.4, wallY - wallH - 4, 4.8, wallH + 4);
      // conical roof
      ctx.fillStyle = '#7a3a2a';
      ctx.beginPath();
      ctx.moveTo(tx - 3, wallY - wallH - 4);
      ctx.lineTo(tx, wallY - wallH - 10);
      ctx.lineTo(tx + 3, wallY - wallH - 4);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    // Fluttering pennant on the central peak
    const flutter = breeze ? Math.sin(t * 4) * 0.5 * br : 0;
    ctx.save();
    ctx.translate(-2, -46);
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, 8);
    ctx.stroke();
    ctx.fillStyle = '#c9342c';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(7 + flutter, 1.5);
    ctx.lineTo(4, 3.4);
    ctx.lineTo(7 - flutter, 5.5);
    ctx.lineTo(0, 4.2);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.restore();
  }

  function drawShipyard(ctx, t, br) {
    const w = 36;
    // Cloud platform instead of jagged island
    drawCloudBody(ctx, w, { r: 11, y: 4 });

    // Wooden deck plank atop the cloud
    ctx.fillStyle = '#a07238';
    ctx.beginPath();
    ctx.moveTo(-w + 6, 0);
    ctx.quadraticCurveTo(0, -3, w - 6, 0);
    ctx.lineTo(w - 6, 2.5);
    ctx.quadraticCurveTo(0, -0.5, -w + 6, 2.5);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.stroke();
    // plank seams
    ctx.strokeStyle = 'rgba(40,25,15,0.6)';
    ctx.lineWidth = 0.4;
    for (let dx = -w + 10; dx < w - 6; dx += 4) {
      ctx.beginPath();
      ctx.moveTo(dx, -1.5);
      ctx.lineTo(dx, 2.5);
      ctx.stroke();
    }

    // Dock posts with ropes
    for (const px of [-w + 8, w - 8]) {
      ctx.fillStyle = '#5a3a20';
      ctx.fillRect(px - 0.8, -5, 1.6, 6);
      ctx.fillStyle = '#3a2410';
      ctx.beginPath();
      ctx.arc(px, -5, 1.1, 0, Math.PI * 2);
      ctx.fill();
    }
    // rope swag
    ctx.strokeStyle = '#caa46a';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(-w + 8, -4.5);
    ctx.quadraticCurveTo(0, -1, w - 8, -4.5);
    ctx.stroke();

    // Crane — A-frame with hook
    const swing = breeze ? Math.sin(t * 1.4) * 1.2 * br : 0;
    ctx.save();
    ctx.translate(-w + 14, -1);
    ctx.strokeStyle = '#3a2a18';
    ctx.lineWidth = 1.1;
    ctx.beginPath();
    ctx.moveTo(-3, 0);
    ctx.lineTo(0, -16);
    ctx.lineTo(3, 0);
    ctx.moveTo(-2, -7);
    ctx.lineTo(2, -7);
    ctx.stroke();
    // arm
    ctx.beginPath();
    ctx.moveTo(0, -16);
    ctx.lineTo(9, -19);
    ctx.stroke();
    // cable + hook
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(9, -19);
    ctx.lineTo(9 + swing, -10);
    ctx.stroke();
    ctx.fillStyle = '#3a2a18';
    ctx.beginPath();
    ctx.arc(9 + swing, -9.5, 0.9, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Moored ship — bowl hull + mast + square sail
    ctx.save();
    ctx.translate(4, -3);
    // hull
    ctx.fillStyle = '#a06030';
    ctx.beginPath();
    ctx.moveTo(-12, -3);
    ctx.lineTo(12, -3);
    ctx.lineTo(14, -1);
    ctx.quadraticCurveTo(10, 5, 0, 5.5);
    ctx.quadraticCurveTo(-10, 5, -14, -1);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // deck stripe
    ctx.strokeStyle = 'rgba(40,30,15,0.6)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(-12, -1.5);
    ctx.lineTo(12, -1.5);
    ctx.stroke();
    // mast
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1.1;
    ctx.beginPath();
    ctx.moveTo(0, -3);
    ctx.lineTo(0, -22);
    ctx.stroke();
    // yardarm
    ctx.beginPath();
    ctx.moveTo(-8, -19);
    ctx.lineTo(8, -19);
    ctx.stroke();
    // sail (gently billowing)
    const sailBow = breeze ? 1 + Math.sin(t * 1.6) * 0.4 * br : 1;
    ctx.fillStyle = '#f2e8d0';
    ctx.beginPath();
    ctx.moveTo(-7, -19);
    ctx.lineTo(7, -19);
    ctx.quadraticCurveTo(7 + sailBow, -12, 5, -6);
    ctx.lineTo(-5, -6);
    ctx.quadraticCurveTo(-7 - sailBow, -12, -7, -19);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.6;
    ctx.stroke();
    // sail seam
    ctx.strokeStyle = 'rgba(80,60,30,0.55)';
    ctx.beginPath();
    ctx.moveTo(-5, -12);
    ctx.lineTo(5, -12);
    ctx.stroke();
    // crow's nest
    ctx.fillStyle = '#a06030';
    ctx.fillRect(-2.2, -24, 4.4, 2);
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(-2.2, -24, 4.4, 2);
    // pennant
    ctx.fillStyle = '#c9342c';
    ctx.beginPath();
    ctx.moveTo(0, -24);
    ctx.lineTo(5, -22.5);
    ctx.lineTo(0, -21.5);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawStiltHut(ctx, t, br) {
    // Wavy water layer below the island top
    const waveAmp = breeze ? 1.2 * br : 0.4;
    const waveSpeed = 1.4;
    ctx.save();
    // water fill rect (relative; will be clipped by card)
    const waterTop = 18;
    ctx.fillStyle = '#5e89a6';
    ctx.fillRect(-180, waterTop, 360, 80);
    // waves
    ctx.strokeStyle = 'rgba(245,250,255,0.65)';
    ctx.lineWidth = 0.8;
    for (let layer = 0; layer < 3; layer++) {
      const baseY = waterTop + 4 + layer * 6;
      ctx.beginPath();
      for (let x = -180; x <= 180; x += 4) {
        const y = baseY + Math.sin((x * 0.12) + t * waveSpeed + layer * 0.6) * waveAmp;
        if (x === -180) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    ctx.restore();

    // Small green islet poking out of the water
    const w = 26;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(-w, waterTop - 2);
    ctx.quadraticCurveTo(-w * 0.7, 0, -w * 0.3, -2);
    ctx.quadraticCurveTo(0, -4, w * 0.3, -2);
    ctx.quadraticCurveTo(w * 0.7, 0, w, waterTop - 2);
    ctx.closePath();
    const ig = ctx.createLinearGradient(0, -4, 0, waterTop);
    ig.addColorStop(0, '#6b8a5a');
    ig.addColorStop(0.6, '#4d6a40');
    ig.addColorStop(1, '#3a4a2e');
    ctx.fillStyle = ig;
    ctx.fill();
    ctx.strokeStyle = 'rgba(20,25,15,0.7)';
    ctx.lineWidth = 0.9;
    ctx.stroke();
    // sand strip at waterline
    ctx.beginPath();
    ctx.moveTo(-w + 4, waterTop - 2);
    ctx.quadraticCurveTo(0, waterTop, w - 4, waterTop - 2);
    ctx.strokeStyle = 'rgba(232,210,150,0.85)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // Stilts going into the water
    ctx.save();
    ctx.strokeStyle = '#5a3a20';
    ctx.lineWidth = 1.4;
    for (const sx of [-7, 7]) {
      ctx.beginPath();
      ctx.moveTo(sx, -2);
      ctx.lineTo(sx, waterTop + 4);
      ctx.stroke();
      // ripple
      ctx.strokeStyle = 'rgba(245,250,255,0.7)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.ellipse(sx, waterTop + 4, 3 + Math.sin(t * 2 + sx) * 0.4, 0.7, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = '#5a3a20';
      ctx.lineWidth = 1.4;
    }
    ctx.restore();

    // Hut walls
    ctx.save();
    ctx.translate(0, -3);
    ctx.fillStyle = '#caa46a';
    ctx.fillRect(-7, -10, 14, 10);
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.strokeRect(-7, -10, 14, 10);
    // wall planks
    ctx.strokeStyle = 'rgba(40,25,10,0.5)';
    ctx.lineWidth = 0.3;
    for (const dx of [-4, -1, 2, 5]) {
      ctx.beginPath();
      ctx.moveTo(dx, -10);
      ctx.lineTo(dx, 0);
      ctx.stroke();
    }
    // door
    ctx.fillStyle = '#5a3a20';
    ctx.fillRect(-1.4, -5.5, 2.8, 5.5);
    ctx.strokeStyle = '#2a2417';
    ctx.strokeRect(-1.4, -5.5, 2.8, 5.5);
    // window
    ctx.fillStyle = '#e8d088';
    ctx.fillRect(3, -8, 2.4, 2.2);
    ctx.strokeRect(3, -8, 2.4, 2.2);

    // Thatched roof — scalloped layers
    ctx.fillStyle = '#a67a3a';
    ctx.beginPath();
    ctx.moveTo(-10, -10);
    ctx.lineTo(0, -19);
    ctx.lineTo(10, -10);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.stroke();
    // thatch scallops
    ctx.fillStyle = 'rgba(60,40,20,0.45)';
    for (let row = 0; row < 3; row++) {
      const y = -10 - row * 2.5;
      const span = 10 - row * 2.4;
      for (let x = -span; x <= span; x += 2) {
        ctx.beginPath();
        ctx.arc(x, y, 0.9, 0, Math.PI);
        ctx.fill();
      }
    }
    ctx.restore();

    // Palm tree to the side
    ctx.save();
    const sway = breeze ? Math.sin(t * 1.4) * 0.06 * br : 0;
    ctx.translate(-16, -3);
    ctx.rotate(sway);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(-2, -8, -1, -14);
    ctx.strokeStyle = '#6b4423';
    ctx.lineWidth = 1.8;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.translate(-1, -14);
    for (const a of [-1.4, -0.5, 0.4, 1.3]) {
      ctx.save();
      ctx.rotate(a + Math.sin(t * 2 + a) * 0.07 * (breeze ? br : 0));
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(4, -1, 8, 3);
      ctx.strokeStyle = '#3f6a2a';
      ctx.lineWidth = 1.2;
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();

    // Fishing rod off the side
    ctx.save();
    ctx.translate(11, -7);
    ctx.strokeStyle = '#3a2a18';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(8, -3);
    ctx.stroke();
    // line + bob
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.4;
    const bobY = waterTop + 2 + Math.sin(t * 1.6) * 0.6 * (breeze ? br : 0.3);
    ctx.beginPath();
    ctx.moveTo(8, -3);
    ctx.lineTo(8, bobY);
    ctx.stroke();
    ctx.fillStyle = '#c9342c';
    ctx.beginPath();
    ctx.arc(8, bobY, 0.7, 0, Math.PI * 2);
    ctx.fill();
    // ripple around bob
    ctx.strokeStyle = 'rgba(245,250,255,0.7)';
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.ellipse(8, bobY + 0.3, 2, 0.5, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // Little fish jumping
    if (br > 0.2) {
      const cycle = (t * 0.6) % 1;
      if (cycle < 0.4) {
        const jx = -28 + cycle * 12;
        const jy = waterTop - Math.sin(cycle / 0.4 * Math.PI) * 6;
        ctx.save();
        ctx.translate(jx, jy);
        ctx.rotate(-cycle * 1.6 + 0.4);
        ctx.fillStyle = '#c9aa66';
        ctx.beginPath();
        ctx.ellipse(0, 0, 1.8, 0.9, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-1.6, 0);
        ctx.lineTo(-3, -1);
        ctx.lineTo(-3, 1);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }
  }

  // Drawer registry
  const drawers = {
    blob: drawBlob,
    tropical: drawTropical,
    lighthouse: drawLighthouse,
    signpost: drawSignpost,
    city: drawCity,
    castle: drawCastle,
    shipyard: drawShipyard,
    stilthut: drawStiltHut,
  };

  // ---------- Render loop ----------
  let lastT = 0, simT = 0, br = 1;

  function render(tMs) {
    const dt = Math.min((tMs - lastT) / 1000, 0.05);
    lastT = tMs;
    if (!paused) simT += dt;
    const target = breeze ? 1 : 0;
    br += (target - br) * Math.min(1, dt * 1.6);
    const t = simT;

    for (const c of cards) {
      const { ctx, W, H } = c;
      drawBackground(ctx, W, H, t);

      const leftCx = W * 0.27;
      const rightCx = W * 0.74;
      const cy = H * 0.55;
      const bob = Math.sin(t * 0.9) * 1.2;
      const isModifierCard = c.mods != null;

      // Archetype cards get a faded blob next to them for size reference.
      // Modifier cards don't — their base IS the blob.
      if (!isModifierCard && c.id !== 'blob') {
        ctx.save();
        ctx.globalAlpha = 0.4;
        ctx.translate(leftCx - 64, cy + bob * 0.5);
        drawBlob(ctx, t, br);
        ctx.restore();
        ctx.fillStyle = 'rgba(42,36,23,0.6)';
        ctx.font = 'italic 10px Georgia, serif';
        ctx.textAlign = 'center';
        ctx.fillText('blob', leftCx - 64, cy + 36);
      }

      ctx.save();
      const leftOffsetX = isModifierCard ? leftCx - 10 : leftCx + (c.id === 'blob' ? -20 : 12);
      ctx.translate(leftOffsetX, cy + bob);
      if (isModifierCard) drawNamedIsland(ctx, t, br, c.seed, c.mods);
      else if (c.id === 'blob') drawBlob(ctx, t, br, { seed: c.seed });
      else drawers[c.id](ctx, t, br);
      ctx.restore();

      // Divider
      ctx.save();
      ctx.strokeStyle = 'rgba(42,36,23,0.18)';
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(W * 0.5, 8);
      ctx.lineTo(W * 0.5, H - 8);
      ctx.stroke();
      ctx.restore();

      // 2× zoom on the right
      ctx.save();
      // Clip to right half so big islands (city, castle, hut waves) don't leak.
      ctx.beginPath();
      ctx.rect(W * 0.5 + 1, 0, W * 0.5 - 1, H);
      ctx.clip();
      ctx.translate(rightCx, cy + bob * 0.4);
      ctx.scale(2, 2);
      if (isModifierCard) drawNamedIsland(ctx, t, br, c.seed, c.mods);
      else if (c.id === 'blob') drawBlob(ctx, t, br, { seed: c.seed });
      else drawers[c.id](ctx, t, br);
      ctx.restore();

      ctx.fillStyle = 'rgba(42,36,23,0.55)';
      ctx.font = '10px Georgia, serif';
      ctx.textAlign = 'left';
      ctx.fillText('1×', 8, H - 6);
      ctx.fillText('2×', W * 0.52, H - 6);
    }

    requestAnimationFrame(render);
  }

  requestAnimationFrame((t) => { lastT = t; requestAnimationFrame(render); });
})();
</script>
</body>
</html>
