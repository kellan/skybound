<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Skybound — Ship Lab</title>
<style>
  :root {
    --parchment: #f1e6cd;
    --ink: #2a2417;
    --rule: #b8a777;
  }
  html, body { margin: 0; padding: 0; background: #c4d4e2; color: var(--ink); font-family: Georgia, serif; }
  header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--rule);
    background: var(--parchment);
    display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }
  header h1 { margin: 0; font-size: 20px; }
  header p { margin: 2px 0 0; font-size: 12.5px; opacity: 0.85; max-width: 64ch; }
  header .controls { display: flex; gap: 8px; }
  header .controls button {
    font: italic 13px Georgia, serif;
    background: #fff8e8; border: 1px solid var(--rule); color: var(--ink);
    padding: 6px 12px; border-radius: 4px; cursor: pointer;
  }
  header .controls button.active { background: #c9622e; color: #fff8e8; border-color: #6a2f15; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
    padding: 14px;
  }
  .card {
    background: #fff8e8;
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 10px 12px 12px;
  }
  .card h2 { margin: 0 0 2px; font-size: 16px; font-style: italic; }
  .card .desc { margin: 0 0 8px; font-size: 12px; opacity: 0.78; min-height: 30px; }
  canvas {
    display: block; width: 100%; height: auto;
    background: linear-gradient(180deg, #aac3da 0%, #d4dde5 100%);
    border-radius: 4px;
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>Skybound — Ship Lab</h1>
    <p>Each card shows a candidate at <em>game scale</em> (left, with the current sloop faded beside it for size reference) and a 4× zoom (right). Toggle <em>Sailing</em> to see motion-sensitive bits (jellyfish tentacles stretch, balloon burner ignites, cloud ship streams a trail).</p>
  </div>
  <div class="controls">
    <button id="sailing" class="active">Sailing</button>
    <button id="pause">Pause</button>
  </div>
</header>
<div class="grid" id="grid"></div>

<script>
(function () {
  const ships = [
    { id: 'sloop',         name: 'Sloop',             desc: 'The current ship — baseline for size and style.' },
    { id: 'butterfly',     name: 'Butterfly',         desc: 'Bug-like body with a passenger basket slung underneath.' },
    { id: 'butterflyShip', name: 'Butterfly ship',    desc: 'A proper sloop hull with huge patterned wings in place of sails.' },
    { id: 'turtle',        name: 'Flying turtle',     desc: 'Hex-patterned shell, four flippers paddling slowly.' },
    { id: 'dragon',        name: 'Dragon',            desc: 'Western style: horned snout, bat wings, spade-tipped tail.' },
    { id: 'windSerpent',   name: 'Wind serpent',      desc: 'Segmented body whips behind a small winged head.' },
    { id: 'manta',         name: 'Manta ray',         desc: 'Wide glider, slow wing wave, long whip tail.' },
    { id: 'jellyfish',     name: 'Jellyfish',         desc: 'Translucent dome pulses; tentacles attach at the back and stretch when sailing.' },
    { id: 'balloon',       name: 'Hot air balloon',   desc: 'Striped envelope, wicker basket, burner flickers when the burner is lit.' },
    { id: 'cloudShip',     name: 'Cloud ship',        desc: 'A small mast and sail riding on a cloud puff; trails wisps when moving.' },
  ];

  const grid = document.getElementById('grid');
  const dpr = window.devicePixelRatio || 1;
  let paused = false;
  let sailing = true;

  document.getElementById('pause').addEventListener('click', (e) => {
    paused = !paused;
    e.target.textContent = paused ? 'Play' : 'Pause';
  });
  document.getElementById('sailing').addEventListener('click', (e) => {
    sailing = !sailing;
    e.target.textContent = sailing ? 'Sailing' : 'Drifting';
    e.target.classList.toggle('active', sailing);
  });

  const cards = ships.map(s => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h2>${s.name}</h2><div class="desc">${s.desc}</div><canvas></canvas>`;
    grid.appendChild(card);
    const canvas = card.querySelector('canvas');
    const W = 320, H = 140;
    canvas.style.aspectRatio = `${W} / ${H}`;
    canvas.width = W * dpr; canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    return { id: s.id, ctx, W, H };
  });

  // ---------- Background ----------
  function drawBackground(ctx, W, H, t) {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#aac3da');
    g.addColorStop(1, '#d4dde5');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.globalAlpha = 0.32;
    const drift = (t * 6) % (W + 80);
    for (let i = 0; i < 3; i++) {
      const cx = ((i * (W / 3) + drift) % (W + 80)) - 40;
      const cy = H * (0.22 + i * 0.22);
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.ellipse(cx, cy, 30, 7, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ---------- Ship draw functions ----------
  // All ships are drawn centered at (0,0), facing +X (right), at game scale.
  // The current sloop hull spans x=[-8..14], y=[-7..7] — use that as a yardstick.
  // Signature: (ctx, t, speed) where speed ∈ [0, 1].

  function drawSloop(ctx) {
    ctx.beginPath();
    ctx.moveTo(14, 0);
    ctx.lineTo(-8, -7);
    ctx.lineTo(-5, 0);
    ctx.lineTo(-8, 7);
    ctx.closePath();
    ctx.fillStyle = '#c9622e';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(2, 0);
    ctx.lineTo(-4, -9);
    ctx.lineTo(-2, 0);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.stroke();
  }

  function drawButterfly(ctx, t, speed) {
    const flapRate = 8 + speed * 4;
    const flap = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(t * flapRate));

    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      ctx.scale(1, flap);
      ctx.beginPath();
      ctx.moveTo(2, -1);
      ctx.bezierCurveTo(4, -14, -10, -16, -8, -5);
      ctx.bezierCurveTo(-6, -3, -1, -1, 2, -1);
      ctx.closePath();
      ctx.fillStyle = '#e9c66a';
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-2, -2);
      ctx.bezierCurveTo(-10, -3, -13, -11, -7, -11);
      ctx.bezierCurveTo(-4, -9, -2, -5, -2, -2);
      ctx.closePath();
      ctx.fillStyle = '#d97a3c';
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(-3, -10, 1.6, 0, Math.PI * 2);
      ctx.fillStyle = '#2a2417';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(-3, -10, 0.7, 0, Math.PI * 2);
      ctx.fillStyle = '#f2e8d0';
      ctx.fill();
      ctx.restore();
    }

    ctx.beginPath();
    ctx.ellipse(2, 0, 7, 1.8, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(8, 0, 2, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(8, -1);
    ctx.quadraticCurveTo(12, -4, 11, -6);
    ctx.moveTo(8, 1);
    ctx.quadraticCurveTo(12, 4, 11, 6);
    ctx.stroke();
    // Passenger basket
    ctx.fillStyle = '#c9622e';
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(-1, 2);
    ctx.lineTo(4, 2);
    ctx.lineTo(3, 5);
    ctx.lineTo(0, 5);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  function drawButterflyShip(ctx, t, speed) {
    // Big patterned wings rising from the mast where a sail would be.
    const flapRate = 6 + speed * 3;
    const flap = 0.45 + 0.55 * (0.5 + 0.5 * Math.sin(t * flapRate));

    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.9;
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.translate(0, -2);    // wings root at the masthead area
      ctx.scale(1, side);
      ctx.scale(1, flap);
      // Forewing
      ctx.beginPath();
      ctx.moveTo(3, -1);
      ctx.bezierCurveTo(8, -16, -10, -22, -7, -8);
      ctx.bezierCurveTo(-3, -5, 1, -2, 3, -1);
      ctx.closePath();
      ctx.fillStyle = '#e9c66a';
      ctx.fill();
      ctx.stroke();
      // Hindwing
      ctx.beginPath();
      ctx.moveTo(-2, -2);
      ctx.bezierCurveTo(-14, -3, -17, -16, -8, -15);
      ctx.bezierCurveTo(-5, -11, -2, -5, -2, -2);
      ctx.closePath();
      ctx.fillStyle = '#d97a3c';
      ctx.fill();
      ctx.stroke();
      // Eyespot
      ctx.beginPath();
      ctx.arc(-3, -14, 2.1, 0, Math.PI * 2);
      ctx.fillStyle = '#2a2417';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(-3, -14, 0.95, 0, Math.PI * 2);
      ctx.fillStyle = '#f2e8d0';
      ctx.fill();
      // Vein
      ctx.strokeStyle = 'rgba(42,36,23,0.5)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(0, -2);
      ctx.quadraticCurveTo(-3, -8, -5, -14);
      ctx.stroke();
      ctx.restore();
    }

    // Hull (same as sloop)
    ctx.beginPath();
    ctx.moveTo(14, 0);
    ctx.lineTo(-8, -7);
    ctx.lineTo(-5, 0);
    ctx.lineTo(-8, 7);
    ctx.closePath();
    ctx.fillStyle = '#c9622e';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Stubby mast where wings attach
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, -1);
    ctx.lineTo(0, -3);
    ctx.stroke();
  }

  function drawTurtle(ctx, t, speed) {
    const paddleRate = 3 + speed * 1.5;
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;

    const flippers = [
      { x:  4, y: -7, base: -0.7, side: -1, lag: 0 },
      { x:  4, y:  7, base:  0.7, side:  1, lag: 0 },
      { x: -7, y: -6, base: -2.4, side: -1, lag: Math.PI },
      { x: -7, y:  6, base:  2.4, side:  1, lag: Math.PI },
    ];
    for (const f of flippers) {
      const swing = Math.sin(t * paddleRate + f.lag) * 0.5;
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(f.base + swing * f.side);
      ctx.beginPath();
      ctx.ellipse(0, 0, 5, 2.4, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#5a8a52';
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    ctx.beginPath();
    ctx.ellipse(0, 0, 11, 8.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#6e9c5a';
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.strokeStyle = 'rgba(42,36,23,0.45)';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.arc(0, 0, 2.6, 0, Math.PI * 2);
    ctx.stroke();
    for (let i = 0; i < 6; i++) {
      const a = i / 6 * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * 5.2, Math.sin(a) * 5.2, 2.1, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.ellipse(11, 0, 3.2, 2.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#5a8a52';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(12.5, -0.9, 0.6, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-10, 0);
    ctx.lineTo(-14, -1);
    ctx.lineTo(-14, 1);
    ctx.closePath();
    ctx.fillStyle = '#5a8a52';
    ctx.fill();
    ctx.stroke();
  }

  function drawDragon(ctx, t, speed) {
    // Western dragon: chunky body, long neck + horned snout, bat wings, spade tail.
    const flap = Math.sin(t * 2.6);
    const wingAng = -0.45 + flap * 0.45;       // sweep up/down
    const tailSwish = Math.sin(t * 1.9 + 0.4);
    const bodyFill = '#8a2a2a';
    const bellyFill = '#c87858';

    // --- Tail (drawn first, behind body) ---
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    const tailEndX = -16;
    const tailEndY = tailSwish * 3.5;
    // Tapered tail as a filled shape
    ctx.beginPath();
    ctx.moveTo(-7, -2);
    ctx.quadraticCurveTo(-12, tailSwish * 1, tailEndX, tailEndY);
    ctx.quadraticCurveTo(-12, tailSwish * 1 + 1, -7, 2);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.stroke();
    // Tail spade
    ctx.save();
    ctx.translate(tailEndX, tailEndY);
    ctx.rotate(tailSwish * 0.4 + Math.PI);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(3, -2.2);
    ctx.lineTo(2, 0);
    ctx.lineTo(3, 2.2);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    // --- Wings (behind body) ---
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.translate(-1, 0);
      ctx.scale(1, side);
      ctx.rotate(wingAng);
      // Bat wing: leading edge straight out + back, trailing edge scalloped
      ctx.beginPath();
      ctx.moveTo(0, -1);              // shoulder
      ctx.lineTo(3, -11);             // wing tip (out and slightly forward)
      ctx.quadraticCurveTo(-2, -9, -4, -7);   // scallop 1
      ctx.quadraticCurveTo(-6, -5, -8, -4);   // scallop 2
      ctx.quadraticCurveTo(-7, -2, -5, -1);   // back to body
      ctx.closePath();
      ctx.fillStyle = '#6a2424';
      ctx.fill();
      ctx.strokeStyle = '#2a2417';
      ctx.lineWidth = 0.8;
      ctx.stroke();
      // Finger struts
      ctx.strokeStyle = 'rgba(42,36,23,0.55)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(0, -1); ctx.lineTo(3, -11);
      ctx.moveTo(0, -1); ctx.lineTo(-4, -7);
      ctx.moveTo(0, -1); ctx.lineTo(-8, -4);
      ctx.stroke();
      ctx.restore();
    }

    // --- Body ---
    ctx.beginPath();
    ctx.ellipse(-2, 0, 6.5, 3.8, 0, 0, Math.PI * 2);
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Belly (lighter underside)
    ctx.beginPath();
    ctx.ellipse(-2, 1.5, 5, 1.6, 0, 0, Math.PI * 2);
    ctx.fillStyle = bellyFill;
    ctx.fill();

    // --- Legs (tucked) ---
    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.ellipse(-3, side * 3.5, 1.8, 1.1, 0, 0, Math.PI * 2);
      ctx.fillStyle = bodyFill;
      ctx.fill();
      ctx.stroke();
      // tiny claws
      ctx.beginPath();
      ctx.moveTo(-2, side * 4); ctx.lineTo(-1, side * 4.6);
      ctx.moveTo(-3, side * 4.2); ctx.lineTo(-2.5, side * 4.8);
      ctx.strokeStyle = '#2a2417';
      ctx.lineWidth = 0.4;
      ctx.stroke();
    }

    // --- Neck + head ---
    // Neck arches up and forward
    ctx.beginPath();
    ctx.moveTo(4, -1);
    ctx.quadraticCurveTo(7, -5, 11, -3);
    ctx.lineTo(12, -1);
    ctx.quadraticCurveTo(8, 1, 4, 2);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.9;
    ctx.stroke();

    // Head (snout pointing forward)
    ctx.save();
    ctx.translate(12, -2);
    ctx.beginPath();
    ctx.moveTo(0, -1.5);
    ctx.lineTo(5, -0.8);
    ctx.lineTo(5, 1.4);
    ctx.lineTo(0, 2.2);
    ctx.quadraticCurveTo(-2, 0, 0, -1.5);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.stroke();
    // Horns
    ctx.beginPath();
    ctx.moveTo(0, -1.2);
    ctx.lineTo(-2, -4);
    ctx.lineTo(0.5, -2);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(1.5, -1);
    ctx.lineTo(0.5, -4);
    ctx.lineTo(2.5, -1.5);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Eye
    ctx.beginPath();
    ctx.arc(2.2, 0.2, 0.7, 0, Math.PI * 2);
    ctx.fillStyle = '#f5d040';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(2.5, 0.2, 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    // Nostril
    ctx.beginPath();
    ctx.arc(4.5, 0.4, 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    ctx.restore();

    // --- Smoke puff from nostril when sailing ---
    if (speed > 0.15) {
      const cyc = (t * 0.6) % 1;
      if (cyc < 0.55) {
        const u = cyc / 0.55;
        const px = 17 + u * 9;
        const py = -1.4 + Math.sin(u * 5) * 0.6;
        const r = 0.9 + u * 2.2;
        ctx.globalAlpha = (1 - u) * 0.7;
        ctx.beginPath();
        ctx.arc(px, py, r, 0, Math.PI * 2);
        ctx.fillStyle = '#cfd2d6';
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }

  function drawWindSerpent(ctx, t, speed) {
    // Serpentine body of segments, small winged head out front.
    const segs = 7;
    const segLen = 4.2;
    const amp = 3.2;
    const points = [];
    for (let i = 0; i < segs; i++) {
      const along = i / (segs - 1);
      const x = 12 - i * segLen;
      const y = Math.sin(t * 2.6 - i * 0.9) * amp * along;
      points.push({ x, y, r: 4.6 - along * 3.6 });
    }

    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    for (let i = segs - 1; i >= 1; i--) {
      const p = points[i];
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = '#8a4eb0';
      ctx.fill();
      ctx.stroke();
    }

    const head = points[0];
    const next = points[1];
    const headAng = Math.atan2(head.y - next.y, head.x - next.x);
    ctx.save();
    ctx.translate(head.x, head.y);
    ctx.rotate(headAng);

    const wingFlap = Math.sin(t * 5.5) * 0.45;
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      ctx.rotate(-0.35 + wingFlap);
      ctx.beginPath();
      ctx.moveTo(-2, 0);
      ctx.quadraticCurveTo(-5, -9, -12, -7);
      ctx.quadraticCurveTo(-7, -3, -3, -1);
      ctx.closePath();
      ctx.fillStyle = '#b07cd0';
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    ctx.beginPath();
    ctx.moveTo(5, 0);
    ctx.quadraticCurveTo(3, -4, -3, -3);
    ctx.lineTo(-3, 3);
    ctx.quadraticCurveTo(3, 4, 5, 0);
    ctx.closePath();
    ctx.fillStyle = '#8a4eb0';
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-1, -3);
    ctx.lineTo(-3, -6);
    ctx.lineTo(0, -4);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(1.5, -1, 0.8, 0, Math.PI * 2);
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(2, -1, 0.4, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    ctx.restore();
  }

  function drawManta(ctx, t, speed) {
    const wingPhase = Math.sin(t * (2.4 + speed * 1.2));

    ctx.beginPath();
    ctx.moveTo(11, 0);
    ctx.quadraticCurveTo(8, -3, 2, -2.2);
    ctx.lineTo(-10, -1);
    ctx.lineTo(-10, 1);
    ctx.lineTo(2, 2.2);
    ctx.quadraticCurveTo(8, 3, 11, 0);
    ctx.closePath();
    ctx.fillStyle = '#3e556d';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      const tip = -11 + wingPhase * 3;
      ctx.beginPath();
      ctx.moveTo(8, -1);
      ctx.bezierCurveTo(4, -3, -2, tip, -9, -9 + wingPhase * 2);
      ctx.bezierCurveTo(-5, -5, -2, -3, -8, -1);
      ctx.closePath();
      ctx.fillStyle = '#536e88';
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      ctx.beginPath();
      ctx.moveTo(10, -1);
      ctx.quadraticCurveTo(14, -2.5, 13, -0.5);
      ctx.closePath();
      ctx.fillStyle = '#3e556d';
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    ctx.beginPath();
    ctx.moveTo(-9, 0);
    ctx.quadraticCurveTo(-15, Math.sin(t * 2.4) * 1.6, -22, Math.sin(t * 2.4 + 1) * 2);
    ctx.lineWidth = 0.9;
    ctx.stroke();

    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.arc(8, side * 1.2, 0.55, 0, Math.PI * 2);
      ctx.fillStyle = '#f2e8d0';
      ctx.fill();
    }
  }

  function drawJellyfish(ctx, t, speed) {
    const pulse = 1 + Math.sin(t * 2.2) * 0.09;

    // Tentacle length grows with speed (drifting=short, sailing=stretched)
    const len = 7 + speed * 16;            // 7 .. 23
    const wigAmp = 0.7 + speed * 1.4;
    const wigRate = 1.8 + speed * 1.6;

    // Attach points along the back edge of the dome.
    // Dome back curve: from (2, -8) to (2, 8) controlling through ~(0, ±5).
    // We approximate by sampling the curve at evenly spaced y values.
    function backX(y) {
      // Cubic-ish approximation of the back edge inset.
      const k = y / 8;
      return 1.6 - 1.8 * (1 - k * k);    // ranges roughly 0..1.6
    }

    ctx.strokeStyle = 'rgba(120, 70, 130, 0.85)';
    ctx.lineCap = 'round';
    ctx.lineWidth = 1.1;
    const tendrils = 5;
    for (let i = 0; i < tendrils; i++) {
      const ty = (i - (tendrils - 1) / 2) * 2.6;
      const tx = backX(ty) * pulse;       // attach to back edge, scale with pulse
      const sy = ty * pulse;
      const wig = Math.sin(t * wigRate + i * 0.8) * wigAmp;
      ctx.beginPath();
      ctx.moveTo(tx, sy);
      ctx.bezierCurveTo(
        tx - len * 0.35, sy + wig * 1.1,
        tx - len * 0.75, sy + wig * 1.7,
        tx - len,        sy + wig * 2.2
      );
      ctx.stroke();
    }
    ctx.lineCap = 'butt';

    // Dome
    ctx.save();
    ctx.scale(pulse, pulse);
    ctx.beginPath();
    ctx.ellipse(2, 0, 10, 8, 0, -Math.PI / 2, Math.PI / 2);
    ctx.bezierCurveTo(0, 5, 0, -5, 2, -8);
    ctx.closePath();
    const grad = ctx.createRadialGradient(4, -2, 0, 4, -2, 14);
    grad.addColorStop(0, 'rgba(245, 210, 230, 0.92)');
    grad.addColorStop(1, 'rgba(180, 130, 180, 0.78)');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(80, 40, 80, 0.55)';
    ctx.lineWidth = 0.9;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(120, 70, 130, 0.4)';
    ctx.lineWidth = 0.6;
    for (let i = -1; i <= 1; i++) {
      const a = i * 0.45;
      ctx.beginPath();
      ctx.moveTo(2, 0);
      ctx.lineTo(2 + Math.cos(a) * 10, Math.sin(a) * 8);
      ctx.stroke();
    }
    ctx.restore();

    // Glint
    ctx.beginPath();
    ctx.ellipse(6, -3, 2, 1.2, -0.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
    ctx.fill();
  }

  function drawBalloon(ctx, t, speed) {
    // Envelope (pinched-bottom sphere)
    ctx.beginPath();
    ctx.moveTo(0, -16);
    ctx.bezierCurveTo(11, -16, 12, -6, 6, -1);
    ctx.lineTo(-6, -1);
    ctx.bezierCurveTo(-12, -6, -11, -16, 0, -16);
    ctx.closePath();
    ctx.fillStyle = '#c9622e';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.9;
    ctx.stroke();

    // Gore lines (subtle vertical panels)
    ctx.strokeStyle = 'rgba(42,36,23,0.5)';
    ctx.lineWidth = 0.5;
    for (const x of [-6, -3, 0, 3, 6]) {
      ctx.beginPath();
      ctx.moveTo(x, -1);
      ctx.quadraticCurveTo(x * 1.15, -8, x * 0.45, -16);
      ctx.stroke();
    }

    // Cream stripe band
    ctx.strokeStyle = '#f2e8d0';
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.moveTo(-10, -9);
    ctx.quadraticCurveTo(0, -7.5, 10, -9);
    ctx.stroke();

    // Ropes
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.55;
    for (const x of [-4, -1, 1, 4]) {
      ctx.beginPath();
      ctx.moveTo(x, -1);
      ctx.lineTo(x * 0.55, 4);
      ctx.stroke();
    }

    // Basket
    ctx.beginPath();
    ctx.rect(-3.5, 4, 7, 4);
    ctx.fillStyle = '#a06030';
    ctx.fill();
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(42,36,23,0.45)';
    ctx.lineWidth = 0.4;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(i, 4); ctx.lineTo(i, 8);
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.moveTo(-3.5, 6); ctx.lineTo(3.5, 6);
    ctx.stroke();

    // Burner flame visible when sailing
    if (speed > 0.15) {
      const flick = 0.7 + 0.3 * Math.sin(t * 14);
      ctx.save();
      ctx.globalAlpha = 0.55 + speed * 0.4;
      // Outer flame
      ctx.fillStyle = '#ffa030';
      ctx.beginPath();
      ctx.moveTo(0, 4);
      ctx.quadraticCurveTo(2.4 * flick, 1.5, 0, -1.5 * flick);
      ctx.quadraticCurveTo(-2.4 * flick, 1.5, 0, 4);
      ctx.closePath();
      ctx.fill();
      // Inner brighter
      ctx.fillStyle = '#ffe080';
      ctx.beginPath();
      ctx.moveTo(0, 4);
      ctx.quadraticCurveTo(1.2 * flick, 2.2, 0, 0.5);
      ctx.quadraticCurveTo(-1.2 * flick, 2.2, 0, 4);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  function drawCloudShip(ctx, t, speed) {
    // Wispy trailing puffs behind when moving
    if (speed > 0.1) {
      ctx.save();
      for (let i = 0; i < 4; i++) {
        const offset = i * (4 + speed * 5);
        const sway = Math.sin(t * 2 - i) * 1.4;
        const a = (1 - i / 4) * 0.55 * speed;
        ctx.globalAlpha = a;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.ellipse(-11 - offset, 1 + sway, 3.2 + i * 0.7, 1.6, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    // Cloud body - overlapping puffs
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = 'rgba(90, 110, 135, 0.55)';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.arc(-8,  2, 4.8, 0, Math.PI * 2);
    ctx.arc(-2,  4, 4.8, 0, Math.PI * 2);
    ctx.arc( 4,  3, 5.0, 0, Math.PI * 2);
    ctx.arc( 9,  1, 4.0, 0, Math.PI * 2);
    ctx.arc(-4, -1, 4.5, 0, Math.PI * 2);
    ctx.arc( 2, -2, 4.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Soft underside shadow
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#5a6a7c';
    ctx.beginPath();
    ctx.ellipse(0, 5, 10, 1.8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Mast + sail (rising from cloud top)
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.9;
    ctx.beginPath();
    ctx.moveTo(0, -3);
    ctx.lineTo(0, -13);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0, -13);
    ctx.lineTo(7, -3);
    ctx.lineTo(0, -3);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.stroke();

    // Pennant
    ctx.beginPath();
    ctx.moveTo(0, -13);
    ctx.lineTo(4, -12);
    ctx.lineTo(0, -11);
    ctx.closePath();
    ctx.fillStyle = '#c9622e';
    ctx.fill();
    ctx.stroke();
  }

  const drawers = {
    sloop: drawSloop,
    butterfly: drawButterfly,
    butterflyShip: drawButterflyShip,
    turtle: drawTurtle,
    dragon: drawDragon,
    windSerpent: drawWindSerpent,
    manta: drawManta,
    jellyfish: drawJellyfish,
    balloon: drawBalloon,
    cloudShip: drawCloudShip,
  };

  // ---------- Render loop ----------
  let lastT = 0;
  let simT = 0;
  let speed = 1;   // smoothed toward 0 or 1

  function render(tMs) {
    const dt = Math.min((tMs - lastT) / 1000, 0.05);
    lastT = tMs;
    if (!paused) simT += dt;
    // Smooth speed toward target so the transition reads (e.g. tendrils stretch).
    const target = sailing ? 1 : 0;
    speed += (target - speed) * Math.min(1, dt * 1.6);
    const t = simT;

    for (const c of cards) {
      const { ctx, W, H } = c;
      drawBackground(ctx, W, H, t);

      const leftCx = W * 0.27;
      const rightCx = W * 0.74;
      const cy = H * 0.5;
      const bob = Math.sin(t * 1.1) * 1.4;

      // Sloop ghost for size reference
      if (c.id !== 'sloop') {
        ctx.save();
        ctx.globalAlpha = 0.42;
        ctx.translate(leftCx - 36, cy);
        drawSloop(ctx);
        ctx.restore();
        ctx.fillStyle = 'rgba(42,36,23,0.6)';
        ctx.font = 'italic 10px Georgia, serif';
        ctx.textAlign = 'center';
        ctx.fillText('sloop', leftCx - 36, cy + 22);
      }

      // Candidate at game scale
      ctx.save();
      ctx.translate(leftCx + (c.id === 'sloop' ? 0 : 16), cy + bob);
      drawers[c.id](ctx, t, speed);
      ctx.restore();

      // Divider
      ctx.save();
      ctx.strokeStyle = 'rgba(42,36,23,0.18)';
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(W * 0.5, 8);
      ctx.lineTo(W * 0.5, H - 8);
      ctx.stroke();
      ctx.restore();

      // Candidate at 4× zoom
      ctx.save();
      ctx.translate(rightCx, cy + bob * 0.4);
      ctx.scale(4, 4);
      drawers[c.id](ctx, t, speed);
      ctx.restore();

      ctx.fillStyle = 'rgba(42,36,23,0.55)';
      ctx.font = '10px Georgia, serif';
      ctx.textAlign = 'left';
      ctx.fillText('1×', 8, H - 6);
      ctx.fillText('4×', W * 0.52, H - 6);
    }

    requestAnimationFrame(render);
  }

  requestAnimationFrame((t) => { lastT = t; requestAnimationFrame(render); });
})();
</script>
</body>
</html>
