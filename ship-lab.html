<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Skybound — Ship Lab</title>
<style>
  :root {
    --parchment: #f1e6cd;
    --ink: #2a2417;
    --rule: #b8a777;
  }
  html, body { margin: 0; padding: 0; background: #c4d4e2; color: var(--ink); font-family: Georgia, serif; }
  header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--rule);
    background: var(--parchment);
    display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }
  header h1 { margin: 0; font-size: 20px; }
  header p { margin: 2px 0 0; font-size: 12.5px; opacity: 0.85; max-width: 64ch; }
  header .controls { display: flex; gap: 8px; }
  header .controls button {
    font: italic 13px Georgia, serif;
    background: #fff8e8; border: 1px solid var(--rule); color: var(--ink);
    padding: 6px 12px; border-radius: 4px; cursor: pointer;
  }
  header .controls button.active { background: #c9622e; color: #fff8e8; border-color: #6a2f15; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
    padding: 14px;
  }
  .card {
    background: #fff8e8;
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 10px 12px 12px;
  }
  .card h2 { margin: 0 0 2px; font-size: 16px; font-style: italic; }
  .card .desc { margin: 0 0 8px; font-size: 12px; opacity: 0.78; min-height: 30px; }
  canvas {
    display: block; width: 100%; height: auto;
    background: linear-gradient(180deg, #aac3da 0%, #d4dde5 100%);
    border-radius: 4px;
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>Skybound — Ship Lab</h1>
    <p>Each card shows a candidate at <em>game scale</em> (left, with the current sloop faded beside it for size reference) and a 4× zoom (right). Toggle <em>Sailing</em> to see motion-sensitive bits.</p>
  </div>
  <div class="controls">
    <button id="sailing" class="active">Sailing</button>
    <button id="pause">Pause</button>
  </div>
</header>
<div class="grid" id="grid"></div>

<!-- Shipped ship art, shared with index.html. Cards for shipped designs
     render from this so the lab always shows what the game actually draws. -->
<script src="ships.js"></script>
<script>
(function () {
  const ships = [
    { id: 'sloop',             name: 'Sloop',                desc: 'The current ship — baseline for size and style.' },
    { id: 'butterfly',         name: 'Butterfly (monarch)',  desc: 'Monarch wings: orange + thick black borders, white spots, black veins. Fast flap.' },
    { id: 'butterflyShip',     name: 'Butterfly ship',       desc: 'Sloop hull with oversized monarch wings as sails.' },
    { id: 'turtle',            name: 'Flying turtle (top-down)', desc: 'Original top-down view: hex shell, four flippers paddling.' },
    { id: 'turtleTopdownSea',  name: 'Sea turtle (top-down)',    desc: 'Top-down sea turtle: teal palette, long front flippers, realistic scute pattern.' },
    { id: 'turtleSideClassic', name: 'Turtle — side classic',    desc: 'Side view, dome shell, two visible flippers swimming front + back.' },
    { id: 'turtleSideArmored', name: 'Turtle — armored',         desc: 'Side view with spiked shell, helmet horn, slow steady paddle.' },
    { id: 'turtleSideSea',     name: 'Turtle — sea turtle',      desc: 'Streamlined, wing-like flippers sweeping; flatter shell.' },
    { id: 'seaTurtle',         name: 'Sea turtle (in game)',     desc: 'The shipped top-down sea turtle, rendered from shared ships.js.' },
    { id: 'dragon',            name: 'Dragon — current',     desc: 'Top-down western dragon, kept for reference.' },
    { id: 'dragonEastern',     name: 'Dragon — Eastern',     desc: 'Long flowing body, mane spikes, whiskers, paired horns.' },
    { id: 'dragonWyvern',      name: 'Dragon — Wyvern',      desc: 'Side-on view. Two legs, near wing in front, far wing behind body.' },
    { id: 'dragonChibi',       name: 'Dragon — Chibi',       desc: 'Cute round-bodied dragon, big eye, fast wing flutter.' },
    { id: 'wyvern',            name: 'Wyvern (in game)',     desc: 'The shipped profile wyvern, rendered from shared ships.js.' },
    { id: 'windSerpent',       name: 'Wind serpent',         desc: 'Segmented body whips behind a small winged head.' },
    { id: 'manta',             name: 'Manta ray',            desc: 'Wide glider, slow wing wave, long whip tail.' },
    { id: 'jellyfish',         name: 'Jellyfish',            desc: 'Dome pulses; attached tentacles stretch when sailing.' },
    { id: 'balloon',           name: 'Hot air balloon',      desc: 'Striped envelope, wicker basket, burner flickers when sailing.' },
    { id: 'cloudGalleon',      name: 'Cloud galleon',        desc: "Faithful to the kiddo's sketch: bowl hull on a cloud, square sail, crow's nest, side fins." },
    { id: 'cloudGalleonMulti', name: 'Cloud galleon — multi-mast', desc: 'Bigger hull, foremast + mainmast with square-rigged sails, bowsprit, stern pennant.' },
    { id: 'cloudGalleonWinged',name: 'Cloud galleon — winged',     desc: 'Modest hull and sail; large flapping wings do the lifting, small cloud below.' },
    { id: 'wyvernTopdown',     name: 'Wyvern — top-down',          desc: 'Top-down sweep: head + neck forward, two wings spread, two legs tucked, arrow tail.' },
    { id: 'wyvernThreeQ',      name: 'Wyvern — 3/4 view',          desc: 'Top-down + a hint of angle: shoulders raised, near wing forward, far wing back, tail trailing.' },
    { id: 'cloudGalleonTopdown', name: 'Cloud galleon — top-down', desc: 'Looking down: deck oval, mast dot in center, sail trails back like a banner; cloud as soft shadow.' },
    { id: 'cloudGalleonThreeQ',  name: 'Cloud galleon — 3/4 view', desc: 'Camera tilted forward: deck visible + a sliver of hull side, sail catches wind, cloud underneath.' },
    { id: 'dragonThreeQ',      name: 'Dragon — 3/4 view',          desc: 'Camera tilted: see top of body + a hint of side, near wing larger, far wing smaller.' },
  ];

  const grid = document.getElementById('grid');
  const dpr = window.devicePixelRatio || 1;
  let paused = false;
  let sailing = true;

  document.getElementById('pause').addEventListener('click', (e) => {
    paused = !paused;
    e.target.textContent = paused ? 'Play' : 'Pause';
  });
  document.getElementById('sailing').addEventListener('click', (e) => {
    sailing = !sailing;
    e.target.textContent = sailing ? 'Sailing' : 'Drifting';
    e.target.classList.toggle('active', sailing);
  });

  const cards = ships.map(s => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h2>${s.name}</h2><div class="desc">${s.desc}</div><canvas></canvas>`;
    grid.appendChild(card);
    const canvas = card.querySelector('canvas');
    const W = 320, H = 140;
    canvas.style.aspectRatio = `${W} / ${H}`;
    canvas.width = W * dpr; canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    return { id: s.id, ctx, W, H };
  });

  // ---------- Background ----------
  function drawBackground(ctx, W, H, t) {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#aac3da');
    g.addColorStop(1, '#d4dde5');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.globalAlpha = 0.32;
    const drift = (t * 6) % (W + 80);
    for (let i = 0; i < 3; i++) {
      const cx = ((i * (W / 3) + drift) % (W + 80)) - 40;
      const cy = H * (0.22 + i * 0.22);
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.ellipse(cx, cy, 30, 7, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ---------- Shared helpers ----------
  function drawBowlHull(ctx, w, h, color = '#a06030') {
    // w = half-width, h = depth scale. Top-down "deck-down view" — flat top,
    // curved bottom, prow lip on the right (+X is forward).
    ctx.beginPath();
    ctx.moveTo(-w, -h * 0.7);                       // top-back
    ctx.lineTo(-w, h * 0.2);                        // down back wall
    ctx.quadraticCurveTo(-w * 0.6, h * 1.1, 0, h * 1.15);
    ctx.quadraticCurveTo(w * 0.6, h * 1.1, w * 0.85, h * 0.3);
    ctx.lineTo(w * 1.15, -h * 0.4);                 // prow lip
    ctx.lineTo(-w, -h * 0.7);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Deck line
    ctx.beginPath();
    ctx.moveTo(-w, -h * 0.7);
    ctx.lineTo(w * 0.7, -h * 0.7);
    ctx.lineWidth = 0.7;
    ctx.stroke();
    // Plank curve hint
    ctx.strokeStyle = 'rgba(42,36,23,0.35)';
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.moveTo(-w + 0.6, 0);
    ctx.quadraticCurveTo(0, h * 0.7, w * 0.85, 0);
    ctx.stroke();
  }

  function drawCrowsNest(ctx, x, y) {
    ctx.save();
    ctx.translate(x, y);
    ctx.beginPath();
    ctx.rect(-2.2, -2, 4.4, 2);
    ctx.fillStyle = '#a06030';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    for (const dx of [-2, -1, 0, 1, 2]) {
      ctx.beginPath();
      ctx.moveTo(dx, -2);
      ctx.lineTo(dx, -3.6);
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawCloudPlatform(ctx, w, opts = {}) {
    const yBase = opts.y ?? 7;
    const r = opts.r ?? 4;
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = 'rgba(80, 110, 140, 0.55)';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.arc(-w * 0.85, yBase - 1, r * 0.85, 0, Math.PI * 2);
    ctx.arc(-w * 0.35, yBase, r, 0, Math.PI * 2);
    ctx.arc(0, yBase - 0.6, r * 0.9, 0, Math.PI * 2);
    ctx.arc( w * 0.35, yBase, r, 0, Math.PI * 2);
    ctx.arc( w * 0.85, yBase - 1, r * 0.85, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // Underside shadow
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#5a6a7c';
    ctx.beginPath();
    ctx.ellipse(0, yBase + r * 0.9, w * 0.95, 1.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ---------- Ship draw functions ----------
  // All ships drawn at (0,0), facing +X. The sloop hull spans x=[-8..14], y=[-7..7].
  // Signature: (ctx, t, speed) where speed ∈ [0, 1].

  function drawSloop(ctx) {
    ctx.beginPath();
    ctx.moveTo(14, 0);
    ctx.lineTo(-8, -7);
    ctx.lineTo(-5, 0);
    ctx.lineTo(-8, 7);
    ctx.closePath();
    ctx.fillStyle = '#c9622e';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(2, 0);
    ctx.lineTo(-4, -9);
    ctx.lineTo(-2, 0);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.stroke();
  }

  function drawButterfly(ctx, t, speed) {
    // Monarch: fast flap (8-10 Hz), abs(sin) so wings briefly flatten at each midstroke.
    const flapsPerSec = 8 + speed * 2;
    const flap = 0.12 + 0.88 * Math.abs(Math.sin(t * flapsPerSec * Math.PI));

    const orange = '#e07020';
    const black = '#1a1410';
    const cream = '#f8f0e0';

    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      ctx.scale(1, flap);

      // === HINDWING (drawn first, behind forewing) ===
      // Black silhouette (acts as border)
      ctx.beginPath();
      ctx.moveTo(-1, -1);
      ctx.bezierCurveTo(-2, -6, -8, -9, -10, -6);
      ctx.bezierCurveTo(-11, -3, -9, -0.5, -6, 0);
      ctx.bezierCurveTo(-3, 0, -1.5, -0.5, -1, -1);
      ctx.closePath();
      ctx.fillStyle = black;
      ctx.fill();
      // Orange interior (inset from black)
      ctx.beginPath();
      ctx.moveTo(-1.5, -1.4);
      ctx.bezierCurveTo(-3, -5.5, -7, -7.5, -8.7, -5.5);
      ctx.bezierCurveTo(-9.5, -3, -8, -1.3, -5.5, -1);
      ctx.bezierCurveTo(-3, -1, -2, -1.3, -1.5, -1.4);
      ctx.closePath();
      ctx.fillStyle = orange;
      ctx.fill();
      // Veins
      ctx.strokeStyle = black;
      ctx.lineWidth = 0.35;
      ctx.beginPath();
      ctx.moveTo(-2, -1);
      ctx.quadraticCurveTo(-4, -3, -7, -5.5);
      ctx.moveTo(-2, -1.5);
      ctx.quadraticCurveTo(-5, -3, -8.5, -4);
      ctx.stroke();
      // White spots on the black border
      ctx.fillStyle = cream;
      for (const [px, py] of [[-7, -7.5], [-9.5, -5], [-7.5, -2]]) {
        ctx.beginPath();
        ctx.arc(px, py, 0.4, 0, Math.PI * 2);
        ctx.fill();
      }

      // === FOREWING (drawn on top — triangular with pointed apex) ===
      // Black silhouette
      ctx.beginPath();
      ctx.moveTo(3, -0.5);
      ctx.bezierCurveTo(6, -7, 3, -14, -3, -13.5);
      ctx.bezierCurveTo(-7, -11, -7, -7, -6, -4);
      ctx.bezierCurveTo(-4, -2, -1, -1, 3, -0.5);
      ctx.closePath();
      ctx.fillStyle = black;
      ctx.fill();
      // Orange interior
      ctx.beginPath();
      ctx.moveTo(2.7, -1);
      ctx.bezierCurveTo(5, -7, 2.5, -12.5, -2.5, -12);
      ctx.bezierCurveTo(-6, -10, -6, -7, -5, -4.5);
      ctx.bezierCurveTo(-3.5, -3, -1, -2, 2.7, -1);
      ctx.closePath();
      ctx.fillStyle = orange;
      ctx.fill();
      // Veins — three radiating from body toward outer edge
      ctx.strokeStyle = black;
      ctx.lineWidth = 0.4;
      ctx.beginPath();
      ctx.moveTo(2, -1.5);
      ctx.quadraticCurveTo(0, -6, -1.8, -11);
      ctx.moveTo(0.5, -2);
      ctx.quadraticCurveTo(-2.5, -6, -4, -10);
      ctx.moveTo(-1.5, -2.5);
      ctx.quadraticCurveTo(-3.5, -5, -5.2, -7);
      ctx.stroke();
      // White spots — cluster near apex
      ctx.fillStyle = cream;
      for (const [px, py] of [[-3, -12.5], [-1, -13], [-5, -10], [-6, -7], [-6, -4.5]]) {
        ctx.beginPath();
        ctx.arc(px, py, 0.55, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    // Body (slim ellipse)
    ctx.beginPath();
    ctx.ellipse(2, 0, 7, 1.8, 0, 0, Math.PI * 2);
    ctx.fillStyle = black;
    ctx.fill();
    // Head
    ctx.beginPath();
    ctx.arc(8, 0, 2, 0, Math.PI * 2);
    ctx.fillStyle = black;
    ctx.fill();
    // Antennae
    ctx.strokeStyle = black;
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(8, -1);
    ctx.quadraticCurveTo(12, -4, 11, -6);
    ctx.moveTo(8, 1);
    ctx.quadraticCurveTo(12, 4, 11, 6);
    ctx.stroke();
  }

  function drawButterflyShip(ctx, t, speed) {
    // Monarch wings, scaled up to act as sails.
    const flapsPerSec = 6 + speed * 2;
    const flap = 0.15 + 0.85 * Math.abs(Math.sin(t * flapsPerSec * Math.PI));

    const orange = '#e07020';
    const black = '#1a1410';
    const cream = '#f8f0e0';

    for (const side of [-1, 1]) {
      ctx.save();
      ctx.translate(0, -2);
      ctx.scale(1, side);
      ctx.scale(1, flap);

      // === HINDWING (fan shape, behind) ===
      ctx.beginPath();
      ctx.moveTo(-1, -1);
      ctx.bezierCurveTo(-3, -8, -12, -13, -14, -8);
      ctx.bezierCurveTo(-15, -3, -12, -0.5, -7, 0);
      ctx.bezierCurveTo(-3, 0, -1.5, -0.5, -1, -1);
      ctx.closePath();
      ctx.fillStyle = black;
      ctx.fill();
      // Orange interior
      ctx.beginPath();
      ctx.moveTo(-1.5, -1.5);
      ctx.bezierCurveTo(-4, -7.5, -10.5, -10.5, -12.5, -7);
      ctx.bezierCurveTo(-13, -3, -10.5, -1.3, -6, -1);
      ctx.bezierCurveTo(-3, -1, -2, -1.3, -1.5, -1.5);
      ctx.closePath();
      ctx.fillStyle = orange;
      ctx.fill();
      // Veins
      ctx.strokeStyle = black;
      ctx.lineWidth = 0.4;
      ctx.beginPath();
      ctx.moveTo(-2, -1.3);
      ctx.quadraticCurveTo(-5, -4, -10, -7);
      ctx.moveTo(-2, -2);
      ctx.quadraticCurveTo(-6, -4, -12, -5);
      ctx.stroke();
      // White spots
      ctx.fillStyle = cream;
      for (const [px, py] of [[-10, -10], [-13, -6], [-10, -2.5]]) {
        ctx.beginPath();
        ctx.arc(px, py, 0.5, 0, Math.PI * 2);
        ctx.fill();
      }

      // === FOREWING (triangular, pointed apex, on top) ===
      ctx.beginPath();
      ctx.moveTo(3, -0.5);
      ctx.bezierCurveTo(8, -11, 3, -22, -4, -20);
      ctx.bezierCurveTo(-10, -16, -10, -10, -8, -5);
      ctx.bezierCurveTo(-5, -2, -1, -1, 3, -0.5);
      ctx.closePath();
      ctx.fillStyle = black;
      ctx.fill();
      // Orange interior
      ctx.beginPath();
      ctx.moveTo(2.7, -1.2);
      ctx.bezierCurveTo(6.5, -11, 2, -19.5, -3.5, -18);
      ctx.bezierCurveTo(-8.5, -14.5, -8.5, -10, -7, -5.5);
      ctx.bezierCurveTo(-4.5, -3, -1, -2, 2.7, -1.2);
      ctx.closePath();
      ctx.fillStyle = orange;
      ctx.fill();
      // Veins
      ctx.strokeStyle = black;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(2, -1.8);
      ctx.quadraticCurveTo(0, -9, -2.5, -17);
      ctx.moveTo(0, -2.5);
      ctx.quadraticCurveTo(-3.5, -9, -5.5, -15);
      ctx.moveTo(-2, -3);
      ctx.quadraticCurveTo(-4.5, -7, -7, -10);
      ctx.stroke();
      // White spots — clustered near apex
      ctx.fillStyle = cream;
      for (const [px, py] of [[-4, -19], [-1.5, -19.5], [-7, -15], [-8.5, -11], [-8.5, -7]]) {
        ctx.beginPath();
        ctx.arc(px, py, 0.7, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    // Hull (sloop)
    ctx.beginPath();
    ctx.moveTo(14, 0);
    ctx.lineTo(-8, -7);
    ctx.lineTo(-5, 0);
    ctx.lineTo(-8, 7);
    ctx.closePath();
    ctx.fillStyle = '#c9622e';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Stubby mast where wings root
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, -1);
    ctx.lineTo(0, -3);
    ctx.stroke();
  }

  function drawTurtle(ctx, t, speed) {
    const paddleRate = 3 + speed * 1.5;
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;

    const flippers = [
      { x:  4, y: -7, base: -0.7, side: -1, lag: 0 },
      { x:  4, y:  7, base:  0.7, side:  1, lag: 0 },
      { x: -7, y: -6, base: -2.4, side: -1, lag: Math.PI },
      { x: -7, y:  6, base:  2.4, side:  1, lag: Math.PI },
    ];
    for (const f of flippers) {
      const swing = Math.sin(t * paddleRate + f.lag) * 0.5;
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(f.base + swing * f.side);
      ctx.beginPath();
      ctx.ellipse(0, 0, 5, 2.4, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#5a8a52';
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    ctx.beginPath();
    ctx.ellipse(0, 0, 11, 8.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#6e9c5a';
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.strokeStyle = 'rgba(42,36,23,0.45)';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.arc(0, 0, 2.6, 0, Math.PI * 2);
    ctx.stroke();
    for (let i = 0; i < 6; i++) {
      const a = i / 6 * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * 5.2, Math.sin(a) * 5.2, 2.1, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.ellipse(11, 0, 3.2, 2.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#5a8a52';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(12.5, -0.9, 0.6, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-10, 0);
    ctx.lineTo(-14, -1);
    ctx.lineTo(-14, 1);
    ctx.closePath();
    ctx.fillStyle = '#5a8a52';
    ctx.fill();
    ctx.stroke();
  }

  function drawTurtleTopdownSea(ctx, t, speed) {
    // Top-down sea turtle: teal palette, long front flippers, scute pattern.
    const paddleRate = 2.2 + speed * 1.2;
    const teal      = '#3a7a92';
    const tealLight = '#4a8aa0';
    const tealDeep  = '#2a5a72';
    const ink       = '#2a2417';

    // Front flippers — long, paddle-shaped, swept slightly back at rest.
    // They sweep through a wide arc. Lagged by π between L and R for a stroke feel.
    const frontSwing = Math.sin(t * paddleRate);
    const rearSwing  = Math.sin(t * paddleRate + Math.PI);
    const frontFlippers = [
      { side: -1, lag: 0 },
      { side:  1, lag: 0 },
    ];
    for (const f of frontFlippers) {
      ctx.save();
      ctx.translate(3, 5.5 * f.side);
      // Base angle points forward-outward; sweep amplitude ~0.7 rad
      const base = f.side * 0.4;
      ctx.rotate(base + frontSwing * 0.55 * f.side);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      // Long teardrop paddle, tip swept slightly back
      ctx.quadraticCurveTo(5, -2 * f.side, 9.5, -1.2 * f.side);
      ctx.quadraticCurveTo(11, 0, 9.5, 1.6 * f.side);
      ctx.quadraticCurveTo(5, 2.4 * f.side, 0, 1.4 * f.side);
      ctx.closePath();
      ctx.fillStyle = tealDeep;
      ctx.fill();
      ctx.strokeStyle = ink;
      ctx.lineWidth = 0.7;
      ctx.stroke();
      ctx.restore();
    }

    // Rear flippers — short, paddle-shaped, swept further back.
    const rearFlippers = [
      { side: -1 },
      { side:  1 },
    ];
    for (const f of rearFlippers) {
      ctx.save();
      ctx.translate(-7, 4.5 * f.side);
      const base = f.side * 1.6;
      ctx.rotate(base + rearSwing * 0.35 * f.side);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(3, -1.4 * f.side, 5, -0.6 * f.side);
      ctx.quadraticCurveTo(5.5, 0.4 * f.side, 4.5, 1.4 * f.side);
      ctx.quadraticCurveTo(2.5, 1.6 * f.side, 0, 1.2 * f.side);
      ctx.closePath();
      ctx.fillStyle = tealDeep;
      ctx.fill();
      ctx.strokeStyle = ink;
      ctx.lineWidth = 0.6;
      ctx.stroke();
      ctx.restore();
    }

    // Shell — teardrop, widest about 1/3 from front, narrowing to back.
    ctx.beginPath();
    ctx.moveTo(11, 0);
    ctx.bezierCurveTo(11, -5, 4, -7.5, -2, -7);
    ctx.bezierCurveTo(-9, -6, -11, -3, -10.5, 0);
    ctx.bezierCurveTo(-11, 3, -9, 6, -2, 7);
    ctx.bezierCurveTo(4, 7.5, 11, 5, 11, 0);
    ctx.closePath();
    ctx.fillStyle = tealLight;
    ctx.fill();
    ctx.strokeStyle = ink;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Carapace scutes (realistic sea turtle pattern):
    //   1 central column of 5 vertebral scutes,
    //   4 costal scutes on each side.
    ctx.strokeStyle = 'rgba(42,36,23,0.55)';
    ctx.lineWidth = 0.5;
    // Central column divisions (cross-bars between vertebral scutes)
    for (const x of [7, 3, -1, -5, -9]) {
      const halfH = Math.max(0, 6 - Math.abs(x + 1) * 0.55);
      ctx.beginPath();
      ctx.moveTo(x, -halfH);
      ctx.lineTo(x, halfH);
      ctx.stroke();
    }
    // Side scute boundaries (curving from center to rim)
    for (const side of [-1, 1]) {
      for (const x of [8, 4, 0, -4, -8]) {
        const rim = Math.max(2, 6.5 - Math.abs(x + 1) * 0.45) * side;
        ctx.beginPath();
        ctx.moveTo(x, 0.5 * side);
        ctx.quadraticCurveTo(x - 0.5, rim * 0.7, x - 1, rim);
        ctx.stroke();
      }
    }
    // Light cream highlight along the central ridge
    ctx.strokeStyle = 'rgba(255, 248, 224, 0.35)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(10, 0);
    ctx.lineTo(-10, 0);
    ctx.stroke();

    // Head — small triangular bump at front
    ctx.beginPath();
    ctx.moveTo(11, -2.2);
    ctx.quadraticCurveTo(15, -1.6, 15.5, 0);
    ctx.quadraticCurveTo(15, 1.6, 11, 2.2);
    ctx.closePath();
    ctx.fillStyle = teal;
    ctx.fill();
    ctx.strokeStyle = ink;
    ctx.lineWidth = 0.7;
    ctx.stroke();
    // Eyes (two small dots on top of the head)
    ctx.fillStyle = ink;
    ctx.beginPath(); ctx.arc(13.2, -1.1, 0.45, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(13.2,  1.1, 0.45, 0, Math.PI * 2); ctx.fill();

    // Tail — tiny stub at back
    ctx.beginPath();
    ctx.moveTo(-10.5, -0.8);
    ctx.lineTo(-13, 0);
    ctx.lineTo(-10.5, 0.8);
    ctx.closePath();
    ctx.fillStyle = teal;
    ctx.fill();
    ctx.strokeStyle = ink;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  function drawTurtleSideClassic(ctx, t, speed) {
    const paddleRate = 2.5 + speed * 1.5;

    // Scute lines (segment hints)

    for (const x of [-5, -1, 3]) {
      ctx.beginPath();

    ctx.bezierCurveTo(-9, -2, 9, -2, 9, -0.3);

    // Near flippers (in front of body, full color)

    ctx.save();
    ctx.translate(6, 2.5);
    ctx.rotate(frontSwing * 0.55 - 0.2);
    ctx.beginPath(); ctx.ellipse(2, 0, 4.5, 2, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.restore();
    ctx.save();
    ctx.translate(-5, 2.5);
    ctx.rotate(backSwing * 0.55 + 0.4);

    ctx.fill();
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(11.5, 0.2, 0.6, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(12, 1.8); ctx.lineTo(13.3, 2);
    ctx.lineWidth = 0.4;
    ctx.stroke();

    // Tail
    ctx.beginPath();
    ctx.moveTo(-9, 1.5);
    ctx.lineTo(-12, 0.5);
    ctx.lineTo(-11, 2.2);
    ctx.closePath();
    ctx.fillStyle = '#5a8a52';
    ctx.fill();
    ctx.stroke();
  }

  function drawTurtleSideSea(ctx, t, speed) {

    ctx.globalAlpha = 0.5;

    ctx.beginPath();
    ctx.moveTo(-9, -2);
    ctx.bezierCurveTo(0, -2.6, 0, -2.6, 9, -2);

    // Near front flipper (large, wing-like)
    ctx.save();
    ctx.translate(2, 2.8);
    ctx.rotate(0.3 + flap * 0.5);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(7, -3, 9, 0.5);
    ctx.quadraticCurveTo(5, 2.5, 0, 1.5);
    ctx.closePath();
    ctx.fillStyle = '#3a7a92';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';

    ctx.lineTo(-9.5, 2.5);
    ctx.closePath();
    ctx.fillStyle = '#3a7a92';
    ctx.fill();
    ctx.stroke();
  }

  // Current western dragon — kept for reference.

    const flap = Math.sin(t * 2.6);

    ctx.moveTo(-7, -2);
    ctx.quadraticCurveTo(-12, tailSwish * 1, tailEndX, tailEndY);
    ctx.quadraticCurveTo(-12, tailSwish * 1 + 1, -7, 2);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.stroke();
    ctx.save();
    ctx.translate(tailEndX, tailEndY);
    ctx.rotate(tailSwish * 0.4 + Math.PI);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(3, -2.2);
    ctx.lineTo(2, 0);
    ctx.lineTo(3, 2.2);

    ctx.fillStyle = bodyFill;

    for (const side of [-1, 1]) {
      ctx.save();
      ctx.translate(-1, 0);
      ctx.scale(1, side);
      ctx.rotate(wingAng);
      ctx.beginPath();
      ctx.moveTo(0, -1);
      ctx.lineTo(3, -11);
      ctx.quadraticCurveTo(-2, -9, -4, -7);
      ctx.quadraticCurveTo(-6, -5, -8, -4);

      ctx.closePath();
      ctx.fillStyle = '#6a2424';
      ctx.fill();
      ctx.strokeStyle = '#2a2417';
      ctx.lineWidth = 0.8;
      ctx.stroke();
      ctx.strokeStyle = 'rgba(42,36,23,0.55)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(0, -1); ctx.lineTo(3, -11);
      ctx.moveTo(0, -1); ctx.lineTo(-4, -7);
      ctx.moveTo(0, -1); ctx.lineTo(-8, -4);
      ctx.stroke();
      ctx.restore();
    }

    ctx.beginPath();
    ctx.ellipse(-2, 0, 6.5, 3.8, 0, 0, Math.PI * 2);
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(-2, 1.5, 5, 1.6, 0, 0, Math.PI * 2);

    for (const side of [-1, 1]) {
      ctx.beginPath();

    ctx.beginPath();
    ctx.moveTo(4, -1);
    ctx.quadraticCurveTo(7, -5, 11, -3);
    ctx.lineTo(12, -1);
    ctx.quadraticCurveTo(8, 1, 4, 2);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.stroke();

    ctx.save();
    ctx.translate(12, -2);
    ctx.beginPath();
    ctx.moveTo(0, -1.5);
    ctx.lineTo(5, -0.8);
    ctx.lineTo(5, 1.4);
    ctx.lineTo(0, 2.2);
    ctx.quadraticCurveTo(-2, 0, 0, -1.5);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, -1.2);
    ctx.lineTo(-2, -4);
    ctx.lineTo(0.5, -2);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(1.5, -1);
    ctx.lineTo(0.5, -4);
    ctx.lineTo(2.5, -1.5);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(2.2, 0.2, 0.7, 0, Math.PI * 2);
    ctx.fillStyle = '#f5d040';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(2.5, 0.2, 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    ctx.restore();
  }

  // Alt 1: Eastern serpentine dragon — long flowing body, mane, whiskers.
  function drawDragonEastern(ctx, t, speed) {
    const segs = 14;
    const segLen = 2.4;
    const amp = 3.2;
    const points = [];
    for (let i = 0; i < segs; i++) {
      const along = i / (segs - 1);
      const x = 14 - i * segLen;
      const y = Math.sin(t * 2.2 - i * 0.55) * amp * along;
      const r = 3.2 - along * 2.2;
      points.push({ x, y, r });
    }

    // Body: tightly packed circles, no per-segment outline (reads as continuous).
    for (let i = segs - 1; i >= 1; i--) {
      const p = points[i];
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = '#3a7a4a';
      ctx.fill();
    }
    // Outline by stroking just the perimeter approximation
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    for (let i = 1; i < segs; i++) {
      const p = points[i];
      if (i === 1) ctx.moveTo(p.x, p.y - p.r);
      else ctx.lineTo(p.x, p.y - p.r);
    }
    for (let i = segs - 1; i >= 1; i--) {
      const p = points[i];
      ctx.lineTo(p.x, p.y + p.r);
    }
    ctx.closePath();
    ctx.stroke();

    // Mane spikes along the back of the body
    ctx.fillStyle = '#cf4444';
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.4;
    for (let i = 1; i < segs - 1; i++) {
      const p = points[i];
      ctx.beginPath();
      ctx.moveTo(p.x - 0.8, p.y - p.r * 0.9);
      ctx.lineTo(p.x - 1.3, p.y - p.r - 1.6);
      ctx.lineTo(p.x + 0.6, p.y - p.r * 0.9);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    // Head + whiskers + horns
    const head = points[0];
    const next = points[1];
    const headAng = Math.atan2(head.y - next.y, head.x - next.x);
    ctx.save();
    ctx.translate(head.x, head.y);
    ctx.rotate(headAng);

    ctx.beginPath();
    ctx.moveTo(4.5, -2);
    ctx.lineTo(5.5, 0);
    ctx.lineTo(4.5, 2);
    ctx.lineTo(-2, 3);
    ctx.lineTo(-3, 0);
    ctx.lineTo(-2, -3);
    ctx.closePath();
    ctx.fillStyle = '#3a7a4a';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Whiskers (animated drift)
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.6;
    const wig = Math.sin(t * 2.2) * 0.9;
    ctx.beginPath();
    ctx.moveTo(3.5, 1.5);
    ctx.quadraticCurveTo(7, 4, 9, 6 + wig);
    ctx.moveTo(3.5, -1.5);
    ctx.quadraticCurveTo(7, -4, 9, -6 - wig);
    ctx.stroke();

    // Horns (cream)
    ctx.fillStyle = '#f2e8d0';
    ctx.beginPath();
    ctx.moveTo(-1, -2.5);
    ctx.lineTo(-3, -5.5);
    ctx.lineTo(0, -2.8);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(1, -2.5);
    ctx.lineTo(-0.5, -5.5);
    ctx.lineTo(2, -2.8);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Eye
    ctx.beginPath();
    ctx.arc(1.8, -0.5, 0.7, 0, Math.PI * 2);
    ctx.fillStyle = '#f5d040';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(2.1, -0.5, 0.35, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();

    ctx.restore();
  }

  // Alt 2: Side-view wyvern — two legs, near wing in front of body, far wing behind.
  function drawDragonWyvern(ctx, t, speed) {
    const flap = Math.sin(t * 2.8);
    const tailSwish = Math.sin(t * 1.9 + 0.5);
    const bodyFill = '#7a4a9a';
    const bodyDark = '#54306a';

    // === FAR WING (drawn first, behind body) ===
    ctx.save();
    ctx.translate(-1, -1);
    ctx.rotate(-1.2 + flap * 0.35);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-1, -10);
    ctx.quadraticCurveTo(-5, -8, -7, -5);
    ctx.quadraticCurveTo(-8, -3, -7, -1);
    ctx.quadraticCurveTo(-3, -0.5, 0, 0);
    ctx.closePath();
    ctx.fillStyle = bodyDark;
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.6;
    ctx.stroke();
    ctx.restore();

    // === TAIL ===
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(-5, 0);
    ctx.quadraticCurveTo(-12, tailSwish * 2, -17, tailSwish * 4);
    ctx.quadraticCurveTo(-12, tailSwish * 2 + 0.8, -5, 1);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.stroke();
    // Tail spade
    ctx.save();
    ctx.translate(-17, tailSwish * 4);
    ctx.rotate(tailSwish * 0.4 + Math.PI);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(2.5, -1.8);
    ctx.lineTo(1.5, 0);
    ctx.lineTo(2.5, 1.8);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    // === BODY (slim, side-on) ===
    ctx.beginPath();
    ctx.ellipse(-1, 0, 6, 3, 0, 0, Math.PI * 2);
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1;
    ctx.stroke();

    // === LEGS (two — wyvern style) ===
    ctx.beginPath();
    ctx.moveTo(-1, 2);
    ctx.lineTo(0, 6);
    ctx.lineTo(2, 6);
    ctx.lineWidth = 1.4;
    ctx.stroke();
    // Claws on the foot
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, 6); ctx.lineTo(-1, 6.8);
    ctx.moveTo(1, 6); ctx.lineTo(1, 6.8);
    ctx.moveTo(2, 6); ctx.lineTo(3, 6.8);
    ctx.stroke();

    // === NECK + HEAD ===
    ctx.beginPath();
    ctx.moveTo(4, -1);
    ctx.quadraticCurveTo(8, -5, 11, -4);
    ctx.lineTo(11, -1);
    ctx.quadraticCurveTo(8, 0.5, 4, 1.5);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.lineWidth = 0.9;
    ctx.stroke();

    // Head
    ctx.save();
    ctx.translate(11, -3);
    ctx.beginPath();
    ctx.moveTo(0, -1);
    ctx.lineTo(5, 0);
    ctx.lineTo(5, 2);
    ctx.lineTo(0, 2.5);
    ctx.quadraticCurveTo(-1.5, 0.7, 0, -1);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.stroke();
    // Crest horn back
    ctx.beginPath();
    ctx.moveTo(0, -0.8);
    ctx.lineTo(-2, -3.5);
    ctx.lineTo(1.5, -1.5);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.stroke();
    // Eye
    ctx.beginPath();
    ctx.arc(2, 0.5, 0.7, 0, Math.PI * 2);
    ctx.fillStyle = '#f5d040';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(2.3, 0.5, 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    // Nostril
    ctx.beginPath();
    ctx.arc(4.5, 1.4, 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    ctx.restore();

    // === NEAR WING (drawn last, in front of body) ===
    ctx.save();
    ctx.translate(1, -1);
    ctx.rotate(-1.0 - flap * 0.35);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -12);
    ctx.quadraticCurveTo(-5, -9, -7, -6);
    ctx.quadraticCurveTo(-9, -3, -8, -1);
    ctx.quadraticCurveTo(-4, -0.5, 0, 0);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // Finger struts
    ctx.strokeStyle = 'rgba(42,36,23,0.55)';
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(0, -12);
    ctx.moveTo(0, 0); ctx.lineTo(-7, -6);
    ctx.moveTo(0, 0); ctx.lineTo(-8, -1);
    ctx.stroke();
    ctx.restore();
  }

  // Alt 3: Chibi/cute dragon — round body, big eyes, fast little wings.
  function drawDragonChibi(ctx, t, speed) {
    const flapRate = 5 + speed * 2;
    const flap = Math.sin(t * flapRate);
    const bodyFill = '#a8c8e0';
    const bodyDark = '#7aa8c8';

    // FAR wing
    ctx.save();
    ctx.translate(-2, -2);
    ctx.rotate(-1.3 + flap * 0.5);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -5.5);
    ctx.quadraticCurveTo(-3.5, -4, -4.5, -2);
    ctx.quadraticCurveTo(-3, 0, 0, 0);
    ctx.closePath();
    ctx.fillStyle = bodyDark;
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.6;
    ctx.stroke();
    ctx.restore();

    // Tail (curly, short)
    ctx.beginPath();
    ctx.moveTo(-5, 1);
    ctx.quadraticCurveTo(-9, 1, -10, -1);
    ctx.quadraticCurveTo(-11, -3, -8, -3);
    ctx.quadraticCurveTo(-7, -2, -7, 0);
    ctx.quadraticCurveTo(-6, 2, -5, 1);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.stroke();

    // Body (round + chubby)
    ctx.beginPath();
    ctx.arc(-1, 1, 5.5, 0, Math.PI * 2);
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.lineWidth = 0.9;
    ctx.stroke();
    // Belly patch
    ctx.beginPath();
    ctx.ellipse(-1, 3, 3.5, 1.8, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#e8f0f8';
    ctx.fill();

    // Tiny front feet
    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.ellipse(2, 4 + side * 0.5, 1.6, 1, 0, 0, Math.PI * 2);
      ctx.fillStyle = bodyFill;
      ctx.fill();
      ctx.stroke();
    }

    // Head (big, kid-cute proportions)
    ctx.save();
    ctx.translate(5, -2);
    ctx.beginPath();
    ctx.arc(0, 0, 4.5, 0, Math.PI * 2);
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.stroke();
    // Snout bump
    ctx.beginPath();
    ctx.ellipse(3, 1, 2.2, 1.6, 0, 0, Math.PI * 2);
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.stroke();
    // Nostril
    ctx.beginPath();
    ctx.arc(4.2, 0.7, 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    // Big eye
    ctx.beginPath();
    ctx.arc(1, -1, 1.6, 0, Math.PI * 2);
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(1.3, -0.7, 0.8, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    // Highlight
    ctx.beginPath();
    ctx.arc(1.7, -1.1, 0.35, 0, Math.PI * 2);
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    // Little horn nubs
    ctx.beginPath();
    ctx.arc(-1.5, -3, 0.9, 0, Math.PI * 2);
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(1, -3.5, 0.9, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // Mouth (tiny smile)
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.arc(3, 1.5, 0.7, 0, Math.PI, false);
    ctx.stroke();
    ctx.restore();

    // NEAR wing (in front)
    ctx.save();
    ctx.translate(0, 0);
    ctx.rotate(-1.0 - flap * 0.5);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -7);
    ctx.quadraticCurveTo(-4, -5, -5.5, -2);
    ctx.quadraticCurveTo(-3, 0, 0, 0);
    ctx.closePath();
    ctx.fillStyle = '#9ad0e8';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(42,36,23,0.45)';
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(0, -7);
    ctx.moveTo(0, 0); ctx.lineTo(-5.5, -2);
    ctx.stroke();
    ctx.restore();
  }

  function drawWindSerpent(ctx, t, speed) {
    const segs = 7;
    const segLen = 4.2;
    const amp = 3.2;
    const points = [];
    for (let i = 0; i < segs; i++) {
      const along = i / (segs - 1);
      const x = 12 - i * segLen;
      const y = Math.sin(t * 2.6 - i * 0.9) * amp * along;
      points.push({ x, y, r: 4.6 - along * 3.6 });
    }

    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    for (let i = segs - 1; i >= 1; i--) {
      const p = points[i];
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = '#8a4eb0';
      ctx.fill();
      ctx.stroke();
    }

    const head = points[0];
    const next = points[1];
    const headAng = Math.atan2(head.y - next.y, head.x - next.x);
    ctx.save();
    ctx.translate(head.x, head.y);
    ctx.rotate(headAng);

    const wingFlap = Math.sin(t * 5.5) * 0.45;
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      ctx.rotate(-0.35 + wingFlap);
      ctx.beginPath();
      ctx.moveTo(-2, 0);
      ctx.quadraticCurveTo(-5, -9, -12, -7);
      ctx.quadraticCurveTo(-7, -3, -3, -1);
      ctx.closePath();
      ctx.fillStyle = '#b07cd0';
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    ctx.beginPath();
    ctx.moveTo(5, 0);
    ctx.quadraticCurveTo(3, -4, -3, -3);
    ctx.lineTo(-3, 3);
    ctx.quadraticCurveTo(3, 4, 5, 0);
    ctx.closePath();
    ctx.fillStyle = '#8a4eb0';
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-1, -3);
    ctx.lineTo(-3, -6);
    ctx.lineTo(0, -4);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(1.5, -1, 0.8, 0, Math.PI * 2);
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(2, -1, 0.4, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    ctx.restore();
  }

  function drawManta(ctx, t, speed) {
    const wingPhase = Math.sin(t * (2.4 + speed * 1.2));

    ctx.beginPath();
    ctx.moveTo(11, 0);
    ctx.quadraticCurveTo(8, -3, 2, -2.2);
    ctx.lineTo(-10, -1);
    ctx.lineTo(-10, 1);
    ctx.lineTo(2, 2.2);
    ctx.quadraticCurveTo(8, 3, 11, 0);
    ctx.closePath();
    ctx.fillStyle = '#3e556d';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      const tip = -11 + wingPhase * 3;
      ctx.beginPath();
      ctx.moveTo(8, -1);
      ctx.bezierCurveTo(4, -3, -2, tip, -9, -9 + wingPhase * 2);
      ctx.bezierCurveTo(-5, -5, -2, -3, -8, -1);
      ctx.closePath();
      ctx.fillStyle = '#536e88';
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      ctx.beginPath();
      ctx.moveTo(10, -1);
      ctx.quadraticCurveTo(14, -2.5, 13, -0.5);
      ctx.closePath();
      ctx.fillStyle = '#3e556d';
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    ctx.beginPath();
    ctx.moveTo(-9, 0);
    ctx.quadraticCurveTo(-15, Math.sin(t * 2.4) * 1.6, -22, Math.sin(t * 2.4 + 1) * 2);
    ctx.lineWidth = 0.9;
    ctx.stroke();

    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.arc(8, side * 1.2, 0.55, 0, Math.PI * 2);
      ctx.fillStyle = '#f2e8d0';
      ctx.fill();
    }
  }

  function drawJellyfish(ctx, t, speed) {
    const pulse = 1 + Math.sin(t * 2.2) * 0.09;
    const len = 7 + speed * 16;
    const wigAmp = 0.7 + speed * 1.4;
    const wigRate = 1.8 + speed * 1.6;

    function backX(y) {
      const k = y / 8;
      return 1.6 - 1.8 * (1 - k * k);
    }

    ctx.strokeStyle = 'rgba(120, 70, 130, 0.85)';
    ctx.lineCap = 'round';
    ctx.lineWidth = 1.1;
    const tendrils = 5;
    for (let i = 0; i < tendrils; i++) {
      const ty = (i - (tendrils - 1) / 2) * 2.6;
      const tx = backX(ty) * pulse;
      const sy = ty * pulse;
      const wig = Math.sin(t * wigRate + i * 0.8) * wigAmp;
      ctx.beginPath();
      ctx.moveTo(tx, sy);
      ctx.bezierCurveTo(
        tx - len * 0.35, sy + wig * 1.1,
        tx - len * 0.75, sy + wig * 1.7,
        tx - len,        sy + wig * 2.2
      );
      ctx.stroke();
    }
    ctx.lineCap = 'butt';

    ctx.save();
    ctx.scale(pulse, pulse);
    ctx.beginPath();
    ctx.ellipse(2, 0, 10, 8, 0, -Math.PI / 2, Math.PI / 2);
    ctx.bezierCurveTo(0, 5, 0, -5, 2, -8);
    ctx.closePath();
    const grad = ctx.createRadialGradient(4, -2, 0, 4, -2, 14);
    grad.addColorStop(0, 'rgba(245, 210, 230, 0.92)');
    grad.addColorStop(1, 'rgba(180, 130, 180, 0.78)');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(80, 40, 80, 0.55)';
    ctx.lineWidth = 0.9;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(120, 70, 130, 0.4)';
    ctx.lineWidth = 0.6;
    for (let i = -1; i <= 1; i++) {
      const a = i * 0.45;
      ctx.beginPath();
      ctx.moveTo(2, 0);
      ctx.lineTo(2 + Math.cos(a) * 10, Math.sin(a) * 8);
      ctx.stroke();
    }
    ctx.restore();

    ctx.beginPath();
    ctx.ellipse(6, -3, 2, 1.2, -0.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
    ctx.fill();
  }

  function drawBalloon(ctx, t, speed) {
    ctx.beginPath();
    ctx.moveTo(0, -16);
    ctx.bezierCurveTo(11, -16, 12, -6, 6, -1);
    ctx.lineTo(-6, -1);
    ctx.bezierCurveTo(-12, -6, -11, -16, 0, -16);
    ctx.closePath();
    ctx.fillStyle = '#c9622e';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.9;
    ctx.stroke();

    ctx.strokeStyle = 'rgba(42,36,23,0.5)';
    ctx.lineWidth = 0.5;
    for (const x of [-6, -3, 0, 3, 6]) {
      ctx.beginPath();
      ctx.moveTo(x, -1);
      ctx.quadraticCurveTo(x * 1.15, -8, x * 0.45, -16);
      ctx.stroke();
    }

    ctx.strokeStyle = '#f2e8d0';
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.moveTo(-10, -9);
    ctx.quadraticCurveTo(0, -7.5, 10, -9);
    ctx.stroke();

    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.55;
    for (const x of [-4, -1, 1, 4]) {
      ctx.beginPath();
      ctx.moveTo(x, -1);
      ctx.lineTo(x * 0.55, 4);
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.rect(-3.5, 4, 7, 4);
    ctx.fillStyle = '#a06030';
    ctx.fill();
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(42,36,23,0.45)';
    ctx.lineWidth = 0.4;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(i, 4); ctx.lineTo(i, 8);
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.moveTo(-3.5, 6); ctx.lineTo(3.5, 6);
    ctx.stroke();

    if (speed > 0.15) {
      const flick = 0.7 + 0.3 * Math.sin(t * 14);
      ctx.save();
      ctx.globalAlpha = 0.55 + speed * 0.4;
      ctx.fillStyle = '#ffa030';
      ctx.beginPath();
      ctx.moveTo(0, 4);
      ctx.quadraticCurveTo(2.4 * flick, 1.5, 0, -1.5 * flick);
      ctx.quadraticCurveTo(-2.4 * flick, 1.5, 0, 4);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#ffe080';
      ctx.beginPath();
      ctx.moveTo(0, 4);
      ctx.quadraticCurveTo(1.2 * flick, 2.2, 0, 0.5);
      ctx.quadraticCurveTo(-1.2 * flick, 2.2, 0, 4);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  function drawCloudGalleon(ctx, t, speed) {
    const w = 10;
    drawCloudPlatform(ctx, w, { y: 7, r: 4 });
    drawBowlHull(ctx, w, 5);

    // Mast
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(0, -3.5);
    ctx.lineTo(0, -16);
    ctx.stroke();

    // Yard
    ctx.lineWidth = 0.9;
    ctx.beginPath();
    ctx.moveTo(-6, -13);
    ctx.lineTo(6, -13);
    ctx.stroke();

    // Square sail
    ctx.beginPath();
    ctx.moveTo(-5, -13);
    ctx.lineTo(5, -13);
    ctx.lineTo(5, -4);
    ctx.lineTo(-5, -4);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.lineWidth = 0.7;
    ctx.stroke();
    // Belly hint
    ctx.strokeStyle = 'rgba(42,36,23,0.4)';
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.moveTo(0, -13);
    ctx.lineTo(0, -4);
    ctx.stroke();

    drawCrowsNest(ctx, 0, -16);

    // Side fins (one per side, gentle flap)
    const flap = 0.55 + 0.45 * Math.sin(t * (3 + speed * 2));
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      ctx.translate(0, -1.5);
      ctx.scale(1, flap);
      ctx.beginPath();
      ctx.moveTo(-3, 0);
      ctx.quadraticCurveTo(3, -4, 5, -3);
      ctx.quadraticCurveTo(3, -1, -2, 0);
      ctx.closePath();
      ctx.fillStyle = '#f0e0c0';
      ctx.fill();
      ctx.strokeStyle = '#2a2417';
      ctx.lineWidth = 0.5;
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawCloudGalleonMulti(ctx, t, speed) {
    const w = 14;
    drawCloudPlatform(ctx, w, { y: 7, r: 4.2 });
    drawBowlHull(ctx, w, 5);

    ctx.strokeStyle = '#2a2417';

    // Bowsprit
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(w * 0.95, -2);
    ctx.lineTo(w * 1.45, -4);
    ctx.stroke();

    // Foremast
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(6, -3.5);
    ctx.lineTo(6, -12);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(2.5, -10);
    ctx.lineTo(9.5, -10);
    ctx.lineWidth = 0.7;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(3, -10);
    ctx.lineTo(9, -10);
    ctx.lineTo(9, -4);
    ctx.lineTo(3, -4);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.lineWidth = 0.6;
    ctx.stroke();

    // Mainmast
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-2, -3.5);
    ctx.lineTo(-2, -17);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-8, -14);
    ctx.lineTo(4, -14);
    ctx.lineWidth = 0.9;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-7, -14);
    ctx.lineTo(3, -14);
    ctx.lineTo(3, -4);
    ctx.lineTo(-7, -4);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(42,36,23,0.4)';
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.moveTo(-2, -14);
    ctx.lineTo(-2, -4);
    ctx.stroke();

    drawCrowsNest(ctx, -2, -17);

    // Stern pennant fluttering
    const pennant = Math.sin(t * (4 + speed * 2)) * 1.2;
    ctx.fillStyle = '#c9622e';
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(-2, -17);
    ctx.lineTo(2 + pennant, -16);
    ctx.lineTo(-2, -15);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  function drawCloudGalleonWinged(ctx, t, speed) {
    const w = 9;

    // Modest cloud
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = 'rgba(80, 110, 140, 0.55)';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.arc(-5, 6.5, 3, 0, Math.PI * 2);
    ctx.arc(0, 7, 3.6, 0, Math.PI * 2);
    ctx.arc(5, 6.5, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#5a6a7c';
    ctx.beginPath();
    ctx.ellipse(0, 10, 7, 1.2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    drawBowlHull(ctx, w, 4);

    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, -2.8);
    ctx.lineTo(0, -11);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(-3, -10);
    ctx.lineTo(3, -10);
    ctx.lineTo(3, -3.5);
    ctx.lineTo(-3, -3.5);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.lineWidth = 0.6;
    ctx.stroke();

    drawCrowsNest(ctx, 0, -11);

    // Big flapping wings
    const flapRate = 4 + speed * 2;
    const flap = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * flapRate));
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      ctx.translate(-2, -1);
      ctx.scale(1, flap);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(2, -10, -8, -14, -10, -6);
      ctx.bezierCurveTo(-6, -3, -2, -1, 0, 0);
      ctx.closePath();
      ctx.fillStyle = '#f0e0c0';
      ctx.fill();
      ctx.strokeStyle = '#2a2417';
      ctx.lineWidth = 0.6;
      ctx.stroke();
      ctx.strokeStyle = 'rgba(42,36,23,0.4)';
      ctx.lineWidth = 0.4;
      ctx.beginPath();
      ctx.moveTo(0, 0); ctx.lineTo(-6, -8);
      ctx.moveTo(0, 0); ctx.lineTo(-10, -6);
      ctx.stroke();
      ctx.restore();
    }
  }

  // ===== Top-down + 3/4 view explorations =====

  function drawWyvernTopdown(ctx, t, speed) {
    // Top-down wyvern: head + neck pointing forward, two legs tucked alongside
    // body, two big wings spread sideways, long whippy tail.
    const flapRate = 2.6 + speed * 1.2;
    const flap = Math.sin(t * flapRate);
    const tailSwish = Math.sin(t * 1.7 + 0.4);
    const body = '#7a4a9a', bodyDark = '#54306a', belly = '#a880c0';
    const ink = '#2a2417';

    // Tail (segments along x = -5 to -18, swishing in y)
    ctx.strokeStyle = ink; ctx.lineWidth = 0.9;
    ctx.beginPath();
    ctx.moveTo(-5, -1.8);
    ctx.bezierCurveTo(-10, -1.5 + tailSwish * 1.5, -14, tailSwish * 3.5, -18, tailSwish * 5);
    ctx.bezierCurveTo(-14, tailSwish * 3.5 + 0.7, -10, -1 + tailSwish * 1.5, -5, 1.8);
    ctx.closePath();
    ctx.fillStyle = body; ctx.fill(); ctx.stroke();
    // Arrowhead at tip
    ctx.save();
    ctx.translate(-18, tailSwish * 5);
    ctx.rotate(Math.atan2(tailSwish * 1.5, -4));
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(2.2, -1.6); ctx.lineTo(1.2, 0); ctx.lineTo(2.2, 1.6);
    ctx.closePath();
    ctx.fillStyle = body; ctx.fill(); ctx.stroke();
    ctx.restore();

    // Wings — symmetric, fully spread.
    // Wings flap by scaling y by (1 - 0.25 * flap) — gentler "up" view of flap.
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      ctx.translate(-1, 0);
      ctx.scale(1, 0.85 + 0.18 * flap);
      // Wing outline: dragony, three finger points
      ctx.beginPath();
      ctx.moveTo(0, -1);
      ctx.lineTo(4, -12);
      ctx.lineTo(-1, -10);
      ctx.lineTo(-4, -11);
      ctx.lineTo(-3, -7);
      ctx.lineTo(-7, -8);
      ctx.lineTo(-5, -4);
      ctx.lineTo(-8, -3);
      ctx.quadraticCurveTo(-5, -1, 0, -1);
      ctx.closePath();
      ctx.fillStyle = bodyDark;
      ctx.fill();
      ctx.strokeStyle = ink; ctx.lineWidth = 0.7; ctx.stroke();
      // Wing finger struts
      ctx.strokeStyle = 'rgba(42,36,23,0.55)'; ctx.lineWidth = 0.45;
      ctx.beginPath();
      ctx.moveTo(0, -1); ctx.lineTo(4, -12);
      ctx.moveTo(0, -1); ctx.lineTo(-4, -11);
      ctx.moveTo(0, -1); ctx.lineTo(-7, -8);
      ctx.moveTo(0, -1); ctx.lineTo(-8, -3);
      ctx.stroke();
      ctx.restore();
    }

    // Legs (two — wyvern, not four). Tucked alongside body, claws splayed.
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.translate(-2, 3.2 * side);
      ctx.rotate(0.25 * side);
      ctx.beginPath();
      ctx.ellipse(0, 0, 2.4, 1.2, 0, 0, Math.PI * 2);
      ctx.fillStyle = body; ctx.fill();
      ctx.strokeStyle = ink; ctx.lineWidth = 0.6; ctx.stroke();
      // Claws
      ctx.beginPath();
      ctx.moveTo(2, -0.5 * side); ctx.lineTo(3.5, -1 * side);
      ctx.moveTo(2.2, 0);         ctx.lineTo(3.7, 0);
      ctx.moveTo(2, 0.5 * side);  ctx.lineTo(3.5, 1 * side);
      ctx.strokeStyle = ink; ctx.lineWidth = 0.45; ctx.stroke();
      ctx.restore();
    }

    // Body — elongated oval
    ctx.beginPath();
    ctx.ellipse(-1, 0, 6.5, 3.4, 0, 0, Math.PI * 2);
    ctx.fillStyle = body; ctx.fill();
    ctx.strokeStyle = ink; ctx.lineWidth = 1; ctx.stroke();
    // Spine ridge (cream highlight)
    ctx.strokeStyle = 'rgba(255,248,224,0.35)'; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(4, 0); ctx.lineTo(-7, 0); ctx.stroke();
    // Belly hint (subtle dark line on each side)
    ctx.strokeStyle = 'rgba(42,36,23,0.3)'; ctx.lineWidth = 0.35;
    ctx.beginPath();
    ctx.moveTo(4, -2.5); ctx.bezierCurveTo(0, -3.2, -4, -3.1, -6.5, -1);
    ctx.moveTo(4,  2.5); ctx.bezierCurveTo(0,  3.2, -4,  3.1, -6.5,  1);
    ctx.stroke();

    // Neck
    ctx.beginPath();
    ctx.moveTo(4, -2.2);
    ctx.quadraticCurveTo(8, -2.4, 11, -1.4);
    ctx.lineTo(11, 1.4);
    ctx.quadraticCurveTo(8, 2.4, 4, 2.2);
    ctx.closePath();
    ctx.fillStyle = body; ctx.fill();
    ctx.lineWidth = 0.8; ctx.strokeStyle = ink; ctx.stroke();

    // Head — diamond/wedge with horns flaring back
    ctx.beginPath();
    ctx.moveTo(15.5, 0);
    ctx.lineTo(11, -2.4);
    ctx.lineTo(10, 0);
    ctx.lineTo(11, 2.4);
    ctx.closePath();
    ctx.fillStyle = body; ctx.fill(); ctx.stroke();
    // Horns
    ctx.beginPath();
    ctx.moveTo(11, -2);
    ctx.lineTo(9, -3.8);
    ctx.moveTo(11, 2);
    ctx.lineTo(9, 3.8);
    ctx.lineWidth = 0.7; ctx.stroke();
    // Eyes
    ctx.fillStyle = '#f5d040';
    ctx.beginPath(); ctx.arc(13, -1.1, 0.55, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(13,  1.1, 0.55, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = ink;
    ctx.beginPath(); ctx.arc(13.2, -1.1, 0.25, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(13.2,  1.1, 0.25, 0, Math.PI * 2); ctx.fill();
  }

  function drawWyvernThreeQ(ctx, t, speed) {
    // 3/4 view: camera looks down + slightly forward of the wyvern, so the
    // near wing is bigger/closer and the far wing reads smaller and behind.
    // Body angled so we see top + a hint of left flank.
    const flapRate = 2.6 + speed * 1.2;
    const flap = Math.sin(t * flapRate);
    const tailSwish = Math.sin(t * 1.7 + 0.5);
    const body = '#7a4a9a', bodyDark = '#54306a', belly = '#a880c0';
    const ink = '#2a2417';

    // Far wing (smaller, partially behind body)
    ctx.save();
    ctx.translate(-2, -2);
    ctx.scale(1, 0.55 - 0.18 * flap); // foreshortened vertically
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(3, -10);
    ctx.lineTo(-2, -9);
    ctx.lineTo(-5, -10);
    ctx.lineTo(-4, -6);
    ctx.lineTo(-7, -7);
    ctx.lineTo(-5, -3);
    ctx.lineTo(-7, -2);
    ctx.quadraticCurveTo(-3, -1, 0, 0);
    ctx.closePath();
    ctx.fillStyle = bodyDark;
    ctx.fill();
    ctx.strokeStyle = ink; ctx.lineWidth = 0.6; ctx.stroke();
    ctx.restore();

    // Tail (curves down + away to suggest depth)
    ctx.strokeStyle = ink; ctx.lineWidth = 0.9;
    ctx.beginPath();
    ctx.moveTo(-5, 0);
    ctx.bezierCurveTo(-10, 1 + tailSwish, -14, 3 + tailSwish * 1.5, -17, 5 + tailSwish * 2);
    ctx.bezierCurveTo(-14, 3.5 + tailSwish * 1.5, -10, 2 + tailSwish, -5, 2);
    ctx.closePath();
    ctx.fillStyle = body; ctx.fill(); ctx.stroke();
    ctx.save();
    ctx.translate(-17, 5 + tailSwish * 2);
    ctx.rotate(Math.atan2(2, -3));
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(2.2, -1.6); ctx.lineTo(1.2, 0); ctx.lineTo(2.2, 1.6);
    ctx.closePath();
    ctx.fillStyle = body; ctx.fill(); ctx.stroke();
    ctx.restore();

    // Body — visible top, slight side shading underneath (belly hint)
    ctx.beginPath();
    ctx.ellipse(-1, 0, 7, 3.8, 0, 0, Math.PI * 2);
    ctx.fillStyle = body; ctx.fill();
    ctx.strokeStyle = ink; ctx.lineWidth = 1; ctx.stroke();
    // Belly shading on bottom edge (the "facing camera" side in 3/4)
    ctx.beginPath();
    ctx.ellipse(-1, 1.5, 6, 1.6, 0, 0, Math.PI * 2);
    ctx.fillStyle = belly; ctx.fill();
    // Spine highlight (top side, slightly above center)
    ctx.strokeStyle = 'rgba(255,248,224,0.4)'; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(4, -0.8); ctx.lineTo(-7, -0.8); ctx.stroke();

    // Visible (near) leg — bottom of frame, slightly foreshortened
    ctx.save();
    ctx.translate(-2, 3.6);
    ctx.beginPath();
    ctx.ellipse(0, 0, 2.6, 1.3, 0, 0, Math.PI * 2);
    ctx.fillStyle = body; ctx.fill();
    ctx.strokeStyle = ink; ctx.lineWidth = 0.6; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(2.2, -0.5); ctx.lineTo(3.7, -1);
    ctx.moveTo(2.4, 0);    ctx.lineTo(3.9, 0);
    ctx.moveTo(2.2, 0.5);  ctx.lineTo(3.7, 1);
    ctx.lineWidth = 0.45; ctx.stroke();
    ctx.restore();

    // Neck (angled slightly down + right)
    ctx.beginPath();
    ctx.moveTo(4, -2.5);
    ctx.quadraticCurveTo(8, -2, 11, -0.6);
    ctx.lineTo(11, 1.8);
    ctx.quadraticCurveTo(8, 2.4, 4, 2);
    ctx.closePath();
    ctx.fillStyle = body; ctx.fill();
    ctx.lineWidth = 0.9; ctx.strokeStyle = ink; ctx.stroke();

    // Head — angled slightly, snout protrudes more (we see top + a sliver of jaw)
    ctx.beginPath();
    ctx.moveTo(15.5, 0.5);
    ctx.lineTo(11.5, -1.8);
    ctx.lineTo(10.5, 0.5);
    ctx.lineTo(11.5, 2.6);
    ctx.closePath();
    ctx.fillStyle = body; ctx.fill(); ctx.stroke();
    // Jawline highlight (sliver of belly color underneath)
    ctx.beginPath();
    ctx.moveTo(15.5, 0.5);
    ctx.lineTo(11.5, 2.6);
    ctx.lineTo(13, 1.8);
    ctx.closePath();
    ctx.fillStyle = belly; ctx.fill();
    // Horns (asymmetric — closer horn larger)
    ctx.strokeStyle = ink; ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(11.5, -1.6); ctx.lineTo(9, -3.6);
    ctx.moveTo(11.5,  1.8); ctx.lineTo(9.5, 3.4);
    ctx.stroke();
    // Eyes (asymmetric — near eye lower in frame)
    ctx.fillStyle = '#f5d040';
    ctx.beginPath(); ctx.arc(13.2, -0.6, 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(13.0,  1.6, 0.6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = ink;
    ctx.beginPath(); ctx.arc(13.35, -0.6, 0.22, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(13.15,  1.6, 0.27, 0, Math.PI * 2); ctx.fill();

    // Near wing (in front of body, larger, more anatomical detail)
    ctx.save();
    ctx.translate(-1, 1);
    ctx.scale(1, 0.95 + 0.2 * flap);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(5, 11);
    ctx.lineTo(-1, 11);
    ctx.lineTo(-5, 12);
    ctx.lineTo(-4, 7);
    ctx.lineTo(-8, 8);
    ctx.lineTo(-6, 4);
    ctx.lineTo(-9, 3);
    ctx.quadraticCurveTo(-5, 1, 0, 0);
    ctx.closePath();
    ctx.fillStyle = body;
    ctx.fill();
    ctx.strokeStyle = ink; ctx.lineWidth = 0.8; ctx.stroke();
    ctx.strokeStyle = 'rgba(42,36,23,0.55)'; ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(5, 11);
    ctx.moveTo(0, 0); ctx.lineTo(-5, 12);
    ctx.moveTo(0, 0); ctx.lineTo(-8, 8);
    ctx.moveTo(0, 0); ctx.lineTo(-9, 3);
    ctx.stroke();
    ctx.restore();
  }

  function drawCloudGalleonTopdown(ctx, t, speed) {
    // Looking straight down. Hull is an oval deck, mast is a small disk in
    // center, sail trails behind the mast like a flag in the wind.
    const ink = '#2a2417';
    const hull = '#a06030', deck = '#c9883e', deckShade = '#8a4a26';

    // Cloud — slightly offset, soft edge
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(-8, 4, 5, 0, Math.PI * 2);
    ctx.arc(-2, 6, 6, 0, Math.PI * 2);
    ctx.arc(5, 5, 5.5, 0, Math.PI * 2);
    ctx.arc(10, 3, 4, 0, Math.PI * 2);
    ctx.arc(-4, -3, 5, 0, Math.PI * 2);
    ctx.arc(4, -4, 4.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(80, 110, 140, 0.5)';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Hull — pointed bow, rounded stern, classic galleon plan view
    ctx.beginPath();
    ctx.moveTo(14, 0);
    ctx.quadraticCurveTo(11, -4.5, 4, -5);
    ctx.lineTo(-7, -4.5);
    ctx.quadraticCurveTo(-11, -3.5, -11, 0);
    ctx.quadraticCurveTo(-11, 3.5, -7, 4.5);
    ctx.lineTo(4, 5);
    ctx.quadraticCurveTo(11, 4.5, 14, 0);
    ctx.closePath();
    ctx.fillStyle = hull;
    ctx.fill();
    ctx.strokeStyle = ink; ctx.lineWidth = 1;
    ctx.stroke();

    // Deck planks (thin lines along the length)
    ctx.strokeStyle = 'rgba(42,36,23,0.4)';
    ctx.lineWidth = 0.4;
    for (const y of [-3, -1, 1, 3]) {
      ctx.beginPath();
      ctx.moveTo(-9, y);
      ctx.lineTo(12, y);
      ctx.stroke();
    }
    // Cross beams
    for (const x of [-5, 0, 6, 10]) {
      ctx.beginPath();
      ctx.moveTo(x, -4); ctx.lineTo(x, 4);
      ctx.stroke();
    }
    // Stern darker accent
    ctx.beginPath();
    ctx.moveTo(-7, -4.5);
    ctx.quadraticCurveTo(-11, -3.5, -11, 0);
    ctx.quadraticCurveTo(-11, 3.5, -7, 4.5);
    ctx.lineTo(-7, 3); ctx.lineTo(-9, 0); ctx.lineTo(-7, -3);
    ctx.closePath();
    ctx.fillStyle = deckShade; ctx.fill();

    // Sail — trails back from the mast like a flag, slight ripple
    const ripple = Math.sin(t * 3 + speed * 2) * 0.6;
    ctx.beginPath();
    ctx.moveTo(1, -3.5 + ripple * 0.3);
    ctx.quadraticCurveTo(-3, -5 + ripple, -7, -4 + ripple * 1.4);
    ctx.lineTo(-7, 4 - ripple * 1.4);
    ctx.quadraticCurveTo(-3, 5 - ripple, 1, 3.5 - ripple * 0.3);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0'; ctx.fill();
    ctx.strokeStyle = ink; ctx.lineWidth = 0.6;
    ctx.stroke();
    // Sail wrinkle lines
    ctx.strokeStyle = 'rgba(42,36,23,0.35)'; ctx.lineWidth = 0.35;
    ctx.beginPath();
    ctx.moveTo(1, -2 + ripple * 0.5); ctx.quadraticCurveTo(-3, -2.6 + ripple, -7, -1.5);
    ctx.moveTo(1, 0); ctx.quadraticCurveTo(-3, 0.3 + ripple * 0.5, -7, 0);
    ctx.moveTo(1, 2 - ripple * 0.5); ctx.quadraticCurveTo(-3, 2.6 - ripple, -7, 1.5);
    ctx.stroke();

    // Mast (disk in center, on top of sail)
    ctx.beginPath();
    ctx.arc(1, 0, 1, 0, Math.PI * 2);
    ctx.fillStyle = '#6a3a1a'; ctx.fill();
    ctx.strokeStyle = ink; ctx.lineWidth = 0.5; ctx.stroke();

    // Bowsprit (small spar pointing forward off the bow)
    ctx.strokeStyle = ink; ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(13, 0); ctx.lineTo(16, 0);
    ctx.stroke();

    // Stern flag/banner trailing back
    ctx.fillStyle = '#c9622e';
    ctx.beginPath();
    ctx.moveTo(-11, -0.5);
    ctx.lineTo(-15, -1.5);
    ctx.lineTo(-14, 0);
    ctx.lineTo(-15, 1.5);
    ctx.lineTo(-11, 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = ink; ctx.lineWidth = 0.4; ctx.stroke();
  }

  function drawCloudGalleonThreeQ(ctx, t, speed) {
    // 3/4: looking down + a little forward. We see the deck AND a strip of
    // the hull side, the sail catches wind and tilts toward camera.
    const ink = '#2a2417';
    const hull = '#a06030', hullShade = '#7a4a26', deck = '#c9883e';

    // Cloud underneath (offset down + back for depth)
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(-7, 7, 4.5, 0, Math.PI * 2);
    ctx.arc(0, 9, 5.5, 0, Math.PI * 2);
    ctx.arc(6, 8, 4.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(80,110,140,0.45)';
    ctx.lineWidth = 0.5; ctx.stroke();

    // Hull side strip (visible on bottom edge of hull due to camera tilt)
    ctx.beginPath();
    ctx.moveTo(13, 1);
    ctx.quadraticCurveTo(11, 6, 4, 6.2);
    ctx.lineTo(-7, 5.8);
    ctx.quadraticCurveTo(-11, 4.6, -10, 1);
    ctx.lineTo(-9, 2);
    ctx.lineTo(-7, 4);
    ctx.lineTo(4, 4.2);
    ctx.lineTo(11, 4);
    ctx.lineTo(13, 1);
    ctx.closePath();
    ctx.fillStyle = hullShade;
    ctx.fill();
    ctx.strokeStyle = ink; ctx.lineWidth = 0.7;
    ctx.stroke();
    // Plank lines on hull side
    ctx.strokeStyle = 'rgba(42,36,23,0.4)'; ctx.lineWidth = 0.35;
    ctx.beginPath();
    ctx.moveTo(-9, 2.6); ctx.quadraticCurveTo(0, 4.2, 11, 2.8);
    ctx.moveTo(-9, 4); ctx.quadraticCurveTo(0, 5.5, 11, 4);
    ctx.stroke();

    // Deck (top of hull, slightly above center)
    ctx.beginPath();
    ctx.moveTo(13, 1);
    ctx.quadraticCurveTo(10, -3.5, 4, -4);
    ctx.lineTo(-7, -3.5);
    ctx.quadraticCurveTo(-10, -2.5, -10, 1);
    ctx.lineTo(-7, 4);
    ctx.lineTo(4, 4.2);
    ctx.lineTo(11, 4);
    ctx.lineTo(13, 1);
    ctx.closePath();
    ctx.fillStyle = hull; ctx.fill();
    ctx.lineWidth = 1; ctx.strokeStyle = ink; ctx.stroke();

    // Deck plank lines (more spread out since we're not pure top-down)
    ctx.strokeStyle = 'rgba(42,36,23,0.4)'; ctx.lineWidth = 0.4;
    for (const y of [-1.8, 0, 1.8]) {
      ctx.beginPath();
      ctx.moveTo(-9, y); ctx.quadraticCurveTo(0, y + 0.3, 12, y + 0.3);
      ctx.stroke();
    }
    for (const x of [-4, 1, 7]) {
      ctx.beginPath();
      ctx.moveTo(x, -3); ctx.lineTo(x, 4);
      ctx.stroke();
    }

    // Mast (now visible as a vertical pole because of camera tilt)
    ctx.strokeStyle = ink; ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(1, 1); ctx.lineTo(1, -12);
    ctx.stroke();

    // Sail (tilted toward camera, big rectangle catching wind)
    const billow = 0.5 + 0.5 * Math.sin(t * 2 + speed * 1.5);
    ctx.beginPath();
    ctx.moveTo(-4, -11.5);
    ctx.quadraticCurveTo(1, -12 - billow * 1.5, 6, -11.5);
    ctx.lineTo(6, -4);
    ctx.quadraticCurveTo(1, -3 + billow * 1.4, -4, -4);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0'; ctx.fill();
    ctx.strokeStyle = ink; ctx.lineWidth = 0.7; ctx.stroke();
    // Sail wrinkle lines
    ctx.strokeStyle = 'rgba(42,36,23,0.4)'; ctx.lineWidth = 0.35;
    ctx.beginPath();
    ctx.moveTo(-4, -9.5); ctx.quadraticCurveTo(1, -8.5 + billow, 6, -9.5);
    ctx.moveTo(-4, -7); ctx.quadraticCurveTo(1, -6 + billow, 6, -7);
    ctx.stroke();

    // Crow's nest at top of mast
    ctx.beginPath();
    ctx.ellipse(1, -13, 2.4, 1.2, 0, 0, Math.PI * 2);
    ctx.fillStyle = hull; ctx.fill();
    ctx.strokeStyle = ink; ctx.lineWidth = 0.5; ctx.stroke();
    // Pickets on rim
    for (const dx of [-2, -1, 0, 1, 2]) {
      ctx.beginPath();
      ctx.moveTo(1 + dx, -13.4); ctx.lineTo(1 + dx, -14.4);
      ctx.stroke();
    }

    // Bowsprit
    ctx.strokeStyle = ink; ctx.lineWidth = 0.9;
    ctx.beginPath();
    ctx.moveTo(13, 1); ctx.lineTo(16, 0);
    ctx.stroke();

    // Stern flag
    ctx.fillStyle = '#c9622e';
    ctx.beginPath();
    ctx.moveTo(-10, 0.5);
    ctx.lineTo(-14, -0.5);
    ctx.lineTo(-13, 1);
    ctx.lineTo(-14, 2.5);
    ctx.lineTo(-10, 1.5);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = ink; ctx.lineWidth = 0.4; ctx.stroke();
  }

  function drawDragonThreeQ(ctx, t, speed) {
    // 3/4 dragon: see top of head + side of body. Near wing larger, far wing
    // smaller and partially behind body. Four legs, near pair visible, far
    // pair just hinted.
    const flapRate = 2.4 + speed * 1.0;
    const flap = Math.sin(t * flapRate);
    const tailSwish = Math.sin(t * 1.8 + 0.4);
    const body = '#8a2a2a', belly = '#c87858', bodyDark = '#5a1818';
    const ink = '#2a2417';

    // Far wing (behind body, foreshortened)
    ctx.save();
    ctx.translate(-2, -2.5);
    ctx.scale(1, 0.55 - 0.18 * flap);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(3, -10);
    ctx.quadraticCurveTo(-2, -8, -4, -6);
    ctx.quadraticCurveTo(-6, -5, -7, -3);
    ctx.quadraticCurveTo(-5, -1, 0, 0);
    ctx.closePath();
    ctx.fillStyle = bodyDark; ctx.fill();
    ctx.strokeStyle = ink; ctx.lineWidth = 0.6; ctx.stroke();
    ctx.restore();

    // Tail (down + back, suggesting depth)
    ctx.strokeStyle = ink; ctx.lineWidth = 0.9;
    ctx.beginPath();
    ctx.moveTo(-6, 0.5);
    ctx.bezierCurveTo(-10, 1.5 + tailSwish * 0.8, -13, 3 + tailSwish * 1.4, -16, 4.5 + tailSwish * 2);
    ctx.bezierCurveTo(-13, 3.5 + tailSwish * 1.4, -10, 2.5 + tailSwish * 0.8, -6, 2.5);
    ctx.closePath();
    ctx.fillStyle = body; ctx.fill(); ctx.stroke();
    ctx.save();
    ctx.translate(-16, 4.5 + tailSwish * 2);
    ctx.rotate(Math.atan2(2, -3));
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(2.4, -1.8); ctx.lineTo(1.4, 0); ctx.lineTo(2.4, 1.8);
    ctx.closePath();
    ctx.fillStyle = body; ctx.fill(); ctx.stroke();
    ctx.restore();

    // Far (back) legs — just little stubs, low contrast
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = bodyDark;
    ctx.strokeStyle = ink; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.ellipse(2, -3.2, 1.6, 0.8, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(-5, -3.2, 1.6, 0.8, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.restore();

    // Body
    ctx.beginPath();
    ctx.ellipse(-1, 0, 7, 4, 0, 0, Math.PI * 2);
    ctx.fillStyle = body; ctx.fill();
    ctx.strokeStyle = ink; ctx.lineWidth = 1; ctx.stroke();
    // Belly (visible because of 3/4 tilt — bottom half is paler)
    ctx.beginPath();
    ctx.ellipse(-1, 1.5, 6.2, 1.8, 0, 0, Math.PI * 2);
    ctx.fillStyle = belly; ctx.fill();
    // Scale highlights on top edge
    ctx.strokeStyle = 'rgba(255,200,160,0.4)'; ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.moveTo(5, -2.5); ctx.bezierCurveTo(0, -3.5, -4, -3.4, -7, -2);
    ctx.stroke();

    // Near (front) legs — larger, more defined
    ctx.fillStyle = body;
    ctx.strokeStyle = ink; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.ellipse(2, 3.6, 2, 1.1, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(-5, 3.6, 2, 1.1, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    // Claws
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.moveTo(3.5, 4.2); ctx.lineTo(4.5, 4.8);
    ctx.moveTo(2.2, 4.6); ctx.lineTo(2.4, 5.2);
    ctx.moveTo(-3.5, 4.2); ctx.lineTo(-2.5, 4.8);
    ctx.moveTo(-4.7, 4.6); ctx.lineTo(-4.5, 5.2);
    ctx.stroke();

    // Neck (angled forward, slight curve)
    ctx.beginPath();
    ctx.moveTo(4, -2.5);
    ctx.quadraticCurveTo(8, -3, 11, -1.5);
    ctx.lineTo(11, 1.5);
    ctx.quadraticCurveTo(8, 2.5, 4, 2);
    ctx.closePath();
    ctx.fillStyle = body; ctx.fill();
    ctx.lineWidth = 0.9; ctx.strokeStyle = ink; ctx.stroke();

    // Head (3/4: see top + a sliver of jaw with belly color)
    ctx.beginPath();
    ctx.moveTo(15, 0);
    ctx.lineTo(11, -2.5);
    ctx.lineTo(10, 0);
    ctx.lineTo(11, 2.7);
    ctx.closePath();
    ctx.fillStyle = body; ctx.fill(); ctx.stroke();
    // Jaw sliver
    ctx.beginPath();
    ctx.moveTo(15, 0); ctx.lineTo(11, 2.7); ctx.lineTo(13, 1.6);
    ctx.closePath();
    ctx.fillStyle = belly; ctx.fill();
    // Horns
    ctx.beginPath();
    ctx.moveTo(11, -2); ctx.lineTo(9, -4);
    ctx.moveTo(11.5, 2); ctx.lineTo(9.8, 3.6);
    ctx.lineWidth = 0.7; ctx.stroke();
    // Eyes (asymmetric: top eye higher, side eye visible)
    ctx.fillStyle = '#f5d040';
    ctx.beginPath(); ctx.arc(12.8, -0.7, 0.55, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(12.4,  1.6, 0.55, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = ink;
    ctx.beginPath(); ctx.arc(13.0, -0.7, 0.25, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(12.6,  1.6, 0.25, 0, Math.PI * 2); ctx.fill();

    // Near wing (in front of body, large, full anatomy)
    ctx.save();
    ctx.translate(-1, 1.5);
    ctx.scale(1, 0.95 + 0.2 * flap);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(3, 11);
    ctx.quadraticCurveTo(-2, 9, -4, 7);
    ctx.quadraticCurveTo(-6, 6, -8, 4);
    ctx.quadraticCurveTo(-7, 2, -5, 1);
    ctx.closePath();
    ctx.fillStyle = body; ctx.fill();
    ctx.strokeStyle = ink; ctx.lineWidth = 0.8; ctx.stroke();
    ctx.strokeStyle = 'rgba(42,36,23,0.55)'; ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(3, 11);
    ctx.moveTo(0, 0); ctx.lineTo(-4, 7);
    ctx.moveTo(0, 0); ctx.lineTo(-8, 4);
    ctx.stroke();
    ctx.restore();
  }

  const drawers = {
    sloop: drawSloop,
    butterfly: drawButterfly,
    butterflyShip: drawButterflyShip,
    turtle: drawTurtle,
    turtleTopdownSea: drawTurtleTopdownSea,
    turtleSideClassic: drawTurtleSideClassic,
    turtleSideArmored: drawTurtleSideArmored,
    turtleSideSea: drawTurtleSideSea,
    dragon: drawDragon,
    dragonEastern: drawDragonEastern,
    dragonWyvern: drawDragonWyvern,
    dragonChibi: drawDragonChibi,
    windSerpent: drawWindSerpent,
    manta: drawManta,
    jellyfish: drawJellyfish,
    balloon: drawBalloon,
    cloudGalleon: drawCloudGalleon,
    cloudGalleonMulti: drawCloudGalleonMulti,
    cloudGalleonWinged: drawCloudGalleonWinged,
    wyvernTopdown: drawWyvernTopdown,
    wyvernThreeQ: drawWyvernThreeQ,
    cloudGalleonTopdown: drawCloudGalleonTopdown,
    cloudGalleonThreeQ: drawCloudGalleonThreeQ,
    dragonThreeQ: drawDragonThreeQ,
  };
  // Shipped designs come from the shared ships.js so the lab shows what the
  // game actually draws (the local versions above had drifted — e.g. the
  // game's wind serpent gained a turn animation the lab never saw). The
  // local copies stay for reference but are no longer wired to cards.
  Object.assign(drawers, window.SkyboundShips.DRAWERS);

  // ---------- Render loop ----------
  let lastT = 0;
  let simT = 0;
  let speed = 1;

  function render(tMs) {
    const dt = Math.min((tMs - lastT) / 1000, 0.05);
    lastT = tMs;
    if (!paused) simT += dt;
    const target = sailing ? 1 : 0;
    speed += (target - speed) * Math.min(1, dt * 1.6);
    const t = simT;

    for (const c of cards) {
      const { ctx, W, H } = c;
      drawBackground(ctx, W, H, t);

      const leftCx = W * 0.27;
      const rightCx = W * 0.74;
      const cy = H * 0.5;
      const bob = Math.sin(t * 1.1) * 1.4;

      if (c.id !== 'sloop') {
        ctx.save();
        ctx.globalAlpha = 0.42;
        ctx.translate(leftCx - 36, cy);
        drawSloop(ctx);
        ctx.restore();
        ctx.fillStyle = 'rgba(42,36,23,0.6)';
        ctx.font = 'italic 10px Georgia, serif';
        ctx.textAlign = 'center';
        ctx.fillText('sloop', leftCx - 36, cy + 22);
      }

      ctx.save();
      ctx.translate(leftCx + (c.id === 'sloop' ? 0 : 16), cy + bob);
      drawers[c.id](ctx, t, speed);
      ctx.restore();

      ctx.save();
      ctx.strokeStyle = 'rgba(42,36,23,0.18)';
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(W * 0.5, 8);
      ctx.lineTo(W * 0.5, H - 8);
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.translate(rightCx, cy + bob * 0.4);
      ctx.scale(4, 4);
      drawers[c.id](ctx, t, speed);
      ctx.restore();

      ctx.fillStyle = 'rgba(42,36,23,0.55)';
      ctx.font = '10px Georgia, serif';
      ctx.textAlign = 'left';
      ctx.fillText('1×', 8, H - 6);
      ctx.fillText('4×', W * 0.52, H - 6);
    }

    requestAnimationFrame(render);
  }

  requestAnimationFrame((t) => { lastT = t; requestAnimationFrame(render); });
})();
</script>
</body>
</html>
