<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Skybound — Ship Lab</title>
<style>
  :root {
    --parchment: #f1e6cd;
    --ink: #2a2417;
    --rule: #b8a777;
  }
  html, body { margin: 0; padding: 0; background: #c4d4e2; color: var(--ink); font-family: Georgia, serif; }
  header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--rule);
    background: var(--parchment);
    display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }
  header h1 { margin: 0; font-size: 20px; }
  header p { margin: 2px 0 0; font-size: 12.5px; opacity: 0.85; max-width: 64ch; }
  header .controls { display: flex; gap: 8px; }
  header .controls button {
    font: italic 13px Georgia, serif;
    background: #fff8e8; border: 1px solid var(--rule); color: var(--ink);
    padding: 6px 12px; border-radius: 4px; cursor: pointer;
  }
  header .controls button.active { background: #c9622e; color: #fff8e8; border-color: #6a2f15; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
    padding: 14px;
  }
  .card {
    background: #fff8e8;
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 10px 12px 12px;
  }
  .card h2 { margin: 0 0 2px; font-size: 16px; font-style: italic; }
  .card .desc { margin: 0 0 8px; font-size: 12px; opacity: 0.78; min-height: 30px; }
  canvas {
    display: block; width: 100%; height: auto;
    background: linear-gradient(180deg, #aac3da 0%, #d4dde5 100%);
    border-radius: 4px;
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>Skybound — Ship Lab</h1>
    <p>Each card shows a candidate at <em>game scale</em> (left, with the current sloop faded beside it for size reference) and a 4× zoom (right). Toggle <em>Sailing</em> to see motion-sensitive bits.</p>
  </div>
  <div class="controls">
    <button id="sailing" class="active">Sailing</button>
    <button id="pause">Pause</button>
  </div>
</header>
<div class="grid" id="grid"></div>

<script>
(function () {
  const ships = [
    { id: 'sloop',             name: 'Sloop',                desc: 'The current ship — baseline for size and style.' },
    { id: 'butterfly',         name: 'Butterfly',            desc: 'Bug-style: two distinct wing pairs (fore + hind), tiny body.' },
    { id: 'butterflyShip',     name: 'Butterfly ship',       desc: 'Sloop hull with two-pair patterned wings in place of sails.' },
    { id: 'turtle',            name: 'Flying turtle (top-down)', desc: 'Original top-down view: hex shell, four flippers paddling.' },
    { id: 'turtleSideClassic', name: 'Turtle — side classic',    desc: 'Side view, dome shell, two visible flippers swimming front + back.' },
    { id: 'turtleSideArmored', name: 'Turtle — armored',         desc: 'Side view with spiked shell, helmet horn, slow steady paddle.' },
    { id: 'turtleSideSea',     name: 'Turtle — sea turtle',      desc: 'Streamlined, wing-like flippers sweeping; flatter shell.' },
    { id: 'dragon',            name: 'Dragon — current',     desc: 'Top-down western dragon, kept for reference.' },
    { id: 'dragonEastern',     name: 'Dragon — Eastern',     desc: 'Long flowing body, mane spikes, whiskers, paired horns.' },
    { id: 'dragonWyvern',      name: 'Dragon — Wyvern',      desc: 'Side-on view. Two legs, near wing in front, far wing behind body.' },
    { id: 'dragonChibi',       name: 'Dragon — Chibi',       desc: 'Cute round-bodied dragon, big eye, fast wing flutter.' },
    { id: 'windSerpent',       name: 'Wind serpent',         desc: 'Segmented body whips behind a small winged head.' },
    { id: 'manta',             name: 'Manta ray',            desc: 'Wide glider, slow wing wave, long whip tail.' },
    { id: 'jellyfish',         name: 'Jellyfish',            desc: 'Dome pulses; attached tentacles stretch when sailing.' },
    { id: 'balloon',           name: 'Hot air balloon',      desc: 'Striped envelope, wicker basket, burner flickers when sailing.' },
    { id: 'cloudGalleon',      name: 'Cloud galleon',        desc: "Faithful to the kiddo's sketch: bowl hull on a cloud, square sail, crow's nest, side fins." },
    { id: 'cloudGalleonMulti', name: 'Cloud galleon — multi-mast', desc: 'Bigger hull, foremast + mainmast with square-rigged sails, bowsprit, stern pennant.' },
    { id: 'cloudGalleonWinged',name: 'Cloud galleon — winged',     desc: 'Modest hull and sail; large flapping wings do the lifting, small cloud below.' },
  ];

  const grid = document.getElementById('grid');
  const dpr = window.devicePixelRatio || 1;
  let paused = false;
  let sailing = true;

  document.getElementById('pause').addEventListener('click', (e) => {
    paused = !paused;
    e.target.textContent = paused ? 'Play' : 'Pause';
  });
  document.getElementById('sailing').addEventListener('click', (e) => {
    sailing = !sailing;
    e.target.textContent = sailing ? 'Sailing' : 'Drifting';
    e.target.classList.toggle('active', sailing);
  });

  const cards = ships.map(s => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h2>${s.name}</h2><div class="desc">${s.desc}</div><canvas></canvas>`;
    grid.appendChild(card);
    const canvas = card.querySelector('canvas');
    const W = 320, H = 140;
    canvas.style.aspectRatio = `${W} / ${H}`;
    canvas.width = W * dpr; canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    return { id: s.id, ctx, W, H };
  });

  // ---------- Background ----------
  function drawBackground(ctx, W, H, t) {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#aac3da');
    g.addColorStop(1, '#d4dde5');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.globalAlpha = 0.32;
    const drift = (t * 6) % (W + 80);
    for (let i = 0; i < 3; i++) {
      const cx = ((i * (W / 3) + drift) % (W + 80)) - 40;
      const cy = H * (0.22 + i * 0.22);
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.ellipse(cx, cy, 30, 7, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ---------- Shared helpers ----------
  function drawBowlHull(ctx, w, h, color = '#a06030') {
    // w = half-width, h = depth scale. Top-down "deck-down view" — flat top,
    // curved bottom, prow lip on the right (+X is forward).
    ctx.beginPath();
    ctx.moveTo(-w, -h * 0.7);                       // top-back
    ctx.lineTo(-w, h * 0.2);                        // down back wall
    ctx.quadraticCurveTo(-w * 0.6, h * 1.1, 0, h * 1.15);
    ctx.quadraticCurveTo(w * 0.6, h * 1.1, w * 0.85, h * 0.3);
    ctx.lineTo(w * 1.15, -h * 0.4);                 // prow lip
    ctx.lineTo(-w, -h * 0.7);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Deck line
    ctx.beginPath();
    ctx.moveTo(-w, -h * 0.7);
    ctx.lineTo(w * 0.7, -h * 0.7);
    ctx.lineWidth = 0.7;
    ctx.stroke();
    // Plank curve hint
    ctx.strokeStyle = 'rgba(42,36,23,0.35)';
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.moveTo(-w + 0.6, 0);
    ctx.quadraticCurveTo(0, h * 0.7, w * 0.85, 0);
    ctx.stroke();
  }

  function drawCrowsNest(ctx, x, y) {
    ctx.save();
    ctx.translate(x, y);
    ctx.beginPath();
    ctx.rect(-2.2, -2, 4.4, 2);
    ctx.fillStyle = '#a06030';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    for (const dx of [-2, -1, 0, 1, 2]) {
      ctx.beginPath();
      ctx.moveTo(dx, -2);
      ctx.lineTo(dx, -3.6);
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawCloudPlatform(ctx, w, opts = {}) {
    const yBase = opts.y ?? 7;
    const r = opts.r ?? 4;
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = 'rgba(80, 110, 140, 0.55)';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.arc(-w * 0.85, yBase - 1, r * 0.85, 0, Math.PI * 2);
    ctx.arc(-w * 0.35, yBase, r, 0, Math.PI * 2);
    ctx.arc(0, yBase - 0.6, r * 0.9, 0, Math.PI * 2);
    ctx.arc( w * 0.35, yBase, r, 0, Math.PI * 2);
    ctx.arc( w * 0.85, yBase - 1, r * 0.85, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // Underside shadow
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#5a6a7c';
    ctx.beginPath();
    ctx.ellipse(0, yBase + r * 0.9, w * 0.95, 1.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ---------- Ship draw functions ----------
  // All ships drawn at (0,0), facing +X. The sloop hull spans x=[-8..14], y=[-7..7].
  // Signature: (ctx, t, speed) where speed ∈ [0, 1].

  function drawSloop(ctx) {
    ctx.beginPath();
    ctx.moveTo(14, 0);
    ctx.lineTo(-8, -7);
    ctx.lineTo(-5, 0);
    ctx.lineTo(-8, 7);
    ctx.closePath();
    ctx.fillStyle = '#c9622e';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(2, 0);
    ctx.lineTo(-4, -9);
    ctx.lineTo(-2, 0);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.stroke();
  }

  function drawButterfly(ctx, t, speed) {
    const flapRate = 8 + speed * 4;
    const flap = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(t * flapRate));

    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      ctx.scale(1, flap);

      // Hindwing FIRST (drawn behind) — rounded, fans back & out
      ctx.beginPath();
      ctx.moveTo(-1, -1);
      ctx.bezierCurveTo(-9, -3, -13, -10, -8, -11);
      ctx.bezierCurveTo(-5, -8, -3, -4, -1, -1);
      ctx.closePath();
      ctx.fillStyle = '#d97a3c';
      ctx.fill();
      ctx.stroke();
      // Hindwing eyespot
      ctx.beginPath();
      ctx.arc(-6, -8, 1.0, 0, Math.PI * 2);
      ctx.fillStyle = '#2a2417';
      ctx.fill();

      // Forewing on TOP — longer, sweeps up & slightly forward
      ctx.beginPath();
      ctx.moveTo(3, -1);
      ctx.bezierCurveTo(7, -10, 1, -16, -4, -13);
      ctx.bezierCurveTo(-2, -8, 1, -3, 3, -1);
      ctx.closePath();
      ctx.fillStyle = '#e9c66a';
      ctx.fill();
      ctx.stroke();
      // Forewing eyespot
      ctx.beginPath();
      ctx.arc(-1, -11, 1.7, 0, Math.PI * 2);
      ctx.fillStyle = '#2a2417';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(-1, -11, 0.75, 0, Math.PI * 2);
      ctx.fillStyle = '#f2e8d0';
      ctx.fill();
      ctx.restore();
    }

    // Body (slim ellipse along X)
    ctx.beginPath();
    ctx.ellipse(2, 0, 7, 1.8, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    // Head
    ctx.beginPath();
    ctx.arc(8, 0, 2, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    // Antennae
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(8, -1);
    ctx.quadraticCurveTo(12, -4, 11, -6);
    ctx.moveTo(8, 1);
    ctx.quadraticCurveTo(12, 4, 11, 6);
    ctx.stroke();
  }

  function drawButterflyShip(ctx, t, speed) {
    const flapRate = 6 + speed * 3;
    const flap = 0.45 + 0.55 * (0.5 + 0.5 * Math.sin(t * flapRate));

    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.9;
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.translate(0, -2);
      ctx.scale(1, side);
      ctx.scale(1, flap);

      // Hindwing first (behind)
      ctx.beginPath();
      ctx.moveTo(-1, -1);
      ctx.bezierCurveTo(-12, -3, -17, -14, -9, -14);
      ctx.bezierCurveTo(-5, -10, -2, -4, -1, -1);
      ctx.closePath();
      ctx.fillStyle = '#d97a3c';
      ctx.fill();
      ctx.stroke();
      // Hindwing eyespot
      ctx.beginPath();
      ctx.arc(-7, -10, 1.3, 0, Math.PI * 2);
      ctx.fillStyle = '#2a2417';
      ctx.fill();

      // Forewing on top — large, sweeping up
      ctx.beginPath();
      ctx.moveTo(3, -1);
      ctx.bezierCurveTo(9, -14, 1, -22, -5, -17);
      ctx.bezierCurveTo(-3, -10, 1, -4, 3, -1);
      ctx.closePath();
      ctx.fillStyle = '#e9c66a';
      ctx.fill();
      ctx.stroke();
      // Forewing eyespot
      ctx.beginPath();
      ctx.arc(-1, -14, 2.1, 0, Math.PI * 2);
      ctx.fillStyle = '#2a2417';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(-1, -14, 0.95, 0, Math.PI * 2);
      ctx.fillStyle = '#f2e8d0';
      ctx.fill();
      // Forewing vein hint
      ctx.strokeStyle = 'rgba(42,36,23,0.5)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(1, -2);
      ctx.quadraticCurveTo(-1, -10, -3, -16);
      ctx.stroke();
      ctx.restore();
    }

    // Hull (sloop)
    ctx.beginPath();
    ctx.moveTo(14, 0);
    ctx.lineTo(-8, -7);
    ctx.lineTo(-5, 0);
    ctx.lineTo(-8, 7);
    ctx.closePath();
    ctx.fillStyle = '#c9622e';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Stubby mast where wings root
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, -1);
    ctx.lineTo(0, -3);
    ctx.stroke();
  }

  function drawTurtle(ctx, t, speed) {
    const paddleRate = 3 + speed * 1.5;
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;

    const flippers = [
      { x:  4, y: -7, base: -0.7, side: -1, lag: 0 },
      { x:  4, y:  7, base:  0.7, side:  1, lag: 0 },
      { x: -7, y: -6, base: -2.4, side: -1, lag: Math.PI },
      { x: -7, y:  6, base:  2.4, side:  1, lag: Math.PI },
    ];
    for (const f of flippers) {
      const swing = Math.sin(t * paddleRate + f.lag) * 0.5;
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(f.base + swing * f.side);
      ctx.beginPath();
      ctx.ellipse(0, 0, 5, 2.4, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#5a8a52';
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    ctx.beginPath();
    ctx.ellipse(0, 0, 11, 8.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#6e9c5a';
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.strokeStyle = 'rgba(42,36,23,0.45)';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.arc(0, 0, 2.6, 0, Math.PI * 2);
    ctx.stroke();
    for (let i = 0; i < 6; i++) {
      const a = i / 6 * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * 5.2, Math.sin(a) * 5.2, 2.1, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.ellipse(11, 0, 3.2, 2.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#5a8a52';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(12.5, -0.9, 0.6, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-10, 0);
    ctx.lineTo(-14, -1);
    ctx.lineTo(-14, 1);
    ctx.closePath();
    ctx.fillStyle = '#5a8a52';
    ctx.fill();
    ctx.stroke();
  }

  function drawTurtleSideClassic(ctx, t, speed) {
    const paddleRate = 2.5 + speed * 1.5;
    const frontSwing = Math.sin(t * paddleRate);
    const backSwing  = Math.sin(t * paddleRate + Math.PI);

    // Far-side flippers (drawn behind body, faded)
    ctx.save();
    ctx.globalAlpha = 0.45;
    ctx.fillStyle = '#3a5a32';
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.4;
    ctx.save();
    ctx.translate(6, 2.5);
    ctx.rotate(frontSwing * 0.5 - 0.2);
    ctx.beginPath(); ctx.ellipse(2, 0, 4, 1.8, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.restore();
    ctx.save();
    ctx.translate(-5, 2.5);
    ctx.rotate(backSwing * 0.5 + 0.4);
    ctx.beginPath(); ctx.ellipse(-2, 0, 3.5, 1.6, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.restore();
    ctx.restore();

    // Underbelly (below shell)
    ctx.beginPath();
    ctx.ellipse(0, 2.5, 9, 2.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#a8c878';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.9;
    ctx.stroke();

    // Shell (dome on top)
    ctx.beginPath();
    ctx.moveTo(-9, 0);
    ctx.bezierCurveTo(-10, -7, 10, -7, 9, 0);
    ctx.closePath();
    ctx.fillStyle = '#6e9c5a';
    ctx.fill();
    ctx.lineWidth = 1.1;
    ctx.stroke();

    // Scute lines (segment hints)
    ctx.strokeStyle = 'rgba(42,36,23,0.45)';
    ctx.lineWidth = 0.5;
    for (const x of [-5, -1, 3]) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.bezierCurveTo(x - 0.7, -3, x - 0.7, -5, x - 1.5, -6.2);
      ctx.stroke();
    }
    // Rim band
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.moveTo(-9, -0.3);
    ctx.bezierCurveTo(-9, -2, 9, -2, 9, -0.3);
    ctx.stroke();

    // Near flippers (in front of body, full color)
    ctx.fillStyle = '#5a8a52';
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.6;
    ctx.save();
    ctx.translate(6, 2.5);
    ctx.rotate(frontSwing * 0.55 - 0.2);
    ctx.beginPath(); ctx.ellipse(2, 0, 4.5, 2, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.restore();
    ctx.save();
    ctx.translate(-5, 2.5);
    ctx.rotate(backSwing * 0.55 + 0.4);
    ctx.beginPath(); ctx.ellipse(-2, 0, 4, 1.8, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.restore();

    // Head (stretches forward)
    ctx.beginPath();
    ctx.ellipse(10, 1, 3.5, 2.2, -0.15, 0, Math.PI * 2);
    ctx.fillStyle = '#5a8a52';
    ctx.fill();
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(11.5, 0.2, 0.6, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(12, 1.8); ctx.lineTo(13.3, 2);
    ctx.lineWidth = 0.4;
    ctx.stroke();

    // Tail
    ctx.beginPath();
    ctx.moveTo(-9, 1.5);
    ctx.lineTo(-12, 0.5);
    ctx.lineTo(-11, 2.2);
    ctx.closePath();
    ctx.fillStyle = '#5a8a52';
    ctx.fill();
    ctx.stroke();
  }

  function drawTurtleSideArmored(ctx, t, speed) {
    const paddleRate = 2 + speed * 1;
    const frontSwing = Math.sin(t * paddleRate);
    const backSwing  = Math.sin(t * paddleRate + Math.PI);

    // Far flippers
    ctx.save();
    ctx.globalAlpha = 0.45;
    ctx.fillStyle = '#3a3a2a';
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.4;
    ctx.save();
    ctx.translate(6, 2.5); ctx.rotate(frontSwing * 0.5 - 0.2);
    ctx.beginPath(); ctx.ellipse(2, 0, 4, 1.8, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.restore();
    ctx.save();
    ctx.translate(-5, 2.5); ctx.rotate(backSwing * 0.5 + 0.4);
    ctx.beginPath(); ctx.ellipse(-2, 0, 3.5, 1.6, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.restore();
    ctx.restore();

    // Underbelly
    ctx.beginPath();
    ctx.ellipse(0, 2.5, 9.5, 2.6, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#a89770';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.9;
    ctx.stroke();

    // Shell (darker, more dome)
    ctx.beginPath();
    ctx.moveTo(-10, 0);
    ctx.bezierCurveTo(-11, -7, 11, -7, 10, 0);
    ctx.closePath();
    ctx.fillStyle = '#4a4a32';
    ctx.fill();
    ctx.lineWidth = 1.1;
    ctx.stroke();

    // SPIKES on shell
    ctx.fillStyle = '#f2e8d0';
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.5;
    for (const x of [-6, -2, 2, 6]) {
      const yTop = -6 + Math.abs(x) * 0.35;
      ctx.beginPath();
      ctx.moveTo(x - 1.1, yTop + 0.6);
      ctx.lineTo(x,        yTop - 2.2);
      ctx.lineTo(x + 1.1, yTop + 0.6);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    // Faint scute hints
    ctx.strokeStyle = 'rgba(42,36,23,0.45)';
    ctx.lineWidth = 0.4;
    for (const x of [-5, -1, 3]) {
      ctx.beginPath();
      ctx.moveTo(x, 0);

    ctx.fill();
    ctx.beginPath();

    // Spiky tail

    ctx.lineTo(-13.5, 0);
    ctx.lineTo(-12, 2.5);
    ctx.closePath();
    ctx.fillStyle = '#6a5a3a';

    ctx.lineTo(-12, 1.5);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.stroke();
  }

  function drawTurtleSideSea(ctx, t, speed) {
    // Streamlined sea turtle — flippers sweep like wings.
    const flapRate = 1.5 + speed * 1;

    // Far front flipper (faded)
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.translate(2, 2.5);
    ctx.rotate(0.3 + flap * 0.5);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(6, -2, 8, 0.8);
    ctx.quadraticCurveTo(5, 1.8, 0, 1);
    ctx.closePath();
    ctx.fillStyle = '#2a5a72';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.4;

    ctx.strokeStyle = '#2a2417';

    // Shell (flatter dome)

    ctx.fillStyle = '#4a8aa0';
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.stroke();

    // Scute pattern
    ctx.strokeStyle = 'rgba(42,36,23,0.4)';

      ctx.beginPath();

      ctx.bezierCurveTo(x - 0.5, -2, x - 0.5, -3.5, x - 1, -4.2);

    }
    ctx.beginPath();
    ctx.moveTo(-9, -2);
    ctx.bezierCurveTo(0, -2.6, 0, -2.6, 9, -2);
    ctx.stroke();

    // Near front flipper (large, wing-like)
    ctx.save();
    ctx.translate(2, 2.8);
    ctx.rotate(0.3 + flap * 0.5);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(7, -3, 9, 0.5);
    ctx.quadraticCurveTo(5, 2.5, 0, 1.5);
    ctx.closePath();
    ctx.fillStyle = '#3a7a92';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.stroke();
    ctx.restore();

    // Back flipper (smaller)
    ctx.save();
    ctx.translate(-7, 3);
    ctx.rotate(-0.5 + flap * 0.3);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(-4, -1.5, -5, 1);
    ctx.quadraticCurveTo(-3, 2, 0, 1);
    ctx.closePath();
    ctx.fillStyle = '#3a7a92';
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    // Head
    ctx.beginPath();
    ctx.ellipse(10, 1, 3.5, 2, -0.1, 0, Math.PI * 2);
    ctx.fillStyle = '#3a7a92';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(11.5, 0.3, 0.55, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();

    // Stub tail
    ctx.beginPath();
    ctx.moveTo(-9.5, 1);
    ctx.lineTo(-12, 1.5);
    ctx.lineTo(-9.5, 2.5);
    ctx.closePath();
    ctx.fillStyle = '#3a7a92';
    ctx.fill();
    ctx.stroke();
  }

  // Current western dragon — kept for reference.
  function drawDragon(ctx, t, speed) {
    const flap = Math.sin(t * 2.6);
    const wingAng = -0.45 + flap * 0.45;
    const tailSwish = Math.sin(t * 1.9 + 0.4);
    const bodyFill = '#8a2a2a';
    const bellyFill = '#c87858';

    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    const tailEndX = -16;
    const tailEndY = tailSwish * 3.5;
    ctx.beginPath();
    ctx.moveTo(-7, -2);
    ctx.quadraticCurveTo(-12, tailSwish * 1, tailEndX, tailEndY);
    ctx.quadraticCurveTo(-12, tailSwish * 1 + 1, -7, 2);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.stroke();
    ctx.save();
    ctx.translate(tailEndX, tailEndY);
    ctx.rotate(tailSwish * 0.4 + Math.PI);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(3, -2.2);
    ctx.lineTo(2, 0);
    ctx.lineTo(3, 2.2);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    for (const side of [-1, 1]) {
      ctx.save();
      ctx.translate(-1, 0);
      ctx.scale(1, side);
      ctx.rotate(wingAng);
      ctx.beginPath();
      ctx.moveTo(0, -1);
      ctx.lineTo(3, -11);
      ctx.quadraticCurveTo(-2, -9, -4, -7);
      ctx.quadraticCurveTo(-6, -5, -8, -4);
      ctx.quadraticCurveTo(-7, -2, -5, -1);
      ctx.closePath();
      ctx.fillStyle = '#6a2424';
      ctx.fill();
      ctx.strokeStyle = '#2a2417';
      ctx.lineWidth = 0.8;
      ctx.stroke();
      ctx.strokeStyle = 'rgba(42,36,23,0.55)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(0, -1); ctx.lineTo(3, -11);
      ctx.moveTo(0, -1); ctx.lineTo(-4, -7);
      ctx.moveTo(0, -1); ctx.lineTo(-8, -4);
      ctx.stroke();
      ctx.restore();
    }

    ctx.beginPath();
    ctx.ellipse(-2, 0, 6.5, 3.8, 0, 0, Math.PI * 2);
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(-2, 1.5, 5, 1.6, 0, 0, Math.PI * 2);
    ctx.fillStyle = bellyFill;
    ctx.fill();

    for (const side of [-1, 1]) {
      ctx.beginPath();

      ctx.fillStyle = bodyFill;

    ctx.beginPath();
    ctx.moveTo(4, -1);
    ctx.quadraticCurveTo(7, -5, 11, -3);
    ctx.lineTo(12, -1);
    ctx.quadraticCurveTo(8, 1, 4, 2);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.stroke();

    ctx.save();
    ctx.translate(12, -2);
    ctx.beginPath();
    ctx.moveTo(0, -1.5);
    ctx.lineTo(5, -0.8);
    ctx.lineTo(5, 1.4);
    ctx.lineTo(0, 2.2);
    ctx.quadraticCurveTo(-2, 0, 0, -1.5);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, -1.2);
    ctx.lineTo(-2, -4);
    ctx.lineTo(0.5, -2);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.stroke();

    ctx.moveTo(1.5, -1);
    ctx.lineTo(0.5, -4);
    ctx.lineTo(2.5, -1.5);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(2.2, 0.2, 0.7, 0, Math.PI * 2);
    ctx.fillStyle = '#f5d040';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(2.5, 0.2, 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    ctx.restore();
  }

  // Alt 1: Eastern serpentine dragon — long flowing body, mane, whiskers.
  function drawDragonEastern(ctx, t, speed) {
    const segs = 14;
    const segLen = 2.4;
    const amp = 3.2;
    const points = [];
    for (let i = 0; i < segs; i++) {
      const along = i / (segs - 1);
      const x = 14 - i * segLen;
      const y = Math.sin(t * 2.2 - i * 0.55) * amp * along;
      const r = 3.2 - along * 2.2;
      points.push({ x, y, r });
    }

    // Body: tightly packed circles, no per-segment outline (reads as continuous).
    for (let i = segs - 1; i >= 1; i--) {
      const p = points[i];
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = '#3a7a4a';
      ctx.fill();
    }
    // Outline by stroking just the perimeter approximation
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    for (let i = 1; i < segs; i++) {
      const p = points[i];
      if (i === 1) ctx.moveTo(p.x, p.y - p.r);
      else ctx.lineTo(p.x, p.y - p.r);
    }
    for (let i = segs - 1; i >= 1; i--) {
      const p = points[i];
      ctx.lineTo(p.x, p.y + p.r);
    }
    ctx.closePath();
    ctx.stroke();

    // Mane spikes along the back of the body
    ctx.fillStyle = '#cf4444';
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.4;
    for (let i = 1; i < segs - 1; i++) {
      const p = points[i];
      ctx.beginPath();
      ctx.moveTo(p.x - 0.8, p.y - p.r * 0.9);
      ctx.lineTo(p.x - 1.3, p.y - p.r - 1.6);
      ctx.lineTo(p.x + 0.6, p.y - p.r * 0.9);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    // Head + whiskers + horns
    const head = points[0];
    const next = points[1];
    const headAng = Math.atan2(head.y - next.y, head.x - next.x);
    ctx.save();
    ctx.translate(head.x, head.y);
    ctx.rotate(headAng);

    ctx.beginPath();
    ctx.moveTo(4.5, -2);
    ctx.lineTo(5.5, 0);
    ctx.lineTo(4.5, 2);
    ctx.lineTo(-2, 3);
    ctx.lineTo(-3, 0);
    ctx.lineTo(-2, -3);
    ctx.closePath();
    ctx.fillStyle = '#3a7a4a';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Whiskers (animated drift)
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.6;
    const wig = Math.sin(t * 2.2) * 0.9;
    ctx.beginPath();
    ctx.moveTo(3.5, 1.5);
    ctx.quadraticCurveTo(7, 4, 9, 6 + wig);
    ctx.moveTo(3.5, -1.5);
    ctx.quadraticCurveTo(7, -4, 9, -6 - wig);
    ctx.stroke();

    // Horns (cream)
    ctx.fillStyle = '#f2e8d0';
    ctx.beginPath();
    ctx.moveTo(-1, -2.5);
    ctx.lineTo(-3, -5.5);
    ctx.lineTo(0, -2.8);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(1, -2.5);
    ctx.lineTo(-0.5, -5.5);
    ctx.lineTo(2, -2.8);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Eye
    ctx.beginPath();
    ctx.arc(1.8, -0.5, 0.7, 0, Math.PI * 2);
    ctx.fillStyle = '#f5d040';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(2.1, -0.5, 0.35, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();

    ctx.restore();
  }

  // Alt 2: Side-view wyvern — two legs, near wing in front of body, far wing behind.
  function drawDragonWyvern(ctx, t, speed) {
    const flap = Math.sin(t * 2.8);
    const tailSwish = Math.sin(t * 1.9 + 0.5);
    const bodyFill = '#7a4a9a';
    const bodyDark = '#54306a';

    // === FAR WING (drawn first, behind body) ===
    ctx.save();
    ctx.translate(-1, -1);
    ctx.rotate(-1.2 + flap * 0.35);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-1, -10);
    ctx.quadraticCurveTo(-5, -8, -7, -5);
    ctx.quadraticCurveTo(-8, -3, -7, -1);
    ctx.quadraticCurveTo(-3, -0.5, 0, 0);
    ctx.closePath();
    ctx.fillStyle = bodyDark;
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.6;
    ctx.stroke();
    ctx.restore();

    // === TAIL ===
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(-5, 0);
    ctx.quadraticCurveTo(-12, tailSwish * 2, -17, tailSwish * 4);
    ctx.quadraticCurveTo(-12, tailSwish * 2 + 0.8, -5, 1);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.stroke();
    // Tail spade
    ctx.save();
    ctx.translate(-17, tailSwish * 4);
    ctx.rotate(tailSwish * 0.4 + Math.PI);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(2.5, -1.8);
    ctx.lineTo(1.5, 0);
    ctx.lineTo(2.5, 1.8);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    // === BODY (slim, side-on) ===
    ctx.beginPath();
    ctx.ellipse(-1, 0, 6, 3, 0, 0, Math.PI * 2);
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1;
    ctx.stroke();

    // === LEGS (two — wyvern style) ===
    ctx.beginPath();
    ctx.moveTo(-1, 2);
    ctx.lineTo(0, 6);
    ctx.lineTo(2, 6);
    ctx.lineWidth = 1.4;
    ctx.stroke();
    // Claws on the foot
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, 6); ctx.lineTo(-1, 6.8);
    ctx.moveTo(1, 6); ctx.lineTo(1, 6.8);
    ctx.moveTo(2, 6); ctx.lineTo(3, 6.8);
    ctx.stroke();

    // === NECK + HEAD ===
    ctx.beginPath();
    ctx.moveTo(4, -1);
    ctx.quadraticCurveTo(8, -5, 11, -4);
    ctx.lineTo(11, -1);
    ctx.quadraticCurveTo(8, 0.5, 4, 1.5);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.lineWidth = 0.9;
    ctx.stroke();

    // Head
    ctx.save();
    ctx.translate(11, -3);
    ctx.beginPath();
    ctx.moveTo(0, -1);
    ctx.lineTo(5, 0);
    ctx.lineTo(5, 2);
    ctx.lineTo(0, 2.5);
    ctx.quadraticCurveTo(-1.5, 0.7, 0, -1);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.stroke();
    // Crest horn back
    ctx.beginPath();
    ctx.moveTo(0, -0.8);
    ctx.lineTo(-2, -3.5);
    ctx.lineTo(1.5, -1.5);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.stroke();
    // Eye
    ctx.beginPath();
    ctx.arc(2, 0.5, 0.7, 0, Math.PI * 2);
    ctx.fillStyle = '#f5d040';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(2.3, 0.5, 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    // Nostril
    ctx.beginPath();
    ctx.arc(4.5, 1.4, 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    ctx.restore();

    // === NEAR WING (drawn last, in front of body) ===
    ctx.save();
    ctx.translate(1, -1);
    ctx.rotate(-1.0 - flap * 0.35);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -12);
    ctx.quadraticCurveTo(-5, -9, -7, -6);
    ctx.quadraticCurveTo(-9, -3, -8, -1);
    ctx.quadraticCurveTo(-4, -0.5, 0, 0);
    ctx.closePath();
    ctx.fillStyle = bodyFill;
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // Finger struts
    ctx.strokeStyle = 'rgba(42,36,23,0.55)';
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(0, -12);
    ctx.moveTo(0, 0); ctx.lineTo(-7, -6);
    ctx.moveTo(0, 0); ctx.lineTo(-8, -1);
    ctx.stroke();
    ctx.restore();
  }

  // Alt 3: Chibi/cute dragon — round body, big eyes, fast little wings.

    ctx.fill();
    ctx.stroke();
    // Mouth (tiny smile)
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.arc(3, 1.5, 0.7, 0, Math.PI, false);
    ctx.stroke();
    ctx.restore();

    // NEAR wing (in front)
    ctx.save();
    ctx.translate(0, 0);
    ctx.rotate(-1.0 - flap * 0.5);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -7);
    ctx.quadraticCurveTo(-4, -5, -5.5, -2);
    ctx.quadraticCurveTo(-3, 0, 0, 0);
    ctx.closePath();
    ctx.fillStyle = '#9ad0e8';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(42,36,23,0.45)';
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(0, -7);
    ctx.moveTo(0, 0); ctx.lineTo(-5.5, -2);
    ctx.stroke();
    ctx.restore();
  }

  function drawWindSerpent(ctx, t, speed) {
    const segs = 7;
    const segLen = 4.2;
    const amp = 3.2;
    const points = [];
    for (let i = 0; i < segs; i++) {
      const along = i / (segs - 1);
      const x = 12 - i * segLen;
      const y = Math.sin(t * 2.6 - i * 0.9) * amp * along;
      points.push({ x, y, r: 4.6 - along * 3.6 });
    }

    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    for (let i = segs - 1; i >= 1; i--) {
      const p = points[i];
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = '#8a4eb0';
      ctx.fill();
      ctx.stroke();
    }

    const head = points[0];
    const next = points[1];
    const headAng = Math.atan2(head.y - next.y, head.x - next.x);
    ctx.save();
    ctx.translate(head.x, head.y);
    ctx.rotate(headAng);

    const wingFlap = Math.sin(t * 5.5) * 0.45;
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      ctx.rotate(-0.35 + wingFlap);
      ctx.beginPath();
      ctx.moveTo(-2, 0);
      ctx.quadraticCurveTo(-5, -9, -12, -7);
      ctx.quadraticCurveTo(-7, -3, -3, -1);
      ctx.closePath();
      ctx.fillStyle = '#b07cd0';
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    ctx.beginPath();
    ctx.moveTo(5, 0);
    ctx.quadraticCurveTo(3, -4, -3, -3);
    ctx.lineTo(-3, 3);
    ctx.quadraticCurveTo(3, 4, 5, 0);
    ctx.closePath();
    ctx.fillStyle = '#8a4eb0';
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-1, -3);
    ctx.lineTo(-3, -6);
    ctx.lineTo(0, -4);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(1.5, -1, 0.8, 0, Math.PI * 2);
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(2, -1, 0.4, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    ctx.restore();
  }

  function drawManta(ctx, t, speed) {
    const wingPhase = Math.sin(t * (2.4 + speed * 1.2));

    ctx.beginPath();
    ctx.moveTo(11, 0);
    ctx.quadraticCurveTo(8, -3, 2, -2.2);
    ctx.lineTo(-10, -1);
    ctx.lineTo(-10, 1);
    ctx.lineTo(2, 2.2);
    ctx.quadraticCurveTo(8, 3, 11, 0);
    ctx.closePath();
    ctx.fillStyle = '#3e556d';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      const tip = -11 + wingPhase * 3;
      ctx.beginPath();
      ctx.moveTo(8, -1);
      ctx.bezierCurveTo(4, -3, -2, tip, -9, -9 + wingPhase * 2);
      ctx.bezierCurveTo(-5, -5, -2, -3, -8, -1);
      ctx.closePath();
      ctx.fillStyle = '#536e88';
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      ctx.beginPath();
      ctx.moveTo(10, -1);
      ctx.quadraticCurveTo(14, -2.5, 13, -0.5);
      ctx.closePath();
      ctx.fillStyle = '#3e556d';
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    ctx.beginPath();
    ctx.moveTo(-9, 0);
    ctx.quadraticCurveTo(-15, Math.sin(t * 2.4) * 1.6, -22, Math.sin(t * 2.4 + 1) * 2);
    ctx.lineWidth = 0.9;
    ctx.stroke();

    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.arc(8, side * 1.2, 0.55, 0, Math.PI * 2);
      ctx.fillStyle = '#f2e8d0';
      ctx.fill();
    }
  }

  function drawJellyfish(ctx, t, speed) {
    const pulse = 1 + Math.sin(t * 2.2) * 0.09;
    const len = 7 + speed * 16;
    const wigAmp = 0.7 + speed * 1.4;
    const wigRate = 1.8 + speed * 1.6;

    function backX(y) {
      const k = y / 8;
      return 1.6 - 1.8 * (1 - k * k);
    }

    ctx.strokeStyle = 'rgba(120, 70, 130, 0.85)';
    ctx.lineCap = 'round';
    ctx.lineWidth = 1.1;
    const tendrils = 5;
    for (let i = 0; i < tendrils; i++) {
      const ty = (i - (tendrils - 1) / 2) * 2.6;
      const tx = backX(ty) * pulse;
      const sy = ty * pulse;
      const wig = Math.sin(t * wigRate + i * 0.8) * wigAmp;
      ctx.beginPath();
      ctx.moveTo(tx, sy);
      ctx.bezierCurveTo(
        tx - len * 0.35, sy + wig * 1.1,
        tx - len * 0.75, sy + wig * 1.7,
        tx - len,        sy + wig * 2.2
      );
      ctx.stroke();
    }
    ctx.lineCap = 'butt';

    ctx.save();
    ctx.scale(pulse, pulse);
    ctx.beginPath();
    ctx.ellipse(2, 0, 10, 8, 0, -Math.PI / 2, Math.PI / 2);
    ctx.bezierCurveTo(0, 5, 0, -5, 2, -8);
    ctx.closePath();
    const grad = ctx.createRadialGradient(4, -2, 0, 4, -2, 14);
    grad.addColorStop(0, 'rgba(245, 210, 230, 0.92)');
    grad.addColorStop(1, 'rgba(180, 130, 180, 0.78)');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(80, 40, 80, 0.55)';
    ctx.lineWidth = 0.9;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(120, 70, 130, 0.4)';
    ctx.lineWidth = 0.6;
    for (let i = -1; i <= 1; i++) {
      const a = i * 0.45;
      ctx.beginPath();
      ctx.moveTo(2, 0);
      ctx.lineTo(2 + Math.cos(a) * 10, Math.sin(a) * 8);
      ctx.stroke();
    }
    ctx.restore();

    ctx.beginPath();
    ctx.ellipse(6, -3, 2, 1.2, -0.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
    ctx.fill();
  }

  function drawBalloon(ctx, t, speed) {
    ctx.beginPath();
    ctx.moveTo(0, -16);
    ctx.bezierCurveTo(11, -16, 12, -6, 6, -1);
    ctx.lineTo(-6, -1);
    ctx.bezierCurveTo(-12, -6, -11, -16, 0, -16);
    ctx.closePath();
    ctx.fillStyle = '#c9622e';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.9;
    ctx.stroke();

    ctx.strokeStyle = 'rgba(42,36,23,0.5)';
    ctx.lineWidth = 0.5;
    for (const x of [-6, -3, 0, 3, 6]) {
      ctx.beginPath();
      ctx.moveTo(x, -1);
      ctx.quadraticCurveTo(x * 1.15, -8, x * 0.45, -16);
      ctx.stroke();
    }

    ctx.strokeStyle = '#f2e8d0';
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.moveTo(-10, -9);
    ctx.quadraticCurveTo(0, -7.5, 10, -9);
    ctx.stroke();

    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.55;
    for (const x of [-4, -1, 1, 4]) {
      ctx.beginPath();
      ctx.moveTo(x, -1);
      ctx.lineTo(x * 0.55, 4);
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.rect(-3.5, 4, 7, 4);
    ctx.fillStyle = '#a06030';
    ctx.fill();
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(42,36,23,0.45)';
    ctx.lineWidth = 0.4;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(i, 4); ctx.lineTo(i, 8);
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.moveTo(-3.5, 6); ctx.lineTo(3.5, 6);
    ctx.stroke();

    if (speed > 0.15) {
      const flick = 0.7 + 0.3 * Math.sin(t * 14);
      ctx.save();
      ctx.globalAlpha = 0.55 + speed * 0.4;
      ctx.fillStyle = '#ffa030';
      ctx.beginPath();
      ctx.moveTo(0, 4);
      ctx.quadraticCurveTo(2.4 * flick, 1.5, 0, -1.5 * flick);
      ctx.quadraticCurveTo(-2.4 * flick, 1.5, 0, 4);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#ffe080';
      ctx.beginPath();
      ctx.moveTo(0, 4);
      ctx.quadraticCurveTo(1.2 * flick, 2.2, 0, 0.5);
      ctx.quadraticCurveTo(-1.2 * flick, 2.2, 0, 4);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  function drawCloudGalleon(ctx, t, speed) {
    const w = 10;
    drawCloudPlatform(ctx, w, { y: 7, r: 4 });
    drawBowlHull(ctx, w, 5);

    // Mast
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(0, -3.5);
    ctx.lineTo(0, -16);
    ctx.stroke();

    // Yard
    ctx.lineWidth = 0.9;
    ctx.beginPath();
    ctx.moveTo(-6, -13);
    ctx.lineTo(6, -13);
    ctx.stroke();

    // Square sail
    ctx.beginPath();
    ctx.moveTo(-5, -13);
    ctx.lineTo(5, -13);
    ctx.lineTo(5, -4);
    ctx.lineTo(-5, -4);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.lineWidth = 0.7;
    ctx.stroke();
    // Belly hint
    ctx.strokeStyle = 'rgba(42,36,23,0.4)';
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.moveTo(0, -13);
    ctx.lineTo(0, -4);
    ctx.stroke();

    drawCrowsNest(ctx, 0, -16);

    // Side fins (one per side, gentle flap)
    const flap = 0.55 + 0.45 * Math.sin(t * (3 + speed * 2));
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      ctx.translate(0, -1.5);
      ctx.scale(1, flap);
      ctx.beginPath();
      ctx.moveTo(-3, 0);
      ctx.quadraticCurveTo(3, -4, 5, -3);
      ctx.quadraticCurveTo(3, -1, -2, 0);
      ctx.closePath();
      ctx.fillStyle = '#f0e0c0';
      ctx.fill();
      ctx.strokeStyle = '#2a2417';
      ctx.lineWidth = 0.5;
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawCloudGalleonMulti(ctx, t, speed) {
    const w = 14;
    drawCloudPlatform(ctx, w, { y: 7, r: 4.2 });
    drawBowlHull(ctx, w, 5);

    ctx.strokeStyle = '#2a2417';

    // Bowsprit
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(w * 0.95, -2);
    ctx.lineTo(w * 1.45, -4);
    ctx.stroke();

    // Foremast
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(6, -3.5);
    ctx.lineTo(6, -12);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(2.5, -10);
    ctx.lineTo(9.5, -10);
    ctx.lineWidth = 0.7;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(3, -10);
    ctx.lineTo(9, -10);
    ctx.lineTo(9, -4);
    ctx.lineTo(3, -4);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.lineWidth = 0.6;
    ctx.stroke();

    // Mainmast
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-2, -3.5);
    ctx.lineTo(-2, -17);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-8, -14);
    ctx.lineTo(4, -14);
    ctx.lineWidth = 0.9;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-7, -14);
    ctx.lineTo(3, -14);
    ctx.lineTo(3, -4);
    ctx.lineTo(-7, -4);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(42,36,23,0.4)';
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.moveTo(-2, -14);
    ctx.lineTo(-2, -4);
    ctx.stroke();

    drawCrowsNest(ctx, -2, -17);

    // Stern pennant fluttering
    const pennant = Math.sin(t * (4 + speed * 2)) * 1.2;
    ctx.fillStyle = '#c9622e';
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(-2, -17);
    ctx.lineTo(2 + pennant, -16);
    ctx.lineTo(-2, -15);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  function drawCloudGalleonWinged(ctx, t, speed) {
    const w = 9;

    // Modest cloud
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = 'rgba(80, 110, 140, 0.55)';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.arc(-5, 6.5, 3, 0, Math.PI * 2);
    ctx.arc(0, 7, 3.6, 0, Math.PI * 2);
    ctx.arc(5, 6.5, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#5a6a7c';
    ctx.beginPath();
    ctx.ellipse(0, 10, 7, 1.2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    drawBowlHull(ctx, w, 4);

    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, -2.8);
    ctx.lineTo(0, -11);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(-3, -10);
    ctx.lineTo(3, -10);
    ctx.lineTo(3, -3.5);
    ctx.lineTo(-3, -3.5);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.lineWidth = 0.6;
    ctx.stroke();

    drawCrowsNest(ctx, 0, -11);

    // Big flapping wings
    const flapRate = 4 + speed * 2;
    const flap = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * flapRate));
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      ctx.translate(-2, -1);
      ctx.scale(1, flap);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(2, -10, -8, -14, -10, -6);
      ctx.bezierCurveTo(-6, -3, -2, -1, 0, 0);
      ctx.closePath();
      ctx.fillStyle = '#f0e0c0';
      ctx.fill();
      ctx.strokeStyle = '#2a2417';
      ctx.lineWidth = 0.6;
      ctx.stroke();
      ctx.strokeStyle = 'rgba(42,36,23,0.4)';
      ctx.lineWidth = 0.4;
      ctx.beginPath();
      ctx.moveTo(0, 0); ctx.lineTo(-6, -8);
      ctx.moveTo(0, 0); ctx.lineTo(-10, -6);
      ctx.stroke();
      ctx.restore();
    }
  }

  const drawers = {
    sloop: drawSloop,
    butterfly: drawButterfly,
    butterflyShip: drawButterflyShip,
    turtle: drawTurtle,
    turtleSideClassic: drawTurtleSideClassic,
    turtleSideArmored: drawTurtleSideArmored,
    turtleSideSea: drawTurtleSideSea,
    dragon: drawDragon,
    dragonEastern: drawDragonEastern,
    dragonWyvern: drawDragonWyvern,
    dragonChibi: drawDragonChibi,
    windSerpent: drawWindSerpent,
    manta: drawManta,
    jellyfish: drawJellyfish,
    balloon: drawBalloon,
    cloudGalleon: drawCloudGalleon,
    cloudGalleonMulti: drawCloudGalleonMulti,
    cloudGalleonWinged: drawCloudGalleonWinged,
  };

  // ---------- Render loop ----------
  let lastT = 0;
  let simT = 0;
  let speed = 1;

  function render(tMs) {
    const dt = Math.min((tMs - lastT) / 1000, 0.05);
    lastT = tMs;
    if (!paused) simT += dt;
    const target = sailing ? 1 : 0;
    speed += (target - speed) * Math.min(1, dt * 1.6);
    const t = simT;

    for (const c of cards) {
      const { ctx, W, H } = c;
      drawBackground(ctx, W, H, t);

      const leftCx = W * 0.27;
      const rightCx = W * 0.74;
      const cy = H * 0.5;
      const bob = Math.sin(t * 1.1) * 1.4;

      if (c.id !== 'sloop') {
        ctx.save();
        ctx.globalAlpha = 0.42;
        ctx.translate(leftCx - 36, cy);
        drawSloop(ctx);
        ctx.restore();
        ctx.fillStyle = 'rgba(42,36,23,0.6)';
        ctx.font = 'italic 10px Georgia, serif';
        ctx.textAlign = 'center';
        ctx.fillText('sloop', leftCx - 36, cy + 22);
      }

      ctx.save();
      ctx.translate(leftCx + (c.id === 'sloop' ? 0 : 16), cy + bob);
      drawers[c.id](ctx, t, speed);
      ctx.restore();

      ctx.save();
      ctx.strokeStyle = 'rgba(42,36,23,0.18)';
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(W * 0.5, 8);
      ctx.lineTo(W * 0.5, H - 8);
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.translate(rightCx, cy + bob * 0.4);
      ctx.scale(4, 4);
      drawers[c.id](ctx, t, speed);
      ctx.restore();

      ctx.fillStyle = 'rgba(42,36,23,0.55)';
      ctx.font = '10px Georgia, serif';
      ctx.textAlign = 'left';
      ctx.fillText('1×', 8, H - 6);
      ctx.fillText('4×', W * 0.52, H - 6);
    }

    requestAnimationFrame(render);
  }

  requestAnimationFrame((t) => { lastT = t; requestAnimationFrame(render); });
})();
</script>
</body>
</html>
