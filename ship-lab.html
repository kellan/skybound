<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Skybound — Ship Lab</title>
<style>
  :root {
    --parchment: #f1e6cd;
    --ink: #2a2417;
    --rule: #b8a777;
  }
  html, body { margin: 0; padding: 0; background: #c4d4e2; color: var(--ink); font-family: Georgia, serif; }
  header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--rule);
    background: var(--parchment);
    display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }
  header h1 { margin: 0; font-size: 20px; }
  header p { margin: 2px 0 0; font-size: 12.5px; opacity: 0.85; max-width: 64ch; }
  header .controls button {
    font: italic 13px Georgia, serif;
    background: #fff8e8; border: 1px solid var(--rule); color: var(--ink);
    padding: 6px 12px; border-radius: 4px; cursor: pointer;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
    padding: 14px;
  }
  .card {
    background: #fff8e8;
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 10px 12px 12px;
  }
  .card h2 { margin: 0 0 2px; font-size: 16px; font-style: italic; }
  .card .desc { margin: 0 0 8px; font-size: 12px; opacity: 0.78; min-height: 30px; }
  canvas {
    display: block; width: 100%; height: auto;
    background: linear-gradient(180deg, #aac3da 0%, #d4dde5 100%);
    border-radius: 4px;
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>Skybound — Ship Lab</h1>
    <p>Each card shows a candidate at <em>game scale</em> (left, with the current sloop faded beside it for size reference) and a 4× zoom (right). All ships face right and animate with their signature motion.</p>
  </div>
  <div class="controls">
    <button id="pause">Pause</button>
  </div>
</header>
<div class="grid" id="grid"></div>

<script>
(function () {
  const ships = [
    { id: 'sloop',     name: 'Sloop',          desc: 'The current ship — baseline for size and style.' },
    { id: 'butterfly', name: 'Butterfly',      desc: "Kiddo's pick. Big patterned wings flap; the body is tiny." },
    { id: 'turtle',    name: 'Flying turtle',  desc: 'Hex-patterned shell, four flippers paddling slowly.' },
    { id: 'dragon',    name: 'Dragon',         desc: 'Segmented serpent body whips behind a winged head.' },
    { id: 'manta',     name: 'Manta ray',      desc: 'Wide glider, slow wing wave, long whip tail.' },
    { id: 'jellyfish', name: 'Jellyfish',      desc: 'Translucent dome pulses; tendrils drift behind.' },
  ];

  const grid = document.getElementById('grid');
  const dpr = window.devicePixelRatio || 1;
  let paused = false;

  document.getElementById('pause').addEventListener('click', (e) => {
    paused = !paused;
    e.target.textContent = paused ? 'Play' : 'Pause';
  });

  const cards = ships.map(s => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h2>${s.name}</h2><div class="desc">${s.desc}</div><canvas></canvas>`;
    grid.appendChild(card);
    const canvas = card.querySelector('canvas');
    const W = 320, H = 140;
    canvas.style.aspectRatio = `${W} / ${H}`;
    canvas.width = W * dpr; canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    return { id: s.id, ctx, W, H };
  });

  // ---------- Background helpers ----------
  function drawBackground(ctx, W, H, t) {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#aac3da');
    g.addColorStop(1, '#d4dde5');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Drifting cloud highlights
    ctx.save();
    ctx.globalAlpha = 0.32;
    const drift = (t * 6) % (W + 80);
    for (let i = 0; i < 3; i++) {
      const cx = ((i * (W / 3) + drift) % (W + 80)) - 40;
      const cy = H * (0.22 + i * 0.22);
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.ellipse(cx, cy, 30, 7, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ---------- Ship draw functions ----------
  // All ships are drawn centered at (0,0), facing +X (right), at game scale.
  // The current sloop hull spans roughly x=[-8..14], y=[-7..7] — use that as a yardstick.

  function drawSloop(ctx) {
    // Hull
    ctx.beginPath();
    ctx.moveTo(14, 0);
    ctx.lineTo(-8, -7);
    ctx.lineTo(-5, 0);
    ctx.lineTo(-8, 7);
    ctx.closePath();
    ctx.fillStyle = '#c9622e';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    // Sail
    ctx.beginPath();
    ctx.moveTo(2, 0);
    ctx.lineTo(-4, -9);
    ctx.lineTo(-2, 0);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.stroke();
  }

  function drawButterfly(ctx, t) {
    // Wing flap: y-scale 0.35 .. 1.0 at ~4 Hz
    const flap = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(t * 8));

    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;

    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);     // mirror
      ctx.scale(1, flap);     // flap
      // Forewing
      ctx.beginPath();
      ctx.moveTo(2, -1);
      ctx.bezierCurveTo(4, -14, -10, -16, -8, -5);
      ctx.bezierCurveTo(-6, -3, -1, -1, 2, -1);
      ctx.closePath();
      ctx.fillStyle = '#e9c66a';
      ctx.fill();
      ctx.stroke();
      // Hindwing
      ctx.beginPath();
      ctx.moveTo(-2, -2);
      ctx.bezierCurveTo(-10, -3, -13, -11, -7, -11);
      ctx.bezierCurveTo(-4, -9, -2, -5, -2, -2);
      ctx.closePath();
      ctx.fillStyle = '#d97a3c';
      ctx.fill();
      ctx.stroke();
      // Eyespot on forewing
      ctx.beginPath();
      ctx.arc(-3, -10, 1.6, 0, Math.PI * 2);
      ctx.fillStyle = '#2a2417';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(-3, -10, 0.7, 0, Math.PI * 2);
      ctx.fillStyle = '#f2e8d0';
      ctx.fill();
      ctx.restore();
    }

    // Body (slim ellipse along X)
    ctx.beginPath();
    ctx.ellipse(2, 0, 7, 1.8, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    // Head
    ctx.beginPath();
    ctx.arc(8, 0, 2, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    // Antennae
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(8, -1);
    ctx.quadraticCurveTo(12, -4, 11, -6);
    ctx.moveTo(8, 1);
    ctx.quadraticCurveTo(12, 4, 11, 6);
    ctx.stroke();
    // Tiny passenger basket slung under body
    ctx.fillStyle = '#c9622e';
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(-1, 2);
    ctx.lineTo(4, 2);
    ctx.lineTo(3, 5);
    ctx.lineTo(0, 5);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  function drawTurtle(ctx, t) {
    // Slow paddling
    const paddle = Math.sin(t * 3) * 0.5;
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;

    // Flippers: front pair leads, back pair lags by π
    const flippers = [
      { x:  4, y: -7, base: -0.7, side: -1 },
      { x:  4, y:  7, base:  0.7, side:  1 },
      { x: -7, y: -6, base: -2.4, side: -1, lag: Math.PI },
      { x: -7, y:  6, base:  2.4, side:  1, lag: Math.PI },
    ];
    for (const f of flippers) {
      const swing = Math.sin(t * 3 + (f.lag || 0)) * 0.5;
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(f.base + swing * f.side);
      ctx.beginPath();
      ctx.ellipse(0, 0, 5, 2.4, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#5a8a52';
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    // Shell
    ctx.beginPath();
    ctx.ellipse(0, 0, 11, 8.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#6e9c5a';
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.stroke();

    // Hex pattern
    ctx.strokeStyle = 'rgba(42,36,23,0.45)';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.arc(0, 0, 2.6, 0, Math.PI * 2);
    ctx.stroke();
    for (let i = 0; i < 6; i++) {
      const a = i / 6 * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * 5.2, Math.sin(a) * 5.2, 2.1, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Head
    ctx.beginPath();
    ctx.ellipse(11, 0, 3.2, 2.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#5a8a52';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // Eye
    ctx.beginPath();
    ctx.arc(12.5, -0.9, 0.6, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    // Tail
    ctx.beginPath();
    ctx.moveTo(-10, 0);
    ctx.lineTo(-14, -1);
    ctx.lineTo(-14, 1);
    ctx.closePath();
    ctx.fillStyle = '#5a8a52';
    ctx.fill();
    ctx.stroke();
  }

  function drawDragon(ctx, t) {
    // Body spine: segments lag behind head with phase offset, wiggle grows toward tail
    const segs = 7;
    const segLen = 4.2;
    const amp = 3.2;
    const points = [];
    for (let i = 0; i < segs; i++) {
      const along = i / (segs - 1);
      const x = 12 - i * segLen;
      const y = Math.sin(t * 2.6 - i * 0.9) * amp * along;
      points.push({ x, y, r: 4.6 - along * 3.6 });
    }

    // Body back-to-front
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    for (let i = segs - 1; i >= 1; i--) {
      const p = points[i];
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = '#8a4eb0';
      ctx.fill();
      ctx.stroke();
    }

    // Head: a bit elongated
    const head = points[0];
    ctx.save();
    ctx.translate(head.x, head.y);
    // Angle head toward next-segment direction so it leads visibly
    const next = points[1];
    const headAng = Math.atan2(head.y - next.y, head.x - next.x);
    ctx.rotate(headAng);

    // Wings
    const wingFlap = Math.sin(t * 5.5) * 0.45;
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      ctx.rotate(-0.35 + wingFlap);
      ctx.beginPath();
      ctx.moveTo(-2, 0);
      ctx.quadraticCurveTo(-5, -9, -12, -7);
      ctx.quadraticCurveTo(-7, -3, -3, -1);
      ctx.closePath();
      ctx.fillStyle = '#b07cd0';
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    // Head shape (snout)
    ctx.beginPath();
    ctx.moveTo(5, 0);
    ctx.quadraticCurveTo(3, -4, -3, -3);
    ctx.lineTo(-3, 3);
    ctx.quadraticCurveTo(3, 4, 5, 0);
    ctx.closePath();
    ctx.fillStyle = '#8a4eb0';
    ctx.fill();
    ctx.stroke();
    // Horn
    ctx.beginPath();
    ctx.moveTo(-1, -3);
    ctx.lineTo(-3, -6);
    ctx.lineTo(0, -4);
    ctx.closePath();
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.stroke();
    // Eye
    ctx.beginPath();
    ctx.arc(1.5, -1, 0.8, 0, Math.PI * 2);
    ctx.fillStyle = '#f2e8d0';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(2, -1, 0.4, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2417';
    ctx.fill();
    ctx.restore();
  }

  function drawManta(ctx, t) {
    const wingPhase = Math.sin(t * 2.4);

    // Central body
    ctx.beginPath();
    ctx.moveTo(11, 0);
    ctx.quadraticCurveTo(8, -3, 2, -2.2);
    ctx.lineTo(-10, -1);
    ctx.lineTo(-10, 1);
    ctx.lineTo(2, 2.2);
    ctx.quadraticCurveTo(8, 3, 11, 0);
    ctx.closePath();
    ctx.fillStyle = '#3e556d';
    ctx.fill();
    ctx.strokeStyle = '#2a2417';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Wings — wide triangular sweeps
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      const tip = -11 + wingPhase * 3;   // tip dips and lifts
      ctx.beginPath();
      ctx.moveTo(8, -1);
      ctx.bezierCurveTo(4, -3, -2, tip, -9, -9 + wingPhase * 2);
      ctx.bezierCurveTo(-5, -5, -2, -3, -8, -1);
      ctx.closePath();
      ctx.fillStyle = '#536e88';
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    // Cephalic horns (the two little front "fins")
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.scale(1, side);
      ctx.beginPath();
      ctx.moveTo(10, -1);
      ctx.quadraticCurveTo(14, -2.5, 13, -0.5);
      ctx.closePath();
      ctx.fillStyle = '#3e556d';
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    // Tail
    ctx.beginPath();
    ctx.moveTo(-9, 0);
    ctx.quadraticCurveTo(-15, Math.sin(t * 2.4) * 1.6, -22, Math.sin(t * 2.4 + 1) * 2);
    ctx.lineWidth = 0.9;
    ctx.stroke();

    // Eyes
    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.arc(8, side * 1.2, 0.55, 0, Math.PI * 2);
      ctx.fillStyle = '#f2e8d0';
      ctx.fill();
    }
  }

  function drawJellyfish(ctx, t) {
    const pulse = 1 + Math.sin(t * 2.2) * 0.09;

    // Tendrils first (drawn behind dome)
    ctx.strokeStyle = 'rgba(150, 100, 160, 0.7)';
    ctx.lineWidth = 1;
    const tendrils = 6;
    for (let i = 0; i < tendrils; i++) {
      const off = (i - (tendrils - 1) / 2) * 1.7;
      const wig = Math.sin(t * 2 + i * 0.7);
      ctx.beginPath();
      ctx.moveTo(-3, off);
      ctx.bezierCurveTo(
        -9, off + wig * 1.6,
        -15, off + wig * 2.2,
        -22, off + wig * 3
      );
      ctx.stroke();
    }

    // Dome — right-facing D shape
    ctx.save();
    ctx.scale(pulse, pulse);
    ctx.beginPath();
    ctx.ellipse(2, 0, 10, 8, 0, -Math.PI / 2, Math.PI / 2);
    ctx.bezierCurveTo(0, 5, 0, -5, 2, -8);
    ctx.closePath();
    const grad = ctx.createRadialGradient(4, -2, 0, 4, -2, 14);
    grad.addColorStop(0, 'rgba(245, 210, 230, 0.92)');
    grad.addColorStop(1, 'rgba(180, 130, 180, 0.75)');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(80, 40, 80, 0.55)';
    ctx.lineWidth = 0.9;
    ctx.stroke();
    // A couple of inner radial stripes
    ctx.strokeStyle = 'rgba(120, 70, 130, 0.4)';
    ctx.lineWidth = 0.6;
    for (let i = -1; i <= 1; i++) {
      const a = i * 0.45;
      ctx.beginPath();
      ctx.moveTo(2, 0);
      ctx.lineTo(2 + Math.cos(a) * 10, Math.sin(a) * 8);
      ctx.stroke();
    }
    ctx.restore();

    // Highlight glint
    ctx.beginPath();
    ctx.ellipse(6, -3, 2, 1.2, -0.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
    ctx.fill();
  }

  const drawers = {
    sloop: drawSloop,
    butterfly: drawButterfly,
    turtle: drawTurtle,
    dragon: drawDragon,
    manta: drawManta,
    jellyfish: drawJellyfish,
  };

  // ---------- Render loop ----------
  let lastT = 0;
  let simT = 0;

  function render(tMs) {
    const dt = (tMs - lastT) / 1000;
    lastT = tMs;
    if (!paused) simT += dt;
    const t = simT;

    for (const c of cards) {
      const { ctx, W, H } = c;
      drawBackground(ctx, W, H, t);

      // Layout: left half = game scale (with sloop ghost for size compare), right half = 4× zoom.
      const leftCx = W * 0.27;
      const rightCx = W * 0.74;
      const cy = H * 0.5;
      const bob = Math.sin(t * 1.1) * 1.4;

      // --- Sloop ghost (skip for the sloop card itself) ---
      if (c.id !== 'sloop') {
        ctx.save();
        ctx.globalAlpha = 0.42;
        ctx.translate(leftCx - 32, cy);
        drawSloop(ctx);
        ctx.restore();
        ctx.fillStyle = 'rgba(42,36,23,0.6)';
        ctx.font = 'italic 10px Georgia, serif';
        ctx.textAlign = 'center';
        ctx.fillText('sloop', leftCx - 32, cy + 22);
      }

      // --- Candidate at game scale ---
      ctx.save();
      ctx.translate(leftCx + (c.id === 'sloop' ? 0 : 14), cy + bob);
      drawers[c.id](ctx, t);
      ctx.restore();

      // Divider
      ctx.save();
      ctx.strokeStyle = 'rgba(42,36,23,0.18)';
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(W * 0.5, 8);
      ctx.lineTo(W * 0.5, H - 8);
      ctx.stroke();
      ctx.restore();

      // --- Candidate at 4× ---
      ctx.save();
      ctx.translate(rightCx, cy + bob * 0.4);
      ctx.scale(4, 4);
      drawers[c.id](ctx, t);
      ctx.restore();

      // Scale labels
      ctx.fillStyle = 'rgba(42,36,23,0.55)';
      ctx.font = '10px Georgia, serif';
      ctx.textAlign = 'left';
      ctx.fillText('1×', 8, H - 6);
      ctx.fillText('4×', W * 0.52, H - 6);
    }

    requestAnimationFrame(render);
  }

  requestAnimationFrame((t) => { lastT = t; requestAnimationFrame(render); });
})();
</script>
</body>
</html>
