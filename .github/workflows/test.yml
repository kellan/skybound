name: tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      # Real-browser smoke of the landing flow — the WebGL half the JSDOM
      # suite can't reach. Chromium comes from Playwright's own install here;
      # the Claude sandbox uses its preinstalled build (see test/browser/).
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser
